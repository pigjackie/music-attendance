<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>音演三莊公演管理系統 V3.7</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root { 
    --bg-dark: #0a0a0a; --gold-main: #d4af37; --gold-light: #fbeea7; 
    --glass: rgba(255, 255, 255, 0.1); --accent-red: #ff3b30; --success: #34c759; 
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle at top right, #332b12 0%, #0a0a0a 100%); 
    background-attachment: fixed; color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; 
  }
  
  body { display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
  .app-container { flex: 1; width: 100%; padding: 20px; display: flex; flex-direction: column; position: relative; z-index: 10; }
  
  .deco-symbol { position: fixed; color: var(--gold-main); opacity: 0.12; pointer-events: none; z-index: 0; font-weight: 900; }

  .header { text-align: center; margin: 30px 0 20px; }
  .main-title { 
    font-size: 38px; font-weight: 900; 
    background: linear-gradient(to bottom, var(--gold-light), var(--gold-main)); 
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
    text-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); line-height: 1.2;
  }

  .login-card { 
    background: var(--glass); border-radius: 40px; padding: 40px 25px; 
    border: 2px solid var(--gold-main); backdrop-filter: blur(20px); 
    margin: 15px 0; box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
  }

  input { 
    width: 100%; padding: 22px; border-radius: 20px; 
    border: 3px solid var(--gold-main); background: rgba(0,0,0,0.7); 
    color: #fff; font-size: 26px; font-weight: bold; margin-bottom: 20px; text-align: center; 
  }
  .btn-gold { 
    width: 100%; padding: 22px; border-radius: 20px; 
    background: linear-gradient(135deg, var(--gold-light), var(--gold-main)); 
    color: #000; font-weight: 900; font-size: 26px; border: none; cursor: pointer; 
  }

  /* 管理員清單 */
  .admin-panel { display: none; padding-bottom: 160px; }
  .list-item { 
    background: rgba(255,255,255,0.08); padding: 22px; border-radius: 30px; 
    margin-bottom: 15px; border-left: 10px solid var(--gold-main); 
  }
  .name-link { font-size: 34px; font-weight: 900; color: var(--gold-light); cursor: pointer; text-decoration: underline; }

  /* 點名區按鈕組 */
  .att-grid-item { 
    background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 25px; 
    padding: 20px 10px; margin-bottom: 20px; position: relative;
  }
  .att-name { font-size: 28px; font-weight: 900; color: var(--gold-light); margin-bottom: 15px; display: block; text-align: center; }
  .att-no { position: absolute; top: 15px; left: 20px; font-size: 14px; color: var(--gold-main); opacity: 0.6; }
  
  .att-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .att-btn { 
    padding: 12px 5px; border-radius: 12px; border: 1px solid #666; 
    background: #222; color: #fff; font-size: 13px; font-weight: bold; cursor: pointer;
  }
  .att-btn.active { background: var(--gold-main); color: #000; border-color: var(--gold-light); }
  
  /* 通用點名格：加上編號 */
  .att-box { 
    background: rgba(255,255,255,0.05); padding: 30px 10px 20px; border-radius: 25px; 
    text-align: center; border: 1px solid #444; margin-bottom: 15px; position: relative;
  }
  .att-box.active-late { border-color: var(--gold-main); background: rgba(212, 175, 55, 0.1); }
  .att-box.active-absent { border-color: var(--accent-red); background: rgba(255, 59, 48, 0.1); }
  .att-box .box-no { position: absolute; top: 12px; left: 15px; font-size: 12px; color: var(--gold-main); font-weight: bold; }

  /* 蔡慧琳專用 */
  .special-att-box { 
    background: rgba(212, 175, 55, 0.08); border: 2px solid var(--gold-main); 
    border-radius: 30px; padding: 25px 10px; margin-bottom: 20px; position: relative;
  }
  .special-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
  .mini-btn { padding: 12px 5px; border-radius: 12px; border: 1px solid #666; background: #222; color: #fff; font-size: 13px; font-weight: bold; }
  .mini-btn.active { background: var(--gold-main); color: #000; }

  .att-status-text { font-size: 28px; font-weight: 900; display: block; margin-top: 10px; }
  .status-present { color: var(--success); }
  .status-late10 { color: #f0ad4e; }
  .status-late30 { color: #ff8c00; }
  .status-absent { color: var(--accent-red); }
  .status-leave { color: #5ac8fa; }

  .nav-bar { 
    position: fixed; bottom: 0; left: 0; width: 100%; height: 95px;
    background: rgba(10,10,10,0.98); border-top: 2px solid #333; 
    display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; 
  }
  .nav-item { flex: 1; text-align: center; font-size: 18px; color: #777; align-self: center; }
  .nav-item.active { color: var(--gold-main); font-weight: 900; }

  .status-tag { padding: 8px 15px; border-radius: 10px; font-size: 16px; font-weight: bold; }
  .tag-unpaid { background: var(--accent-red); color: #fff; }
  .tag-paid { background: var(--success); color: #fff; }
  
  .list-divider { text-align: center; color: var(--gold-main); font-weight: 900; font-size: 24px; margin: 40px 0 20px; border-top: 3px solid var(--gold-main); padding-top: 15px; letter-spacing: 5px; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; }
  .modal-content { background: #111; border-radius: 40px; padding: 30px; border: 3px solid var(--gold-main); max-width: 600px; margin: 0 auto; }
</style>
</head>
<body>

  <div class="deco-symbol" style="top:5%; left:5%; font-size:100px;">𝄞</div>
  <div class="deco-symbol" style="top:25%; right:8%; font-size:80px;">𝄢</div>
  <div class="deco-symbol" style="bottom:15%; left:10%; font-size:90px;">♫</div>
  <div class="deco-symbol" style="bottom:8%; right:5%; font-size:70px;">♬</div>

  <div class="app-container" id="view-student">
    <div class="header"><div class="main-title">音演三莊<br>公演管理系統</div></div>
    <div class="login-card" id="student-login">
        <div id="step-name">
            <span style="display:block; text-align:center; color:var(--gold-main); margin-bottom:20px; font-size:24px; font-weight:bold;">個人帳目查詢系統</span>
            <input type="text" id="stu-name" placeholder="請輸入姓名">
            <button class="btn-gold" onclick="searchStudent()">登入查詢</button>
        </div>
        <div id="step-first-set" style="display:none">
            <p style="font-size:24px; text-align:center;">首次登入，設定 4 位密碼</p>
            <input type="password" id="first-pwd" placeholder="數字密碼" maxlength="4" inputmode="numeric">
            <button class="btn-gold" onclick="setPassword()">設定並登入</button>
        </div>
        <div id="step-auth" style="display:none">
            <p id="auth-welcome" style="font-size:24px; text-align:center; color:var(--gold-light);"></p>
            <input type="password" id="auth-pwd" placeholder="密碼" maxlength="4" inputmode="numeric">
            <button class="btn-gold" onclick="authStudent()">進入系統</button>
        </div>
    </div>
    <div id="student-info" style="display:none"></div>
    <div style="margin-top:auto; text-align:center; padding:40px 0; color:#444; font-size:18px; font-weight:bold;" onclick="showLock()">ADMIN</div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-size:32px; color:var(--gold-main);">後台管理端</h2>
        <button onclick="location.reload()" style="background:none; border:2px solid #555; color:#888; border-radius:15px; padding:10px 20px; font-size:16px;">登出</button>
    </div>
    <div id="pane-list"><div id="h-l"></div></div> 
    
    <div id="pane-att" style="display:none">
        <div style="background:rgba(212,175,55,0.1); padding:20px; border-radius:20px; color:var(--gold-main); font-size:18px; text-align:center; margin-bottom:20px; font-weight:bold;">
            點擊人名循環切換<br>編號依照序號排列
        </div>
        <div id="att-grid" style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px;"></div>
        <div style="height:40px;"></div>
        <button class="btn-gold" style="background:var(--success); color:#fff; height:110px; font-size:32px;" onclick="submitAtt()">💾 儲存今日點名與罰款</button>
    </div>

    <div id="pane-rep" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;"><h3>欠費總表</h3><div id="total-sum-badge" style="background:var(--accent-red); padding:10px 20px; border-radius:20px; font-weight:bold; font-size:24px;">$0</div></div>
        <div id="full-report-list" class="login-card" style="padding:20px; height: 50vh; overflow-y: auto; text-align: left; font-size:22px;"></div>
        <button class="btn-gold" style="background:#248a3d; color:#fff; margin-top:20px;" onclick="doExcel()">📊 下載 Excel</button>
    </div>

    <div id="pane-set" style="display:none">
        <div class="login-card">
            <button class="btn-gold" onclick="resetAllAccounting()" style="background:var(--accent-red); color:#fff; font-size:22px;">🛑 確定帳目歸零(欠1300)</button>
            <div style="height:40px;"></div>
            <button class="btn-gold" onclick="forceRestoreList()" style="background:var(--success); color:#fff; font-size:22px;">🔧 修復 55 人名單</button>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item active" onclick="go('list',this)">👥 名單</div>
        <div class="nav-item" onclick="go('att',this)">📅 點名</div>
        <div class="nav-item" onclick="go('rep',this)">📊 報表</div>
        <div class="nav-item" onclick="go('set',this)">⚙️ 設定</div>
    </div>
  </div>

  <div id="detail-modal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h3 id="modal-name" style="margin:0; color:var(--gold-main); font-size:36px;"></h3>
            <button onclick="closeModal()" style="background:none; border:none; color:#888; font-size:40px;">✕</button>
        </div>
        <div id="modal-body"></div>
        <div style="display:grid; grid-template-columns: 1fr; gap:15px; margin-top:30px;">
            <button class="btn-gold" style="background:#444; color:#fff; font-size:22px;" onclick="manualAddFineFromModal()">手動雜費</button>
            <button class="btn-gold" style="background:#222; color:#fff; font-size:22px;" onclick="setPropFromModal()">道具費設定</button>
            <button class="btn-gold" style="font-size:22px;" onclick="adminPaidFromModal()">收受現金</button>
        </div>
        <div style="margin-top:30px; border-top:2px solid #333; padding-top:30px;"><b style="font-size:24px;">對帳明細：</b><div id="modal-history" style="font-size:20px; margin-top:15px; max-height:300px; overflow-y:auto;"></div></div>
    </div>
  </div>

  <div id="lock-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:3000; flex-direction:column; align-items:center; justify-content:center;">
      <div id="pwd-dots" style="display:flex; gap:25px; margin-bottom:50px"><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div></div>
      <div style="display:grid; grid-template-columns:repeat(3,90px); gap:25px"><script>for(let i=1; i<=9; i++) document.write(`<button style="width:80px;height:80px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:32px;font-weight:bold;border:1px solid #444;" onclick="press(${i})">${i}</button>`);</script><button onclick="document.getElementById('lock-overlay').style.display='none'">✕</button><button style="width:80px;height:80px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:32px;font-weight:bold;border:1px solid #444;" onclick="press(0)">0</button><button onclick="press('del')">⌫</button></div>
  </div>

<script>
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {}, _currentModalId = null;

  const ALL_NAMES = ["毛語程","林叡成","田宇紘","吳昆達","吳宥良","黃崇恩","林宏澤","金品澔","劉宸昀","蔡呈樂","蘇瑞吾","梁之凡","蔡宗佑","黃穩達","馮康維","倪秉澤","廖敏君","劉慶霈","蔡慧琳","鄭淳融","魏宜宸","徐婉瑜","安兪臻","江岑君","池宛昕","李曉萍","周玄禮","王以昕","林祐立","邱詩涵","胡云珊","蔡逸宣","高慧君","張路淇","陳芃瑾","陳雨彤","陳宥安","陳圓卿","傅克諳","曾妘湘", "蕭旭成", "王玟茜","王語舒","姚宥湘","陳思妤","楊镕慈","王偉家","何建伸","姜榮绅","郭庭傑","陳泊源","陳軍任","黃治容","盧宥辰","謝行知"];

  _db.ref('students').on('value', s => {
      _all = s.val() || {};
      if(Object.keys(_all).length === 0) forceRestoreList(true);
      renderAdminList(); renderFullReport(); if(_user) renderUser();
      if(_currentModalId) updateModalContent(_currentModalId);
  });

  function renderAdminList() {
    const l = document.getElementById('h-l'); if(!l) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    let html = "";
    sorted.forEach(([id, s]) => {
      if(s.no === 42) html += `<div style="text-align:center; color:var(--gold-main); font-weight:900; font-size:24px; margin:30px 0;">—— 演三莊名單 ——</div>`;
      const debt = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0);
      html += `<div class="list-item">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="name-link" onclick="openModal('${id}')">${s.no}. ${s.name}</div>
            <span onclick="toggleFund('${id}', ${s.fundPaid})" class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}">${s.fundPaid?'基金已繳':'欠 1300'}</span>
        </div>
        <div class="quota-row">
            <div class="quota-box-text ${s.leaveQuota<=1?'used':''}" onclick="adminDeduct('${id}',1)">${s.leaveQuota<=1?'已抵銷':'1 次折抵'}</div>
            <div class="quota-box-text ${s.leaveQuota<=0?'used':''}" onclick="adminDeduct('${id}',0)">${s.leaveQuota<=0?'已抵銷':'2 次折抵'}</div>
        </div>
        <div style="text-align:right; margin-top:15px;"><b style="color:var(--accent-red); font-size:40px;">$${debt}</b></div>
      </div>`;
    });
    l.innerHTML = html;
  }

  // 點名邏輯：加入編號顯示
  function renderAttGrid() {
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    document.getElementById('att-grid').innerHTML = sorted.map(([id, s]) => {
      if (!_attData[id]) {
          if (s.name === '蔡慧琳') _attData[id] = { type: 'special', sum: 0, early: false, p1: false, extra: 0, note: '' };
          else _attData[id] = { type: 'normal', status: 'present', sum: 0, note: '' };
      }
      const d = _attData[id];

      // 蔡慧琳特殊介面
      if (s.name === '蔡慧琳') {
          return `<div class="special-att-box">
            <span class="box-no" style="position:absolute; top:12px; left:15px; font-size:12px; color:var(--gold-main); font-weight:bold;">${s.no}</span>
            <b class="att-name">${s.name} (加成制)</b>
            <div class="special-btn-group">
                <button class="mini-btn ${d.early?'active':''}" onclick="toggleSpecial('${id}','early')">8:00遲(+10)</button>
                <button class="mini-btn ${d.p1?'active':''}" onclick="toggleSpecial('${id}','p1')">第一節(+20)</button>
                <button class="mini-btn" onclick="addExtra('${id}')">追加1節(+10)</button>
                <button class="mini-btn" onclick="resetSpecial('${id}')">重設</button>
            </div>
            <div style="text-align:center; margin-top:10px; font-weight:900; color:var(--gold-main);">預收：$${d.sum}</div>
            <button onclick="setNote(event,'${id}')" style="width:100%; margin-top:10px; border-radius:10px; background:#444; color:#fff; border:none; padding:8px;">註記</button>
          </div>`;
      }

      // 普通人介面
      const stMap = { 'present':['出席','status-present'], 'late10':['早遲 10','status-late10'], 'late30':['全遲 30','status-late30'], 'absent':['缺席 100','status-absent'], 'leave':['請假 0','status-leave'] };
      return `<div id="at-${id}" onclick="cycleNormal('${id}')" class="att-box ${d.status!=='present'?'active-late':''}">
        <span class="box-no">${s.no}</span>
        <b style="font-size:24px;">${s.name}</b><br>
        <span class="att-status-text ${stMap[d.status][1]}">${stMap[d.status][0]}</span>
        <button onclick="setNote(event,'${id}')" style="font-size:14px; background:#332b12; color:var(--gold-main); border:1px solid var(--gold-main); margin-top:15px; border-radius:12px; padding:8px 18px;">註記</button>
      </div>`;
    }).join('');
  }

  function cycleNormal(id) {
      const d = _attData[id]; const cycle = ['present', 'late10', 'late30', 'absent', 'leave'];
      let idx = cycle.indexOf(d.status); d.status = cycle[(idx + 1) % 5];
      const sums = { 'present':0, 'late10':10, 'late30':30, 'absent':100, 'leave':0 };
      d.sum = sums[d.status]; renderAttGrid();
  }

  function toggleSpecial(id, type) {
      const d = _attData[id];
      if(type === 'early') d.early = !d.early; if(type === 'p1') d.p1 = !d.p1;
      d.sum = (d.early?10:0) + (d.p1?20:0) + (d.extra*10); renderAttGrid();
  }
  function addExtra(id) { _attData[id].extra++; _attData[id].sum += 10; renderAttGrid(); }
  function resetSpecial(id) { _attData[id] = { type: 'special', sum: 0, early: false, p1: false, extra: 0, note: _attData[id].note }; renderAttGrid(); }

  function submitAtt() {
      const t = new Date().toLocaleDateString();
      Object.entries(_attData).forEach(([id, d]) => {
          if(d.sum > 0) {
              let reason = d.type === 'normal' ? { 'late10':"早遲(音三班費)", 'late30':"全遲(音三班費)", 'absent':"缺席(畢音罰款)" }[d.status] : `特殊計費(早遲+第一節+${d.extra}節) (班費)`;
              _db.ref(`students/${id}`).update({ totalFine: (_all[id].totalFine||0) + d.sum });
              _db.ref(`students/${id}/history`).push({ type: `${t} ${reason}`, amt: d.sum, time: t });
          }
          if(d.note) _db.ref(`students/${id}/history`).push({ type: `${t} 老師註記`, note: d.note, time: t });
      });
      _attData = {}; alert("💾 紀錄已成功儲存並加上編號！"); go('list');
  }

  // 基礎系統函式
  function updateModalContent(id) { const s = _all[id]; const debt = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0); document.getElementById('modal-body').innerHTML = `<div style="text-align:center;"><div style="font-size:70px; font-weight:900; color:var(--accent-red);">$${debt}</div></div><div style="margin-top:20px; font-size:20px; line-height:1.6;">基金：${s.fundPaid?'✅已繳':'❌未繳'}<br>剩餘機會：${s.leaveQuota||0}次</div>`; const h = s.history?Object.values(s.history).reverse():[]; document.getElementById('modal-history').innerHTML = h.map(i => `<div style="padding:15px 0; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;"><span><b style="color:var(--gold-main)">${i.type}</b></span><span style="text-align:right; color:var(--gold-light);">$${i.amt||0}</span></div>`).join('') || '無紀錄'; }
  function resetAllAccounting() { if(confirm("確定帳目重設？名單保留。")) { Object.keys(_all).forEach(id => _db.ref(`students/${id}`).update({ totalFine:0, propFine:0, paidAmt:0, leaveQuota:2, fundPaid:false, propNote:"", history:null, password:null })); alert("歸零成功！"); } }
  function forceRestoreList(isAuto=false) { if(!isAuto && !confirm("確定修復名單？")) return; ALL_NAMES.forEach((n, index) => { const exists = Object.values(_all).find(s => s.name === n); if(!exists) _db.ref('students').push({ no:index+1, name:n, totalFine:0, propFine:0, paidAmt:0, leaveQuota:2, fundPaid:false }); }); }
  function searchStudent() { const n = document.getElementById('stu-name').value.trim(); const f = Object.entries(_all).find(([id, s]) => s.name === n); if(!f) return alert("查無姓名"); _user = f[0]; document.getElementById('step-name').style.display = 'none'; if(!_all[_user].password) document.getElementById('step-first-set').style.display = 'block'; else document.getElementById('step-auth').style.display = 'block'; }
  function setPassword() { const p = document.getElementById('first-pwd').value; if(p.length !== 4) return alert("請設4位數字"); _db.ref(`students/${_user}`).update({ password: p }); renderUser(); }
  function authStudent() { if(_all[_user].password === document.getElementById('auth-pwd').value) renderUser(); else alert("錯誤"); }
  function renderUser() {
    const s = _all[_user]; const debt = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0); const h = s.history?Object.values(s.history).reverse():[];
    document.getElementById('student-login').style.display = 'none';
    document.getElementById('student-info').innerHTML = `<div class="login-card" style="text-align:center;"><div style="font-size:30px; font-weight:bold; color:var(--gold-main);">${s.name}</div><div style="font-size:90px; font-weight:900; margin:10px 0; color:var(--accent-red);">$${debt}</div><div class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}">基金：${s.fundPaid?'已繳清':'未繳'}</div></div><div style="margin-top:30px; font-weight:bold; color:var(--gold-light); font-size:26px; text-align:center;">📜 帳目明細表</div>` + h.map(i => `<div style="padding:20px 0; border-bottom:1px solid #333; font-size:22px; display:flex; justify-content:space-between;"><span><b>${i.type}</b></span><span style="text-align:right; color:var(--gold-light);">${i.amt?'$'+i.amt:''}</span></div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }
  function openModal(id) { _currentModalId = id; document.getElementById('modal-name').innerText = `${_all[id].no}. ${_all[id].name}`; updateModalContent(id); document.getElementById('detail-modal').style.display = 'block'; }
  function closeModal() { document.getElementById('detail-modal').style.display='none'; _currentModalId=null; }
  function manualAddFineFromModal() { const amt = prompt("金額："); const r = prompt("原因："); if(amt) { _db.ref(`students/${_currentModalId}`).update({ totalFine:(_all[_currentModalId].totalFine||0)+parseInt(amt) }); _db.ref(`students/${_currentModalId}/history`).push({ type: `${new Date().toLocaleDateString()} ${r}`, amt: parseInt(amt), time: new Date().toLocaleDateString() }); } }
  function setPropFromModal() { const amt = prompt("金額："); const note = prompt("說明："); if(amt) _db.ref(`students/${_currentModalId}`).update({ propFine:parseInt(amt), propNote:note }); }
  function adminPaidFromModal() { const amt = prompt("收錢："); if(amt) { _db.ref(`students/${_currentModalId}`).update({ paidAmt:(_all[_currentModalId].paidAmt||0)+parseInt(amt) }); _db.ref(`students/${_currentModalId}/history`).push({ type: `${new Date().toLocaleDateString()} 收訖現金`, amt: parseInt(amt), time: new Date().toLocaleDateString() }); } }
  function adminDeduct(id, target) { const s = _all[id]; const q = s.leaveQuota || 2; if (q <= target) { if(confirm("取消折抵？")) _db.ref(`students/${id}`).update({ leaveQuota: q + 1, totalFine: (s.totalFine || 0) + 100 }); } else { if(confirm("確定折抵 $100？")) { _db.ref(`students/${id}`).update({ leaveQuota: q - 1, totalFine: Math.max(0, (s.totalFine || 0) - 100) }); _db.ref(`students/${id}/history`).push({ type: `${new Date().toLocaleDateString()} 機會折抵`, amt: -100, time: new Date().toLocaleDateString() }); } } }
  function toggleFund(id, cur) { _db.ref(`students/${id}`).update({ fundPaid: !cur }); }
  function go(p, el) { ['list', 'att', 'rep', 'set'].forEach(i => document.getElementById('pane-' + i).style.display = 'none'); document.getElementById('pane-' + p).style.display = 'block'; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); if (el) el.classList.add('active'); if (p === 'att') renderAttGrid(); }
  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; }
  function press(v) { if(v==='del') _pin=_pin.slice(0,-1); else if(_pin.length<4) _pin+=v; const ds=document.getElementById('pwd-dots').children; for(let i=0; i<4; i++) ds[i].style.background=i<_pin.length?'var(--gold-main)':'none'; if(_pin.length===4) { if(_pin===_mPin) { document.getElementById('lock-overlay').style.display='none'; document.getElementById('view-student').style.display='none'; document.getElementById('view-admin').style.display='block'; go('list'); } else { alert("錯誤"); _pin=""; } } }
  function renderFullReport() { const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99)); let total = 0; let html = ""; sorted.forEach(([id, s]) => { if(s.no === 42) html += `<div style="text-align:center; color:var(--gold-main); font-weight:900; margin:15px 0;">演三莊名單</div>`; const fund = (s.fundPaid?0:1300); const d = (s.totalFine||0) + (s.propFine||0) + fund - (s.paidAmt||0); total += d; html += `<div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #222;"><span>${s.no}. ${s.name}</span><span style="color:${d>0?'var(--accent-red)':'#666'}">$${d}</span></div>`; }); document.getElementById('full-report-list').innerHTML = html; document.getElementById('total-sum-badge').innerText = '$' + total; }
  function doExcel() { const d = [["座號", "姓名", "基金", "欠費"]]; Object.values(_all).sort((a,b)=>a.no-b.no).forEach(s => { const fund = (s.fundPaid?0:1300); d.push([s.no, s.name, s.fundPaid?'已繳':'未繳', (s.totalFine||0)+(s.propFine||0)+fund-(s.paidAmt||0)]); }); const ws = XLSX.utils.aoa_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表"); XLSX.writeFile(wb, "公演帳目.xlsx"); }
  function setNote(e, id) { e.stopPropagation(); const n = prompt("註記內容：", _attData[id].note); if(n!==null) { _attData[id].note = n; renderAttGrid(); } }
</script>
</body>
</html>
