<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>音演三莊公演管理系統 V4.2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root { 
    --bg-dark: #0a0a0a; --gold-main: #d4af37; --gold-light: #fbeea7; 
    --clr-present: #10b981; --clr-late10: #f59e0b; --clr-late30: #f97316; 
    --clr-absent: #ef4444; --clr-leave: #3b82f6;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    margin: 0; padding: 0; width: 100%; min-height: 100%; 
    background: radial-gradient(circle at top right, #332b12 0%, #0a0a0a 100%); 
    background-attachment: fixed; color: #fff; font-family: 'Noto Sans TC', sans-serif;
  }
  
  /* 修正主容器，確保不歪斜 */
  .app-container { 
    width: 100%; max-width: 500px; margin: 0 auto;
    padding: 20px; position: relative; z-index: 10;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  
  .deco-symbol { position: fixed; color: var(--gold-main); opacity: 0.1; pointer-events: none; z-index: 0; font-weight: 900; }

  .header { text-align: center; margin: 40px 0 20px; }
  .main-title { 
    font-size: 38px; font-weight: 900; 
    background: linear-gradient(to bottom, var(--gold-light), var(--gold-main)); 
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
    text-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); line-height: 1.2;
  }

  /* 登入卡片穩定佈局 */
  .login-card { 
    background: rgba(255, 255, 255, 0.08); border-radius: 40px; padding: 40px 25px; 
    border: 2px solid var(--gold-main); backdrop-filter: blur(20px); 
    margin: 10px 0; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
    width: 100%;
  }

  input { 
    width: 100%; padding: 20px; border-radius: 20px; 
    border: 3px solid var(--gold-main); background: rgba(0,0,0,0.7); 
    color: #fff; font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; 
  }
  .btn-gold { 
    width: 100%; padding: 20px; border-radius: 20px; 
    background: linear-gradient(135deg, var(--gold-light), var(--gold-main)); 
    color: #000; font-weight: 900; font-size: 24px; border: none; cursor: pointer; 
  }

  /* 管理介面與點名方格 */
  .admin-panel { display: none; padding-bottom: 160px; }
  .list-item { 
    background: rgba(255,255,255,0.08); padding: 22px; border-radius: 30px; 
    margin-bottom: 15px; border-left: 10px solid var(--gold-main); 
  }
  .name-link { font-size: 30px; font-weight: 900; color: var(--gold-light); cursor: pointer; text-decoration: underline; }

  .att-box { 
    padding: 30px 10px 15px; border-radius: 25px; border: 2px solid #444; 
    text-align: center; margin-bottom: 5px; position: relative; min-height: 150px;
    display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s;
  }
  .box-no { position: absolute; top: 12px; left: 15px; font-size: 13px; font-weight: 900; color: #fff; }
  .att-status-text { font-size: 22px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

  /* 狀態顏色 */
  .state-present { background-color: rgba(16, 185, 129, 0.2); border-color: var(--clr-present); }
  .state-late10 { background-color: rgba(245, 158, 11, 0.4); border-color: var(--clr-late10); }
  .state-late30 { background-color: rgba(249, 115, 22, 0.6); border-color: var(--clr-late30); }
  .state-absent { background-color: rgba(239, 68, 68, 0.6); border-color: var(--clr-absent); }
  .state-leave { background-color: rgba(59, 130, 246, 0.4); border-color: var(--clr-leave); }

  /* 免死金牌區域 */
  .death-row { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
  .death-plaque { 
    flex: 1; height: 70px; border: 2px solid var(--gold-main); border-radius: 15px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold; color: var(--gold-main);
  }
  .death-plaque.used { background: #333; color: #666; border-color: #555; }
  .death-plaque.active { background: linear-gradient(135deg, #443a1a, #000); }

  .nav-bar { 
    position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
    background: rgba(10,10,10,0.98); border-top: 2px solid #333; 
    display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; 
  }
  .nav-item { flex: 1; text-align: center; font-size: 18px; color: #777; align-self: center; cursor: pointer; }
  .nav-item.active { color: var(--gold-main); font-weight: 900; }

  .status-tag { padding: 6px 12px; border-radius: 10px; font-size: 14px; font-weight: bold; }
  .tag-unpaid { background: #ef4444; color: #fff; }
  .tag-paid { background: #10b981; color: #fff; }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; }
  .modal-content { background: #111; border-radius: 40px; padding: 30px; border: 3px solid var(--gold-main); max-width: 600px; margin: 40px auto 0; }
</style>
</head>
<body>

  <div class="deco-symbol" style="top:5%; left:5%; font-size:80px;">🎹</div>
  <div class="deco-symbol" style="top:25%; right:8%; font-size:100px;">𝄞</div>
  <div class="deco-symbol" style="bottom:20%; left:10%; font-size:90px;">🎸</div>

  <div class="app-container" id="view-student">
    <div class="header"><div class="main-title">音演三莊<br>公演管理系統</div></div>
    
    <div id="student-login-area">
      <div class="login-card" id="student-login">
          <div style="text-align:center; font-size:80px; margin-bottom:10px;">🎻</div>
          <div id="step-name">
              <span style="display:block; text-align:center; color:var(--gold-main); margin-bottom:20px; font-size:22px; font-weight:bold;">個人帳目與細項查詢</span>
              <input type="text" id="stu-name" placeholder="請輸入姓名">
              <button class="btn-gold" onclick="searchStudent()">登入查詢</button>
          </div>
          <div id="step-first-set" style="display:none">
              <p style="text-align:center; font-size:20px;">首次登入，設定密碼</p>
              <input type="password" id="first-pwd" placeholder="4 位數字" maxlength="4" inputmode="numeric">
              <button class="btn-gold" onclick="setPassword()">設定完成</button>
          </div>
          <div id="step-auth" style="display:none">
              <p id="auth-welcome" style="text-align:center; font-size:22px; color:var(--gold-light);"></p>
              <input type="password" id="auth-pwd" placeholder="輸入密碼" maxlength="4" inputmode="numeric">
              <button class="btn-gold" onclick="authStudent()">驗證進入</button>
          </div>
      </div>
    </div>
    
    <div id="student-info" style="display:none"></div>
    <div style="margin-top:auto; text-align:center; padding:30px 0; color:#444; font-size:18px; font-weight:bold;" onclick="showLock()">SYSTEM ADMIN</div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-size:30px; color:var(--gold-main);">管理端</h2>
        <button onclick="location.reload()" style="background:none; border:2px solid #555; color:#888; border-radius:15px; padding:8px 15px;">登出</button>
    </div>
    
    <div id="pane-list"><div id="h-l"></div></div> 
    
    <div id="pane-att" style="display:none">
        <div id="att-grid" style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px;"></div>
        <button class="btn-gold" style="background:var(--clr-present); color:#fff; height:100px; margin-top:30px; font-size:30px;" onclick="submitAtt()">💾 儲存點名紀錄</button>
    </div>

    <div id="pane-rep" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;"><h3>欠費報表</h3><div id="total-sum-badge" style="background:#ef4444; padding:10px 20px; border-radius:20px; font-weight:bold; font-size:24px;">$0</div></div>
        <div id="full-report-list" class="login-card" style="padding:20px; height: 50vh; overflow-y: auto; text-align: left;"></div>
        <button class="btn-gold" style="background:#248a3d; color:#fff; margin-top:20px;" onclick="doDetailedExcel()">📊 下載對帳 Excel</button>
    </div>

    <div id="pane-set" style="display:none">
        <div class="login-card">
            <button class="btn-gold" onclick="resetAllAccounting()" style="background:#ef4444; color:#fff; margin-bottom:40px;">🛑 帳目全歸零(欠1300)</button>
            <button class="btn-gold" onclick="forceRestoreList()" style="background:#10b981; color:#fff;">🔧 修復 55 人名單</button>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item active" onclick="go('list',this)">👥 名單</div>
        <div class="nav-item" onclick="go('att',this)">📅 點名</div>
        <div class="nav-item" onclick="go('rep',this)">📊 報表</div>
        <div class="nav-item" onclick="go('set',this)">⚙️ 設定</div>
    </div>
  </div>

  <div id="detail-modal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h3 id="modal-name" style="margin:0; color:var(--gold-main); font-size:32px;"></h3>
            <button onclick="closeModal()" style="background:none; border:none; color:#888; font-size:40px;">✕</button>
        </div>
        <div id="modal-body"></div>
        <div style="display:grid; grid-template-columns: 1fr; gap:12px; margin-top:20px;">
            <button class="btn-gold" style="background:#444; font-size:20px;" onclick="manualAddFineFromModal()">手動雜費</button>
            <button class="btn-gold" style="background:#222; font-size:20px;" onclick="setPropFromModal()">道具費設定</button>
            <button class="btn-gold" style="font-size:20px;" onclick="adminPaidFromModal()">現金收訖</button>
        </div>
        <div style="margin-top:25px; border-top:1px solid #333; padding-top:20px;"><b style="font-size:20px;">對帳細項：</b><div id="modal-history" style="font-size:18px; margin-top:10px; max-height:200px; overflow-y:auto;"></div></div>
    </div>
  </div>

  <div id="lock-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:3000; flex-direction:column; align-items:center; justify-content:center;">
      <div id="pwd-dots" style="display:flex; gap:25px; margin-bottom:50px"><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div></div>
      <div style="display:grid; grid-template-columns:repeat(3,90px); gap:25px"><script>for(let i=1; i<=9; i++) document.write(`<button style="width:80px;height:80px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:32px;border:1px solid #444;" onclick="press(${i})">${i}</button>`);</script><button onclick="document.getElementById('lock-overlay').style.display='none'">✕</button><button style="width:80px;height:80px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:32px;" onclick="press(0)">0</button><button onclick="press('del')">⌫</button></div>
  </div>

<script>
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {}, _currentModalId = null;

  const ALL_NAMES = ["毛語程","林叡成","田宇紘","吳昆達","吳宥良","黃崇恩","林宏澤","金品澔","劉宸昀","蔡呈樂","蘇瑞吾","梁之凡","蔡宗佑","黃穩達","馮康維","倪秉澤","廖敏君","劉慶霈","蔡慧琳","鄭淳融","魏宜宸","徐婉瑜","安兪臻","江岑君","池宛昕","李曉萍","周玄禮","王以昕","林祐立","邱詩涵","胡云珊","蔡逸宣","高慧君","張路淇","陳芃瑾","陳雨彤","陳宥安","陳圓卿","傅克諳","曾妘湘", "蕭旭成", "王玟茜","王語舒","姚宥湘","陳思妤","楊镕慈","王偉家","何建伸","姜榮绅","郭庭傑","陳泊源","陳軍任","黃治容","盧宥辰","謝行知"];

  _db.ref('students').on('value', s => {
      _all = s.val() || {};
      if(Object.keys(_all).length === 0) forceRestoreList(true);
      renderAdminList(); renderFullReport(); if(_user) renderUser();
      if(_currentModalId) updateModalContent(_currentModalId);
  });

  function renderAdminList() {
    const l = document.getElementById('h-l'); if(!l) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    let html = "";
    sorted.forEach(([id, s]) => {
      if(s.no === 42) html += `<div style="text-align:center; color:var(--gold-main); font-weight:900; font-size:24px; margin:30px 0;">—— 演三莊名單 ——</div>`;
      const debt = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0);
      html += `<div class="list-item">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div class="name-link">${s.no}. ${s.name}</div>
            <span onclick="toggleFund('${id}', ${s.fundPaid})" class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}">${s.fundPaid?'基金已繳':'欠 1300'}</span>
        </div>
        <div class="death-row">
            <div class="death-plaque ${s.leaveQuota<=1?'used':'active'}" onclick="adminDeduct('${id}',1)">${s.leaveQuota<=1?'已抵銷一':'🏅 免死金牌一'}</div>
            <div class="death-plaque ${s.leaveQuota<=0?'used':'active'}" onclick="adminDeduct('${id}',0)">${s.leaveQuota<=0?'已抵銷二':'🏅 免死金牌二'}</div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <button onclick="openModal('${id}')" style="background:#444; color:#fff; border:none; padding:8px 15px; border-radius:10px; font-size:14px;">管理/雜費</button>
            <b style="color:#ef4444; font-size:32px;">$${debt}</b>
        </div>
      </div>`;
    });
    l.innerHTML = html;
  }

  function renderAttGrid() {
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    document.getElementById('att-grid').innerHTML = sorted.map(([id, s]) => {
      if (!_attData[id]) {
          if (s.name === '蔡慧琳') _attData[id] = { type: 'special', sum: 0, note: '' };
          else _attData[id] = { type: 'normal', status: 'present', sum: 0, note: '' };
      }
      const d = _attData[id];
      if (s.name === '蔡慧琳') {
          return `<div class="att-box state-late10"><span class="box-no">19</span><b style="font-size:24px;">${s.name}</b><div style="font-size:18px; font-weight:900;">累計 $${d.sum}</div>
            <div style="display:flex; gap:3px; justify-content:center; margin-top:5px;">
                <button style="font-size:10px; border:1px solid #d4af37; background:#000; color:#d4af37;" onclick="addHui('${id}',10)">早+10</button>
                <button style="font-size:10px; border:1px solid #d4af37; background:#000; color:#d4af37;" onclick="addHui('${id}',20)">一+20</button>
                <button style="font-size:10px; border:1px solid #d4af37; background:#000; color:#d4af37;" onclick="addHui('${id}',10)">續+10</button>
            </div>
            <button onclick="setNote(event,'${id}')" style="font-size:11px; margin-top:8px; background:#444; border:none; border-radius:5px; padding:5px;">註記</button>
          </div>`;
      }
      const stMap = { 'present':['出席','state-present'], 'late10':['早遲 10','state-late10'], 'late30':['全遲 30','state-late30'], 'absent':['缺席 100','state-absent'], 'leave':['請假 0','state-leave'] };
      return `<div onclick="cycleNormal('${id}')" class="att-box ${stMap[d.status][1]}">
        <span class="box-no">${s.no}</span><b style="font-size:24px;">${s.name}</b>
        <span class="att-status-text">${stMap[d.status][0]}</span>
        <button onclick="setNote(event,'${id}')" style="font-size:11px; margin-top:8px; background:rgba(0,0,0,0.2); border:1px solid #fff; color:#fff; border-radius:5px; padding:5px;">註記</button>
      </div>`;
    }).join('');
  }

  function cycleNormal(id) { const d = _attData[id]; const cycle = ['present', 'late10', 'late30', 'absent', 'leave']; let idx = cycle.indexOf(d.status); d.status = cycle[(idx + 1) % 5]; d.sum = { 'present':0, 'late10':10, 'late30':30, 'absent':100, 'leave':0 }[d.status]; renderAttGrid(); }
  function addHui(id, val) { _attData[id].sum += val; renderAttGrid(); }

  function submitAtt() {
      const t = new Date().toLocaleDateString();
      Object.entries(_attData).forEach(([id, d]) => {
          if(d.sum > 0) {
              let reason = d.type === 'normal' ? { 'late10':"早遲(班費)", 'late30':"全遲(班費)", 'absent':"缺席(畢音罰款)" }[d.status] : "特殊計費(班費)";
              _db.ref(`students/${id}`).update({ totalFine: (_all[id].totalFine||0) + d.sum });
              _db.ref(`students/${id}/history`).push({ type: reason, amt: d.sum, time: t });
          }
          if(d.note) _db.ref(`students/${id}/history`).push({ type: "點名註記", note: d.note, time: t });
      });
      _attData = {}; alert("💾 紀錄已儲存！"); go('list');
  }

  function renderUser() {
    const s = _all[_user]; const fund = s.fundPaid ? 0 : 1300; const debt = (s.totalFine||0) + (s.propFine||0) + fund - (s.paidAmt||0); const h = s.history?Object.values(s.history).reverse():[];
    document.getElementById('student-login-area').style.display = 'none';
    document.getElementById('student-info').innerHTML = `<div class="login-card" style="text-align:center;"><div style="font-size:28px; font-weight:bold; color:var(--gold-main);">${s.name} 同學</div><div style="font-size:80px; font-weight:900; margin:10px 0; color:#ef4444;">$${debt}</div><div class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}">基金：${s.fundPaid?'已繳清':'未繳納'}</div><div style="margin-top:20px; font-size:18px;">我的免死金牌：</div><div class="death-row"><div class="death-plaque ${s.leaveQuota<=1?'used':'active'}">${s.leaveQuota<=1?'已使用一':'🏅 免死金牌一'}</div><div class="death-plaque ${s.leaveQuota<=0?'used':'active'}">${s.leaveQuota<=0?'已使用二':'🏅 免死金牌二'}</div></div></div><div style="margin-top:30px; font-weight:bold; color:var(--gold-light); font-size:24px; text-align:center;">📜 明細紀錄</div>` + h.map(i => `<div style="padding:15px 0; border-bottom:1px solid #333; font-size:20px; display:flex; justify-content:space-between;"><span><b>${i.type}</b></span><span style="text-align:right;">${i.amt?'$'+i.amt:''}</span></div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }

  function go(p, el) { 
    ['list', 'att', 'rep', 'set'].forEach(i => document.getElementById('pane-' + i).style.display = 'none'); 
    document.getElementById('pane-' + p).style.display = 'block'; 
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
    if (el) el.classList.add('active'); if (p === 'att') renderAttGrid(); 
  }

  function forceRestoreList(isAuto=false) { ALL_NAMES.forEach((n, idx) => { if(!Object.values(_all).find(s => s.name === n)) _db.ref('students').push({ no:idx+1, name:n, totalFine:0, propFine:0, paidAmt:0, leaveQuota:2, fundPaid:false }); }); if(!isAuto) alert("修復完成"); }
  function resetAllAccounting() { if(confirm("確定帳目重設？")) { Object.keys(_all).forEach(id => _db.ref(`students/${id}`).update({ totalFine:0, propFine:0, paidAmt:0, leaveQuota:2, fundPaid:false, propNote:"", history:null, password:null })); } }
  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; }
  function press(v) { if(v==='del') _pin=_pin.slice(0,-1); else if(_pin.length<4) _pin+=v; const ds=document.getElementById('pwd-dots').children; for(let i=0; i<4; i++) ds[i].style.background=i<_pin.length?'var(--gold-main)':'none'; if(_pin.length===4) { if(_pin===_mPin) { document.getElementById('lock-overlay').style.display='none'; document.getElementById('view-student').style.display='none'; document.getElementById('view-admin').style.display='block'; go('list'); } else { alert("錯誤"); _pin=""; } } }
  function searchStudent() { const n = document.getElementById('stu-name').value.trim(); const f = Object.entries(_all).find(([id, s]) => s.name === n); if(!f) return alert("查無姓名"); _user = f[0]; document.getElementById('step-name').style.display='none'; if(!_all[_user].password) document.getElementById('step-first-set').style.display='block'; else document.getElementById('step-auth').style.display='block'; }
  function setPassword() { const p = document.getElementById('first-pwd').value; if(p.length !== 4) return alert("4位數字"); _db.ref(`students/${_user}`).update({ password: p }); renderUser(); }
  function authStudent() { if(_all[_user].password === document.getElementById('auth-pwd').value) renderUser(); else alert("密碼錯誤"); }
  function toggleFund(id, cur) { _db.ref(`students/${id}`).update({ fundPaid: !cur }); }
  function adminDeduct(id, target) { const s = _all[id]; const q = s.leaveQuota || 2; if (q <= target) { if(confirm("取消？")) _db.ref(`students/${id}`).update({ leaveQuota: q + 1, totalFine: (s.totalFine || 0) + 100 }); } else { if(confirm("抵銷100？")) { _db.ref(`students/${id}`).update({ leaveQuota: q - 1, totalFine: Math.max(0, (s.totalFine || 0) - 100) }); _db.ref(`students/${id}/history`).push({ type: "金牌抵銷", amt: -100, time: new Date().toLocaleDateString() }); } } }
  function openModal(id) { _currentModalId = id; document.getElementById('modal-name').innerText = `${_all[id].no}. ${_all[id].name}`; updateModalContent(id); document.getElementById('detail-modal').style.display = 'block'; }
  function updateModalContent(id) { const s = _all[id]; const d = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0); document.getElementById('modal-body').innerHTML = `<div style="text-align:center;"><div style="font-size:70px; font-weight:900; color:#ef4444;">$${d}</div></div><div style="margin-top:20px; font-size:18px;">基金：${s.fundPaid?'已繳':'未繳'}<br>金牌：${s.leaveQuota||0}面</div>`; const h = s.history?Object.values(s.history).reverse():[]; document.getElementById('modal-history').innerHTML = h.map(i => `<div style="padding:10px 0; border-bottom:1px solid #333;"><span><b>${i.type}</b></span></div>`).join(''); }
  function closeModal() { document.getElementById('detail-modal').style.display='none'; _currentModalId=null; }
  function renderFullReport() { let total = 0; let html = ""; Object.entries(_all).sort((a,b)=>a[1].no-b[1].no).forEach(([id, s]) => { const fund = s.fundPaid?0:1300; const d = (s.totalFine||0)+(s.propFine||0)+fund-(s.paidAmt||0); total += d; html += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222;"><span>${s.no}. ${s.name}</span><span style="color:#ef4444;">$${d}</span></div>`; }); document.getElementById('total-sum-badge').innerText = '$' + total; document.getElementById('full-report-list').innerHTML = html; }
  function setNote(e, id) { e.stopPropagation(); const n = prompt("內容：", _attData[id].note); if(n!==null) { _attData[id].note = n; renderAttGrid(); } }
  function manualAddFineFromModal() { const amt = prompt("金額："); const r = prompt("原因："); if(amt) { _db.ref(`students/${_currentModalId}`).update({ totalFine:(_all[_currentModalId].totalFine||0)+parseInt(amt) }); _db.ref(`students/${_currentModalId}/history`).push({ type: r, amt: parseInt(amt), time: new Date().toLocaleDateString() }); } }
  function setPropFromModal() { const amt = prompt("金額："); const note = prompt("說明："); if(amt) _db.ref(`students/${_currentModalId}`).update({ propFine:parseInt(amt), propNote:note }); }
  function adminPaidFromModal() { const amt = prompt("金額："); if(amt) { _db.ref(`students/${_currentModalId}`).update({ paidAmt:(_all[_currentModalId].paidAmt||0)+parseInt(amt) }); _db.ref(`students/${_currentModalId}/history`).push({ type: "現金收訖", amt: parseInt(amt), time: new Date().toLocaleDateString() }); } }
  function doDetailedExcel() { const data = [["座號", "姓名", "日期", "項目", "金額"]]; Object.values(_all).sort((a,b)=>a.no-b.no).forEach(s => { if(s.history) Object.values(s.history).forEach(h => data.push([s.no, s.name, h.time||"-", h.type||"", h.amt||0])); }); const ws = XLSX.utils.aoa_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "對帳"); const d = new Date(); XLSX.writeFile(wb, `音演三莊帳目_${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}.xlsx`); }
</script>
</body>
