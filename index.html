<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>112年莊敬高職音樂畢業公演</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root {
    --bg-black: #050505;
    --gold-bright: #fbeea7;
    --gold-matte: #d4af37;
    --accent-red: #ff3b30;
    --glass: rgba(255, 255, 255, 0.06);
  }

  /* 滿版設定 & 音樂科背景升級 */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: var(--bg-black); color: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    overflow-x: hidden;
  }

  body {
    /* 深金色漸層底 */
    background: radial-gradient(circle at top right, #3a2e11 0%, #050505 100%);
    /* 1. 樂器與音符浮水印背景 (使用 SVG 繪製，無須外連圖檔) */
    background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 20 L20 20 L20 10 M80 80 L80 90 L90 90 M30 70 Q 35 75, 40 70 T 50 70 Q 55 75, 60 70 M15 50 A 5 5 0 1 1 25 50 A 5 5 0 1 1 15 50 M75 30 Q 80 35, 85 30 T 95 30' stroke='%23d4af37' stroke-width='0.5' fill='none' opacity='0.08'/%3E%3Ctext x='5' y='95' font-family='serif' font-size='30' fill='%23d4af37' opacity='0.06'%3E𝄞%3C/text%3E%3Ctext x='70' y='25' font-family='serif' font-size='20' fill='%23d4af37' opacity='0.05'%3E𝄢%3C/text%3E%3C/svg%3E");
    background-attachment: fixed;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
  }

  .app-container {
    flex: 1; width: 100%; padding: 20px;
    display: flex; flex-direction: column;
  }

  /* 標題區美化 */
  .header { text-align: center; margin: 30px 0; }
  .main-title { font-size: 24px; font-weight: 900; color: var(--gold-bright); letter-spacing: 1px; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
  .sub-title { font-size: 13px; color: var(--gold-matte); letter-spacing: 4px; opacity: 0.8; margin-top: 5px; font-weight: bold; }

  /* 滿版毛玻璃卡片 */
  .main-card {
    background: var(--glass);
    border-radius: 24px;
    padding: 30px 20px;
    border: 1px solid rgba(212, 175, 55, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    width: 100%;
  }

  input {
    width: 100%; padding: 18px; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.3); color: #fff;
    font-size: 18px; margin-bottom: 20px; transition: 0.3s;
  }
  input:focus { border-color: var(--gold-matte); outline: none; background: rgba(0,0,0,0.5); }

  .btn-primary {
    width: 100%; padding: 18px; border-radius: 16px;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold-matte));
    color: #000; font-weight: 900; font-size: 18px; border: none;
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2); transition: 0.2s;
  }
  .btn-primary:active { transform: scale(0.98); box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); }

  /* 2. 音符通知效果改進 */
  .badge-note {
    font-family: serif; font-size: 18px; color: var(--accent-red);
    margin-left: 8px; box-shadow: 0 0 10px var(--accent-red);
    animation: notePulse 1.5s infinite;
  }
  @keyframes notePulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

  /* 管理員按鈕 - 縮小到底部 */
  .admin-btn {
    margin: auto 0 20px 0; text-align: center;
    color: rgba(255,255,255,0.15); font-size: 12px; letter-spacing: 2px;
    cursor: pointer;
  }

  /* 管理後台 UI */
  .admin-panel { display: none; padding-bottom: 100px; }
  .list-item {
    background: rgba(255,255,255,0.04); padding: 18px; border-radius: 18px;
    margin-bottom: 12px; border-left: 4px solid var(--gold-matte);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  /* 導覽列 */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: rgba(10,10,10,0.95); border-top: 1px solid #222;
    display: flex; padding: 15px 0 env(safe-area-inset-bottom);
    backdrop-filter: blur(10px); z-index: 100;
  }
  .nav-item { flex: 1; text-align: center; font-size: 12px; color: #555; cursor: pointer; }
  .nav-item.active { color: var(--gold-matte); font-weight: bold; text-shadow: 0 0 5px var(--gold-matte); }

  /* 鎖屏彈窗 */
  #lock-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    backdrop-filter: blur(15px);
  }
  .btn-n {
      width: 75px; height: 75px; border-radius: 50%;
      background: rgba(28,28,30,0.8); color: #fff;
      border: 1px solid rgba(212,175,55,0.1); font-size: 26px;
      transition: 0.2s; font-family: 'serif';
  }
  .btn-n:active { background: rgba(212,175,55,0.05); border-color: var(--gold-matte); }
</style>
</head>
<body>

  <div class="app-container" id="view-student">
    <div class="header">
      <div class="main-title">112年莊敬高職音樂畢業公演</div>
      <div class="sub-title">STUDENT PORTAL</div>
    </div>

    <div id="student-login" class="main-card">
        <div id="login-step1">
            <input type="text" id="stu-name" placeholder="請輸入姓名">
            <button class="btn-primary" onclick="searchStudent()">查詢出席狀態</button>
        </div>
        <div id="login-step2" style="display:none">
            <p id="stu-welcome" style="text-align:center; color:var(--gold-bright); margin-bottom:15px; font-weight:bold;"></p>
            <input type="password" id="stu-pwd" placeholder="輸入 4 位密碼" inputmode="numeric" maxlength="4">
            <button class="btn-primary" onclick="authStudent()">進入個人帳本</button>
        </div>
    </div>

    <div id="student-info" style="display:none"></div>

    <div class="admin-btn" onclick="showLock()">SYSTEM ADMIN ACCESS</div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="color:var(--gold-matte); margin:0">後台管理</h2>
        <span style="font-size:12px; color:#555">莊敬音樂科</span>
    </div>
    
    <div id="pane-list"></div> <div id="pane-att" style="display:none">
        <h3>今日點名</h3>
        <div id="att-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;"></div>
        <button class="btn-primary" style="margin-top:25px" onclick="submitAtt()">💾 儲存點名紀錄</button>
    </div>

    <div id="pane-rep" style="display:none">
        <h3>財務統計</h3>
        <div class="main-card" style="text-align:center">
            <div id="total-sum" style="font-size:48px; color:var(--accent-red); font-weight:900; text-shadow:0 0 15px rgba(255,59,48,0.3)">$0</div>
            <div id="debt-list" style="text-align:left; font-size:14px; margin-top:25px; color:#ccc; border-top:1px solid #222; padding-top:15px"></div>
        </div>
        <button class="btn-primary" style="margin-top:15px; background:linear-gradient(135deg, #34c759, #248a3d);" onclick="doExcel()">📊 匯出 Excel 報表</button>
    </div>

    <div id="pane-set" style="display:none">
        <h3>系統設定</h3>
        <button class="btn-primary" onclick="setAdminPwd()">🔐 修改管理密碼</button>
        <button class="btn-primary" style="margin-top:15px; background:#333; color:#fff;" onclick="backToStudent()">← 返回學生查詢入口</button>
        <button class="btn-primary" style="margin-top:35px; background:var(--accent-red); color:#fff;" onclick="fullReset()">🛑 清除所有學生資料</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="go('list',this)">👥 名單</div>
        <div class="nav-item" onclick="go('att',this)">📅 點名</div>
        <div class="nav-item" onclick="go('rep',this)">📊 報表</div>
        <div class="nav-item" onclick="go('set',this)">⚙️ 設定</div>
    </div>
  </div>

  <div id="lock-overlay">
      <div style="font-size:40px; color:var(--gold-matte); margin-bottom:10px">𝄞</div>
      <div style="color:var(--gold-bright); margin-bottom:25px; letter-spacing:1px; font-weight:bold">管理員驗證</div>
      <div id="pwd-dots" style="display:flex; gap:18px; margin-bottom:35px">
          <div style="width:18px; height:18px; border:2px solid #555; border-radius:50%"></div>
          <div style="width:18px; height:18px; border:2px solid #555; border-radius:50%"></div>
          <div style="width:18px; height:18px; border:2px solid #555; border-radius:50%"></div>
          <div style="width:18px; height:18px; border:2px solid #555; border-radius:50%"></div>
      </div>
      <div style="display:grid; grid-template-columns:repeat(3,80px); gap:18px">
          <script>
              for(let i=1; i<=9; i++) document.write(`<button class="btn-n" onclick="press(${i})">${i}</button>`);
          </script>
          <button onclick="document.getElementById('lock-overlay').style.display='none'" style="background:none; color:#555; border:none; font-size:20px">✕</button>
          <button class="btn-n" onclick="press(0)">0</button>
          <button onclick="press('del')" style="background:none; color:#555; border:none; font-size:20px">⌫</button>
      </div>
  </div>

<script>
  // Firebase 核心 (保持不變)
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {};

  _db.ref('adminConfig/password').on('value', s => { if(s.val()) _mPin = s.val(); });
  _db.ref('students').on('value', s => { _all = s.val() || {}; renderList(); updateStats(); if(_user) renderUser(); });

  // 學生端邏輯 (保持不變)
  function searchStudent() {
    const n = document.getElementById('stu-name').value.trim();
    const f = Object.entries(_all).find(([id, s]) => s.name === n);
    if(!f) return alert("查無姓名");
    _user = f[0];
    document.getElementById('login-step1').style.display = 'none';
    document.getElementById('login-step2').style.display = 'block';
    document.getElementById('stu-welcome').innerHTML = `音樂科同學：<b>${n}</b>`;
  }

  function authStudent() {
    const p = document.getElementById('stu-pwd').value;
    const s = _all[_user];
    if(!s.password) { _db.ref(`students/${_user}`).update({password: p}); renderUser(); }
    else if(s.password === p) renderUser();
    else alert("密碼錯誤");
  }

  function renderUser() {
    document.getElementById('student-login').style.display = 'none';
    const s = _all[_user];
    const debt = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
    const h = s.history ? Object.values(s.history).reverse() : [];
    
    let html = `
      <div class="main-card">
        <div style="font-size:14px; opacity:0.7">${s.name} ${s.notification ? '<span class="badge-note">𝅘𝅥𝅮</span>' : ''}</div>
        <div style="font-size:54px; font-weight:900; color:${debt>0?'var(--accent-red)':'var(--gold-matte)'}; margin:15px 0; text-shadow: 0 0 10px rgba(212,175,55,0.3)">$${debt}</div>
        ${s.notification ? `<div style="background:rgba(212,175,55,0.1); padding:15px; border-radius:14px; font-size:14px; color:var(--gold-bright); border:1px dashed var(--gold-matte)">📢 公演通知：${s.notification}</div>` : ''}
      </div>
      <div style="margin:30px 10px 10px; font-weight:bold; color:var(--gold-matte); font-size:15px">活動與繳費紀錄</div>
    `;
    h.forEach(i => {
        html += `<div style="display:flex; justify-content:space-between; padding:16px; border-bottom:1px solid #222; font-size:14px; color:#ccc;">
                    <span>${i.type}${i.amount?' $'+i.amount:''}</span><span style="opacity:0.5">${i.time}</span>
                 </div>`;
    });
    document.getElementById('student-info').innerHTML = html;
    document.getElementById('student-info').style.display = 'block';
  }

  // 管理端鎖屏 (保持不變)
  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; updDots(); }
  function press(v) {
    if(v === 'del') _pin = _pin.slice(0,-1);
    else if(_pin.length < 4) _pin += v;
    updDots();
    if(_pin.length === 4) {
        if(_pin === _mPin) {
            document.getElementById('lock-overlay').style.display = 'none';
            document.getElementById('view-student').style.display = 'none';
            document.getElementById('view-admin').style.display = 'flex';
            go('list');
        } else { alert("錯誤"); _pin=""; updDots(); }
    }
  }
  function updDots() {
      const ds = document.getElementById('pwd-dots').children;
      for(let i=0; i<4; i++) ds[i].style.background = i < _pin.length ? 'var(--gold-matte)' : 'none';
  }

  // 後台功能 (3. UI 樂器 icon 化)
  function renderList() {
    const l = document.getElementById('pane-list'); if(!l) return;
    l.innerHTML = Object.entries(_all).map(([id, s]) => {
      const d = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
      return `<div class="list-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <b style="font-size:16px; color:var(--gold-light)">${s.name}</b> 
                    <span style="color:${d>0?'var(--accent-red)':'#ccc'}; font-weight:bold">$${d}</span>
                </div>
                <div style="display:flex; gap:8px">
                    <button onclick="quickPay('${id}',${d})" style="flex:1.2; padding:12px; border:none; border-radius:10px; background:var(--gold-matte); font-weight:bold">💰 收錢</button>
                    <button onclick="quickLate('${id}')" style="flex:1; padding:12px; border:none; border-radius:10px; background:#333; color:#fff">⏰ 遲到</button>
                    <button onclick="quickMsg('${id}')" style="flex:1; padding:10px; border:none; border-radius:10px; background:#1c1c1e; color:#ccc; font-size:12px">💬 通知</button>
                </div>
              </div>`;
    }).join('');
  }

  // 其他後台邏輯 (保持不變)
  function quickPay(id, debt) { const a = prompt(`收 ${_all[id].name} 多少錢？`, debt); if(a > 0) { _db.ref(`students/${id}`).update({ paidCount: (_all[id].paidCount||0) + Math.floor(a/100) }); _db.ref(`students/${id}/history`).push({ type:'繳費', amount: a, time: new Date().toLocaleDateString() }); } }
  function quickLate(id) { _db.ref(`students/${id}`).update({ lateCount: (_all[id].lateCount||0) + 1 }); _db.ref(`students/${id}/history`).push({ type:'遲到', time: new Date().toLocaleDateString() }); }
  function quickMsg(id) { const m = prompt("發送公演通知給學生："); if(m) _db.ref(`students/${id}`).update({ notification: m }); }

  function go(p, el) {
      ['list','att','rep','set'].forEach(i => document.getElementById('pane-'+i).style.display = 'none');
      document.getElementById('pane-'+p).style.display = 'block';
      if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
      if(p === 'att') {
          document.getElementById('att-grid').innerHTML = Object.entries(_all).map(([id, s]) => {
              _attData[id] = 'present';
              return `<div id="at-${id}" onclick="tk('${id}')" style="background:rgba(255,255,255,0.05); padding:18px; border-radius:12px; text-align:center; font-size:13px; color:var(--gold-light)">${s.name}<br>✅</div>`;
          }).join('');
      }
  }

  window.tk = (id) => {
      const s = { 'present':['late','⏰'], 'late':['absent','❌'], 'absent':['leave','🍃'], 'leave':['present','✅'] };
      const cur = _attData[id];
      _attData[id] = s[cur][0];
      document.getElementById('at-'+id).innerHTML = `${_all[id].name}<br>${s[cur][1]}`;
      document.getElementById('at-'+id).style.background = cur === 'present' ? 'rgba(212,175,55,0.08)' : 'rgba(255,255,255,0.05)';
  }

  function submitAtt() { const t = new Date().toLocaleDateString(); Object.entries(_attData).forEach(([id, st]) => { if(st === 'late') { _db.ref(`students/${id}`).update({ lateCount: (_all[id].lateCount||0) + 1 }); _db.ref(`students/${id}/history`).push({ type:'遲到', time: t }); } }); alert("儲存點名紀錄成功"); go('list'); }
  function updateStats() { let sum = 0; let html = ""; Object.values(_all).forEach(s => { const d = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100; sum += d; if(d > 0) html += `<div style="margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:10px;"><b>${s.name}</b>: <span style="color:var(--accent-red); font-weight:bold">$${d}</span></div>`; }); if(document.getElementById('total-sum')) document.getElementById('total-sum').innerText = '$' + sum; if(document.getElementById('debt-list')) document.getElementById('debt-list').innerHTML = html; }
  function backToStudent() { location.reload(); }
  function doExcel() { const d = [["姓名", "欠費", "備註"]]; Object.values(_all).forEach(s => d.push([s.name, Math.max(0, (s.lateCount||0)-(s.paidCount||0))*100, ""])); const ws = XLSX.utils.aoa_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report"); XLSX.writeFile(wb, "畢業公演音樂科財務報表.xlsx"); }
  function setAdminPwd() { const p = prompt("輸入新的 4 位數管理密碼"); if(p && p.length===4) _db.ref('adminConfig/password').set(p).then(()=>location.reload()); else if(p) alert("請輸入4位數字"); }
  function fullReset() { if(confirm("🛑 警告：將永久刪除所有學生的點名與財務紀錄！確定嗎？")) _db.ref('students').remove().then(()=>location.reload()); }
</script>
</body>
</html>
