<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>112年莊敬高職音樂科畢業公演 - 出席系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root {
    --bg-deep: #121212;
    --gold-main: #d4af37;
    --gold-light: #fbeea7;
    --card-bg: rgba(255, 255, 255, 0.05);
    --accent: #ff6b35;
    --text-main: #fff;
  }

  body {
    background: var(--bg-deep) radial-gradient(circle at center, #2c2c2c 0%, #000 100%);
    color: var(--text-main);
    font-family: 'Noto Sans TC', sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .container { padding: 30px 20px; max-width: 450px; margin: 0 auto; width: 100%; box-sizing: border-box; flex: 1; }

  /* 標題設計 */
  .header { text-align: center; margin-bottom: 40px; }
  .main-title { font-size: 22px; font-weight: 900; color: var(--gold-light); text-shadow: 0 0 10px rgba(212,175,55,0.5); }
  .sub-title { font-size: 14px; color: var(--gold-main); letter-spacing: 3px; margin-top: 5px; }

  /* 學生登入區塊 - 主軸 */
  .student-box {
    background: var(--card-bg);
    padding: 25px;
    border-radius: 20px;
    border: 1px solid rgba(212, 175, 55, 0.3);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  input {
    width: 100%; padding: 16px; border-radius: 12px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    background: rgba(255,255,255,0.05); color: #fff;
    font-size: 16px; margin-bottom: 15px; box-sizing: border-box;
    transition: 0.3s;
  }
  input:focus { border-color: var(--gold-main); outline: none; background: rgba(255,255,255,0.1); }

  .btn-gold {
    width: 100%; padding: 16px; border-radius: 12px;
    background: linear-gradient(145deg, var(--gold-main), #aa8831);
    color: #000; font-weight: bold; font-size: 17px;
    border: none; cursor: pointer; transition: 0.2s;
  }
  .btn-gold:active { transform: scale(0.98); }

  /* 隱藏/縮小的管理員入口 */
  .admin-trigger {
    text-align: center; margin-top: auto; padding: 40px 0 20px 0;
    font-size: 13px; color: #444; cursor: pointer; text-decoration: none;
  }

  /* 鎖屏樣式 (改為彈窗式) */
  #admin-lock {
    position: fixed; inset: 0; background: #000;
    display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
  }

  /* 其餘卡片與點名 UI 保持華麗感 */
  .card { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid rgba(212,175,55,0.2); margin-top: 20px; }
  .msg-box { background: rgba(212,175,55,0.1); border: 1px dashed var(--gold-main); padding: 15px; border-radius: 12px; margin: 15px 0; color: var(--gold-light); }
  .hist-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

  /* 管理介面導覽 */
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: #111; display: flex; padding: 15px 0; border-top: 1px solid #333; }
  .nav-item { flex: 1; text-align: center; font-size: 12px; color: #666; }
  .nav-item.active { color: var(--gold-main); }
  
  /* 數字鍵盤縮小 */
  .numpad { display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; margin-top: 20px; }
  .btn-n { width: 65px; height: 65px; border-radius: 50%; background: #1c1c1e; color: #fff; border: 1px solid #333; font-size: 20px; }
</style>
</head>
<body>

  <div id="student-main" class="container">
    <div class="header">
      <div class="main-title">112年莊敬高職音樂科畢業公演</div>
      <div class="sub-title">STUDENT PORTAL</div>
    </div>

    <div class="student-box" id="step-name">
      <input type="text" id="s-n" placeholder="請輸入姓名 (例如: 王小明)">
      <button class="btn-gold" onclick="checkStudent()">開始查詢</button>
    </div>

    <div class="student-box" id="step-pwd" style="display:none">
      <p id="p-m" style="text-align:center; color:var(--gold-light); margin-bottom:15px;"></p>
      <input type="password" id="s-p" placeholder="請輸入 4 位數密碼" inputmode="numeric" maxlength="4">
      <button class="btn-gold" onclick="verifyStudent()">驗證進入</button>
      <button onclick="location.reload()" style="background:none; border:none; color:#888; width:100%; margin-top:10px;">回上一頁</button>
    </div>

    <div id="student-data" style="display:none"></div>

    <div class="admin-trigger" onclick="openAdminLock()">⚙️ 內部管理登入</div>
  </div>

  <div id="admin-lock">
    <div style="color:var(--gold-main); margin-bottom:20px;">管理員驗證</div>
    <div id="dots" style="display:flex; margin-bottom:20px;">
        <div class="dot" id="d0" style="margin:0 5px; width:12px; height:12px; border:1px solid #555; border-radius:50%;"></div>
        <div class="dot" id="d1" style="margin:0 5px; width:12px; height:12px; border:1px solid #555; border-radius:50%;"></div>
        <div class="dot" id="d2" style="margin:0 5px; width:12px; height:12px; border:1px solid #555; border-radius:50%;"></div>
        <div class="dot" id="d3" style="margin:0 5px; width:12px; height:12px; border:1px solid #555; border-radius:50%;"></div>
    </div>
    <div class="numpad">
      <button class="btn-n" onclick="v(1)">1</button><button class="btn-n" onclick="v(2)">2</button><button class="btn-n" onclick="v(3)">3</button>
      <button class="btn-n" onclick="v(4)">4</button><button class="btn-n" onclick="v(5)">5</button><button class="btn-n" onclick="v(6)">6</button>
      <button class="btn-n" onclick="v(7)">7</button><button class="btn-n" onclick="v(8)">8</button><button class="btn-n" onclick="v(9)">9</button>
      <button class="btn-n" style="background:none" onclick="document.getElementById('admin-lock').style.display='none'">✕</button>
      <button class="btn-n" onclick="v(0)">0</button>
      <button class="btn-n" onclick="clearAdmin()">⌫</button>
    </div>
  </div>

  <div id="admin-view" class="container" style="display:none; padding-bottom:100px;">
    <h3 style="color:var(--gold-main)">後台管理系統</h3>
    <div id="t-l"><div id="h-l"></div></div>
    <div id="t-a" style="display:none"><h3>今日點名</h3><div class="att-grid" id="h-g"></div><button class="btn-gold" style="margin-top:20px" onclick="saveAttendance()">💾 儲存點名</button></div>
    <div id="t-r" style="display:none">
        <h3>欠費報表</h3>
        <div class="card"><div id="h-t" style="font-size:32px; color:var(--accent); text-align:center;">$0</div><div id="report-list"></div></div>
        <button class="btn-gold" style="margin-top:10px" onclick="exportExcel()">📊 輸出 Excel</button>
    </div>
    <div id="t-s" style="display:none">
        <h3>設定</h3>
        <button class="btn-gold" style="background:#222; color:var(--gold-main); border:1px solid var(--gold-main)" onclick="changeAdminPwd()">修改管理密碼</button>
        <button class="btn-gold" style="background:#ff453a; margin-top:10px; color:#fff;" onclick="resetAll()">重設所有資料</button>
        <button class="btn-gold" style="background:#111; color:#888; margin-top:20px;" onclick="location.reload()">🔒 登出後台</button>
    </div>
    <div class="bottom-nav">
      <div class="nav-item active" onclick="st('l', this)">名單</div>
      <div class="nav-item" onclick="st('a', this)">點名</div>
      <div class="nav-item" onclick="st('r', this)">報表</div>
      <div class="nav-item" onclick="st('s', this)">設定</div>
    </div>
  </div>

<script>
  // Firebase 設定
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  
  let _sts = {}, _cid = null, _ap = "", _ta = {}, _masterPwd = "0902";

  _db.ref('adminConfig/password').on('value', snap => { if(snap.val()) _masterPwd = snap.val(); });
  _db.ref('students').on('value', snap => { _sts = snap.val() || {}; _renderAdminList(); _updateReport(); if(_cid) showStudentData(); });

  // 學生查詢邏輯 (主軸)
  function checkStudent() {
    const name = document.getElementById('s-n').value.trim();
    const find = Object.entries(_sts).find(([id, s]) => s.name === name);
    if(!find) return alert("查無姓名，請聯繫老師。");
    _cid = find[0];
    document.getElementById('step-name').style.display = 'none';
    document.getElementById('step-pwd').style.display = 'block';
    document.getElementById('p-m').innerHTML = find[1].password ? `歡迎回來，<b>${name}</b>` : `首次查詢，請設定 4 位密碼`;
  }

  function verifyStudent() {
    const pwd = document.getElementById('s-p').value;
    const s = _sts[_cid];
    if(!s.password) {
      _db.ref(`students/${_cid}`).update({password: pwd}).then(() => showStudentData());
    } else if(s.password === pwd) {
      showStudentData();
    } else { alert("密碼錯誤"); }
  }

  function showStudentData() {
    document.getElementById('step-pwd').style.display = 'none';
    document.getElementById('student-data').style.display = 'block';
    const s = _sts[_cid];
    const debt = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
    const hist = s.history ? Object.values(s.history).reverse() : [];
    
    let html = `<div class="card" style="border-top:4px solid ${debt>0?'var(--accent)':'var(--gold-main)'}">
                  <div style="font-size:14px; opacity:0.7">${s.name} 同學您好</div>
                  <div style="font-size:32px; font-weight:900; color:${debt>0?'var(--accent)':'var(--gold-main)'}; margin:10px 0;">$${debt}</div>
                  ${debt > 0 ? '<div style="color:var(--accent); font-size:12px;">⚠️ 請儘速向組長或老師繳清罰款</div>' : '<div style="color:var(--gold-main); font-size:12px;">紀錄良好，繼續保持！</div>'}
                </div>`;
    
    if(s.notification) html += `<div class="msg-box"><b>📢 最新通知：</b><br>${s.notification}</div>`;
    
    html += `<div style="margin-top:20px; font-weight:bold; color:var(--gold-light)">近期紀錄</div>`;
    html += hist.map(i => `<div class="hist-item"><span>${i.type}${i.amount?' $'+i.amount:''}</span><span style="opacity:0.5">${i.time}</span></div>`).join('');
    
    document.getElementById('student-data').innerHTML = html;
  }

  // 管理員邏輯 (隱藏/縮小)
  function openAdminLock() { document.getElementById('admin-lock').style.display = 'flex'; _ap = ""; updateDots(); }
  function v(n) { 
    if(_ap.length < 4) {
        _ap += n; updateDots();
        if(_ap.length === 4) {
            setTimeout(() => {
                if(_ap === _masterPwd) {
                    document.getElementById('admin-lock').style.display = 'none';
                    document.getElementById('student-main').style.display = 'none';
                    document.getElementById('admin-view').style.display = 'block';
                    st('l');
                } else { alert("管理密碼錯誤"); _ap = ""; updateDots(); }
            }, 200);
        }
    }
  }
  function clearAdmin() { _ap = _ap.slice(0,-1); updateDots(); }
  function updateDots() { for(let i=0; i<4; i++) document.getElementById('d'+i).style.background = i < _ap.length ? 'var(--gold-main)' : 'none'; }

  function _renderAdminList() {
    const l = document.getElementById('h-l'); if(!l) return;
    l.innerHTML = Object.entries(_sts).map(([id, s]) => {
      const debt = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
      return `<div class="card" style="padding:12px;"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <b>${s.name}</b><span style="color:${debt>0?'var(--accent)':'#888'}">$${debt}</span></div>
              <div style="display:flex; gap:5px;">
                <button onclick="pay('${id}')" style="flex:1; padding:8px; border-radius:8px; border:none; background:var(--gold-main);">💰收錢</button>
                <button onclick="addLate('${id}')" style="flex:1; padding:8px; border-radius:8px; border:none; background:var(--accent); color:#fff;">+遲到</button>
                <button onclick="setMsg('${id}')" style="flex:1; padding:8px; border-radius:8px; border:none; background:#333; color:#fff;">💬通知</button>
              </div></div>`;
    }).join('');
  }

  function pay(id) {
    const s = _sts[id]; const debt = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
    const amt = prompt(`收 ${s.name} 多少錢？`, debt);
    if(amt > 0) {
        _db.ref(`students/${id}`).update({ paidCount: (s.paidCount||0) + Math.floor(amt/100) });
        _db.ref(`students/${id}/history`).push({ type:'繳費', amount: amt, time: new Date().toLocaleDateString() });
    }
  }

  function addLate(id) {
    _db.ref(`students/${id}`).update({ lateCount: (_sts[id].lateCount||0) + 1 });
    _db.ref(`students/${id}/history`).push({ type:'遲到', time: new Date().toLocaleDateString() });
  }

  function setMsg(id) {
    const msg = prompt("發送訊息：");
    if(msg) _db.ref(`students/${id}`).update({ notification: msg });
  }

  function st(t, el) {
    ['l','a','r','s'].forEach(id => document.getElementById('t-'+id).style.display='none');
    document.getElementById('t-'+t).style.display='block';
    if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
    if(t==='a') renderAttendance();
  }

  function renderAttendance() {
    document.getElementById('h-g').innerHTML = Object.entries(_sts).map(([id, s]) => {
      _ta[id] = 'present';
      return `<div class="att-cell" id="cell-${id}" onclick="toggle('${id}')">${s.name}<br>✅</div>`;
    }).join('');
  }
  window.toggle = (id) => {
    const states = { 'present':['late','⏰'], 'late':['absent','❌'], 'absent':['leave','🍃'], 'leave':['present','✅'] };
    const cur = _ta[id];
    _ta[id] = states[cur][0];
    document.getElementById('cell-'+id).innerHTML = `${_sts[id].name}<br>${states[cur][1]}`;
  };

  function saveAttendance() {
    const tm = new Date().toLocaleDateString();
    Object.entries(_ta).forEach(([id, st]) => {
        if(st==='late') {
            _db.ref(`students/${id}`).update({ lateCount: (_sts[id].lateCount||0)+1 });
            _db.ref(`students/${id}/history`).push({ type:'遲到', time: tm });
        }
    });
    alert("儲存成功"); st('l');
  }

  function _updateReport() {
    let total = 0; let html = "";
    Object.values(_sts).forEach(s => {
        const d = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100; total += d;
        if(d > 0) html += `<div style="font-size:12px; margin-top:10px;">${s.name}: $${d}</div>`;
    });
    document.getElementById('h-t').innerText = '$' + total;
    document.getElementById('report-list').innerHTML = html;
  }

  function exportExcel() {
    const data = [["姓名","欠費"]]; Object.values(_sts).forEach(s => data.push([s.name, Math.max(0, (s.lateCount||0)-(s.paidCount||0))*100]));
    const ws = XLSX.utils.aoa_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report"); XLSX.writeFile(wb, "Report.xlsx");
  }

  function changeAdminPwd() { const p = prompt("新密碼(4位)"); if(p) _db.ref('adminConfig/password').set(p).then(()=>location.reload()); }
  function resetAll() { if(confirm("確定刪除所有學生資料？")) _db.ref('students').remove().then(()=>location.reload()); }
</script>
</body>
</html>
