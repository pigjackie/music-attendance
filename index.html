<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>音演三莊公演管理系統 V3.5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root { 
    --bg-dark: #0a0a0a; --gold-main: #d4af37; --gold-light: #fbeea7; 
    --glass: rgba(255, 255, 255, 0.1); --accent-red: #ff3b30; --success: #34c759; 
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle at top right, #332b12 0%, #0a0a0a 100%); 
    background-attachment: fixed; color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; 
  }
  
  body { display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
  .app-container { flex: 1; width: 100%; padding: 20px; display: flex; flex-direction: column; position: relative; z-index: 10; }
  
  .deco-symbol { position: fixed; color: var(--gold-main); opacity: 0.12; pointer-events: none; z-index: 0; font-weight: 900; }

  .header { text-align: center; margin: 30px 0 20px; }
  .main-title { 
    font-size: 38px; font-weight: 900; 
    background: linear-gradient(to bottom, var(--gold-light), var(--gold-main)); 
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
    text-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); line-height: 1.2;
  }

  .login-card { 
    background: var(--glass); border-radius: 40px; padding: 40px 25px; 
    border: 2px solid var(--gold-main); backdrop-filter: blur(20px); 
    margin: 15px 0; box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
  }

  input { 
    width: 100%; padding: 22px; border-radius: 20px; 
    border: 3px solid var(--gold-main); background: rgba(0,0,0,0.7); 
    color: #fff; font-size: 26px; font-weight: bold; margin-bottom: 20px; text-align: center; 
  }
  .btn-gold { 
    width: 100%; padding: 22px; border-radius: 20px; 
    background: linear-gradient(135deg, var(--gold-light), var(--gold-main)); 
    color: #000; font-weight: 900; font-size: 26px; border: none; cursor: pointer; 
  }

  /* 管理員清單樣式 */
  .admin-panel { display: none; padding-bottom: 160px; }
  .list-item { 
    background: rgba(255,255,255,0.08); padding: 22px; border-radius: 30px; 
    margin-bottom: 15px; border-left: 10px solid var(--gold-main); 
  }
  .name-link { font-size: 34px; font-weight: 900; color: var(--gold-light); cursor: pointer; text-decoration: underline; }

  /* 點名區按鈕組 */
  .att-grid-item { 
    background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 25px; 
    padding: 20px 10px; margin-bottom: 20px;
  }
  .att-name { font-size: 28px; font-weight: 900; color: var(--gold-light); margin-bottom: 15px; display: block; text-align: center; }
  .att-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .att-btn { 
    padding: 12px 5px; border-radius: 12px; border: 1px solid #666; 
    background: #222; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer;
  }
  .att-btn.active { background: var(--gold-main); color: #000; border-color: var(--gold-light); }
  .att-btn.danger { background: var(--accent-red); border-color: #ff8080; }
  
  .pending-sum { 
    font-size: 24px; font-weight: 900; color: var(--gold-main); 
    text-align: center; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #555;
  }

  .nav-bar { 
    position: fixed; bottom: 0; left: 0; width: 100%; height: 95px;
    background: rgba(10,10,10,0.98); border-top: 2px solid #333; 
    display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; 
  }
  .nav-item { flex: 1; text-align: center; font-size: 18px; color: #777; align-self: center; }
  .nav-item.active { color: var(--gold-main); font-weight: 900; }

  .status-tag { padding: 8px 15px; border-radius: 10px; font-size: 16px; font-weight: bold; }
  .tag-unpaid { background: var(--accent-red); color: #fff; }
  .tag-paid { background: var(--success); color: #fff; }
  
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; }
  .modal-content { background: #111; border-radius: 40px; padding: 30px; border: 3px solid var(--gold-main); max-width: 600px; margin: 0 auto; }
</style>
</head>
<body>

  <div class="deco-symbol" style="top:5%; left:5%; font-size:100px;">𝄞</div>
  <div class="deco-symbol" style="top:25%; right:8%; font-size:80px;">𝄢</div>
  <div class="deco-symbol" style="bottom:15%; left:10%; font-size:90px;">♫</div>
  <div class="deco-symbol" style="bottom:8%; right:5%; font-size:70px;">♬</div>

  <div class="app-container" id="view-student">
    <div class="header"><div class="main-title">音演三莊<br>公演管理系統</div></div>
    <div class="login-card" id="student-login">
        <div style="text-align:center; font-size:80px; margin-bottom:10px;">🎻</div>
        <div id="step-name">
            <span style="display:block; text-align:center; color:var(--gold-main); margin-bottom:20px; font-size:22px; font-weight:bold;">個人帳目查詢系統</span>
            <input type="text" id="stu-name" placeholder="請輸入姓名">
            <button class="btn-gold" onclick="searchStudent()">登入查詢系統</button>
        </div>
        <div id="step-first-set" style="display:none">
            <p style="font-size:24px; text-align:center;">首次登入，請設定密碼</p>
            <input type="password" id="first-pwd" placeholder="4 位數字" maxlength="4" inputmode="numeric">
            <button class="btn-gold" onclick="setPassword()">設定完成</button>
        </div>
        <div id="step-auth" style="display:none">
            <p id="auth-welcome" style="font-size:24px; text-align:center; color:var(--gold-light);"></p>
            <input type="password" id="auth-pwd" placeholder="密碼" maxlength="4" inputmode="numeric">
            <button class="btn-gold" onclick="authStudent()">驗證進入</button>
        </div>
    </div>
    <div id="student-info" style="display:none"></div>
    <div style="margin-top:auto; text-align:center; padding:40px 0; color:#444; font-size:18px; font-weight:bold;" onclick="showLock()">ADMIN</div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-size:32px; color:var(--gold-main);">後台管理端</h2>
        <button onclick="location.reload()" style="background:none; border:2px solid #555; color:#888; border-radius:15px; padding:10px 20px; font-size:16px;">登出</button>
    </div>
    <div id="pane-list"><div id="h-l"></div></div> 
    
    <div id="pane-att" style="display:none">
        <div style="background:rgba(212,175,55,0.1); padding:20px; border-radius:20px; color:var(--gold-main); font-size:18px; text-align:center; margin-bottom:20px; font-weight:bold;">
            請選取遲到細項，點擊最下方【儲存】生效
        </div>
        <div id="att-grid"></div>
        <div style="height:40px;"></div>
        <button class="btn-gold" style="background:var(--success); color:#fff; height:110px; font-size:32px;" onclick="submitAtt()">💾 儲存今日紀錄與累計罰款</button>
    </div>

    <div id="pane-rep" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;"><h3>總欠費總覽</h3><div id="total-sum-badge" style="background:var(--accent-red); padding:10px 20px; border-radius:20px; font-weight:bold; font-size:24px;">$0</div></div>
        <div id="full-report-list" class="login-card" style="padding:20px; height: 50vh; overflow-y: auto; text-align: left; font-size:22px;"></div>
        <button class="btn-gold" style="background:#248a3d; color:#fff; margin-top:20px;" onclick="doExcel()">📊 下載 Excel 報表</button>
    </div>

    <div id="pane-set" style="display:none">
        <div class="login-card">
            <h3 style="color:var(--gold-main); text-align:center; font-size:28px;">帳目大重設</h3>
            <button class="btn-gold" onclick="resetAllAccounting()" style="background:var(--accent-red); color:#fff; font-size:22px;">🛑 確定帳目歸零(欠1300)</button>
            <div style="height:40px;"></div>
            <h3 style="color:var(--success); text-align:center; font-size:28px;">名單修復</h3>
            <button class="btn-gold" onclick="forceRestoreList()" style="background:var(--success); color:#fff; font-size:22px;">🔧 修復 55 人名單</button>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item active" onclick="go('list',this)">👥 名單</div>
        <div class="nav-item" onclick="go('att',this)">📅 點名</div>
        <div class="nav-item" onclick="go('rep',this)">📊 報表</div>
        <div class="nav-item" onclick="go('set',this)">⚙️ 設定</div>
    </div>
  </div>

  <div id="detail-modal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h3 id="modal-name" style="margin:0; color:var(--gold-main); font-size:36px;"></h3>
            <button onclick="closeModal()" style="background:none; border:none; color:#888; font-size:40px;">✕</button>
        </div>
        <div id="modal-body"></div>
        <div style="display:grid; grid-template-columns: 1fr; gap:15px; margin-top:30px;">
            <button class="btn-gold" style="background:#444; color:#fff; font-size:22px;" onclick="manualAddFineFromModal()">雜項費輸入</button>
            <button class="btn-gold" style="background:#222; color:#fff; font-size:22px;" onclick="setPropFromModal()">道具費設定</button>
            <button class="btn-gold" style="font-size:22px;" onclick="adminPaidFromModal()">收受現金</button>
        </div>
        <div style="margin-top:30px; border-top:2px solid #333; padding-top:30px;">
            <b style="color:var(--gold-light); font-size:24px;">對帳歷史明細：</b>
            <div id="modal-history" style="font-size:20px; margin-top:15px; max-height:300px; overflow-y:auto;"></div>
        </div>
    </div>
  </div>

  <div id="lock-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:3000; flex-direction:column; align-items:center; justify-content:center;">
      <div id="pwd-dots" style="display:flex; gap:25px; margin-bottom:50px"><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div></div>
      <div style="display:grid; grid-template-columns:repeat(3,90px); gap:25px"><script>for(let i=1; i<=9; i++) document.write(`<button style="width:80px;height:80px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:32px;font-weight:bold;border:1px solid #444;" onclick="press(${i})">${i}</button>`);</script><button onclick="document.getElementById('lock-overlay').style.display='none'">✕</button><button style="width:80px;height:80px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:32px;font-weight:bold;border:1px solid #444;" onclick="press(0)">0</button><button onclick="press('del')">⌫</button></div>
  </div>

<script>
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {}, _currentModalId = null;

  const MUSIC_STU = ["毛語程","林叡成","田宇紘","吳昆達","吳宥良","黃崇恩","林宏澤","金品澔","劉宸昀","蔡呈樂","蘇瑞吾","梁之凡","蔡宗佑","黃穩達","馮康維","倪秉澤","廖敏君","劉慶霈","蔡慧琳","鄭淳融","魏宜宸","徐婉瑜","安兪臻","江岑君","池宛昕","李曉萍","周玄禮","王以昕","林祐立","邱詩涵","胡云珊","蔡逸宣","高慧君","張路淇","陳芃瑾","陳雨彤","陳宥安","陳圓卿","傅克諳","曾妘湘"];
  const ACTING_STU = ["王玟茜","王語舒","姚宥湘","陳思妤","楊镕慈","王偉家","何建伸","姜榮绅","郭庭傑","陳泊源","陳軍任","黃治容","盧宥辰","謝行知"];
  const ALL_NAMES = [...MUSIC_STU, "蕭旭成", ...ACTING_STU];

  _db.ref('students').on('value', s => {
      _all = s.val() || {};
      if(Object.keys(_all).length === 0) forceRestoreList(true);
      renderAdminList(); renderFullReport(); if(_user) renderUser();
      if(_currentModalId) updateModalContent(_currentModalId);
  });

  function renderAdminList() {
    const l = document.getElementById('h-l'); if(!l) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    let html = "";
    sorted.forEach(([id, s]) => {
      if(s.no === 42) html += `<div style="text-align:center; color:var(--gold-main); font-weight:900; font-size:24px; margin:30px 0;">—— 演三莊名單 ——</div>`;
      const fundAmt = (s.fundPaid === true) ? 0 : 1300;
      const debt = (s.totalFine||0) + (s.propFine||0) + fundAmt - (s.paidAmt||0);
      html += `<div class="list-item">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="name-link" onclick="openModal('${id}')">${s.no}. ${s.name}</div>
            <span onclick="toggleFund('${id}', ${s.fundPaid})" class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}">${s.fundPaid?'基金已繳':'欠 1300'}</span>
        </div>
        <div class="quota-row">
            <div class="quota-box-text ${s.leaveQuota<=1?'used':''}" onclick="adminDeduct('${id}',1)">${s.leaveQuota<=1?'已扣 100':'1 次折抵'}</div>
            <div class="quota-box-text ${s.leaveQuota<=0?'used':''}" onclick="adminDeduct('${id}',0)">${s.leaveQuota<=0?'已扣 100':'2 次折抵'}</div>
        </div>
        <div style="text-align:right; margin-top:15px;"><b style="color:var(--accent-red); font-size:40px;">$${debt}</b></div>
      </div>`;
    });
    l.innerHTML = html;
  }

  // 累計式點名 UI
  function renderAttGrid() {
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    document.getElementById('att-grid').innerHTML = sorted.map(([id, s]) => {
      if (!_attData[id]) _attData[id] = { sum: 0, early: false, p1: false, extra: 0, absent: false, leave: false, note: '' };
      const d = _attData[id];
      return `<div class="att-grid-item">
        <span class="att-name">${s.name}</span>
        <div class="att-btn-group">
            <button class="att-btn ${d.early?'active':''}" onclick="toggleAtt('${id}','early')">8:00遲(+10)</button>
            <button class="att-btn ${d.p1?'active':''}" onclick="toggleAtt('${id}','p1')">第一節(+20)</button>
            <button class="att-btn" onclick="addExtra('${id}')">追加一節(+10)</button>
            <button class="att-btn danger ${d.absent?'active':''}" onclick="toggleAtt('${id}','absent')">缺席(100)</button>
            <button class="att-btn ${d.leave?'active':''}" onclick="toggleAtt('${id}','leave')">請假(0)</button>
            <button class="att-btn" onclick="resetAtt('${id}')" style="background:#444">重設/出席</button>
        </div>
        <div class="pending-sum">今日預扣：$${d.sum} ${d.extra > 0 ? '(加'+d.extra+'節)' : ''}</div>
        <button onclick="setNote(event,'${id}')" style="width:100%; margin-top:10px; background:#332b12; color:var(--gold-main); border:1px solid var(--gold-main); padding:10px; border-radius:10px;">${d.note?'已註記':'寫註記'}</button>
      </div>`;
    }).join('');
  }

  function toggleAtt(id, type) {
      const d = _attData[id];
      if(type === 'absent') { resetAtt(id); d.absent = true; d.sum = 100; }
      else if(type === 'leave') { resetAtt(id); d.leave = true; d.sum = 0; }
      else {
          d.absent = false; d.leave = false;
          if(type === 'early') d.early = !d.early;
          if(type === 'p1') d.p1 = !d.p1;
          calcSum(id);
      }
      renderAttGrid();
  }
  function addExtra(id) { _attData[id].absent = false; _attData[id].leave = false; _attData[id].extra++; calcSum(id); renderAttGrid(); }
  function resetAtt(id) { _attData[id] = { sum: 0, early: false, p1: false, extra: 0, absent: false, leave: false, note: _attData[id].note }; calcSum(id); renderAttGrid(); }
  function calcSum(id) {
      const d = _attData[id];
      if(d.absent) d.sum = 100;
      else if(d.leave) d.sum = 0;
      else d.sum = (d.early?10:0) + (d.p1?20:0) + (d.extra*10);
  }

  function submitAtt() {
      const t = new Date().toLocaleDateString();
      Object.entries(_attData).forEach(([id, d]) => {
          if(d.sum > 0) {
              let reason = "";
              if(d.absent) reason = "無故缺席";
              else reason = `遲到累計(${(d.early?'早遲+':'')}${(d.p1?'一節+':'')}${(d.extra>0?d.extra+'節追加':'')})`.replace(/\+$/, "");
              
              _db.ref(`students/${id}`).update({ totalFine: (_all[id].totalFine||0) + d.sum });
              _db.ref(`students/${id}/history`).push({ type: `${t} ${reason}`, amt: d.sum, time: t });
          }
          if(d.note) _db.ref(`students/${id}/history`).push({ type: `${t} 點名註記`, note: d.note, time: t });
      });
      _attData = {}; alert("💾 紀錄已累計並儲存！金額已同步更新。"); go('list');
  }

  // 帳目大歸零：強制 false
  function resetAllAccounting() { 
      if(confirm("確定帳目大重設？\n這會讓所有人回到「欠基金 1300」的狀態。")) { 
          Object.keys(_all).forEach(id => { 
              _db.ref(`students/${id}`).update({ totalFine:0, propFine:0, paidAmt:0, leaveQuota:2, fundPaid:false, propNote:"", history:null, password:null }); 
          }); 
          alert("全班已歸零重設！"); 
      } 
  }

  // 其他系統基礎邏輯
  function updateModalContent(id) {
      const s = _all[id]; const fundAmt = (s.fundPaid === true) ? 0 : 1300;
      const debt = (s.totalFine||0) + (s.propFine||0) + fundAmt - (s.paidAmt||0);
      document.getElementById('modal-body').innerHTML = `<div style="text-align:center;"><div style="font-size:70px; font-weight:900; color:var(--accent-red);">$${debt}</div></div><div style="margin-top:20px; font-size:20px; line-height:1.6;">基金狀態：${s.fundPaid?'✅ 已繳':'❌ 未繳'}<br>道具說明：${s.propNote||'無'}<br>剩餘機會：${s.leaveQuota||0}次</div>`;
      const h = s.history?Object.values(s.history).reverse():[];
      document.getElementById('modal-history').innerHTML = h.map(i => `<div style="padding:15px 0; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;"><span><b style="color:var(--gold-main)">${i.type}</b>${i.note?'<br><small style="color:#888">'+i.note+'</small>':''}</span><span style="text-align:right; font-weight:bold; color:var(--gold-light);">${i.amt?'$'+i.amt:''}</span></div>`).join('') || '尚無紀錄';
  }
  function forceRestoreList(isAuto=false) { if(!isAuto && !confirm("確定修復名單？")) return; ALL_NAMES.forEach((n, index) => { const exists = Object.values(_all).find(s => s.name === n); if(!exists) _db.ref('students').push({ no:index+1, name:n, totalFine:0, propFine:0, paidAmt:0, leaveQuota:2, fundPaid:false }); }); if(!isAuto) alert("修復成功"); }
  function searchStudent() { const n = document.getElementById('stu-name').value.trim(); const f = Object.entries(_all).find(([id, s]) => s.name === n); if(!f) return alert("查無姓名"); _user = f[0]; document.getElementById('step-name').style.display = 'none'; if(!_all[_user].password) document.getElementById('step-first-set').style.display = 'block'; else document.getElementById('step-auth').style.display = 'block'; }
  function setPassword() { const p = document.getElementById('first-pwd').value; if(p.length !== 4) return alert("請設4位數字"); _db.ref(`students/${_user}`).update({ password: p }); renderUser(); }
  function authStudent() { if(_all[_user].password === document.getElementById('auth-pwd').value) renderUser(); else alert("錯誤"); }
  function renderUser() {
    const s = _all[_user]; const fundAmt = (s.fundPaid === true) ? 0 : 1300;
    const debt = (s.totalFine||0) + (s.propFine||0) + fundAmt - (s.paidAmt||0); const h = s.history?Object.values(s.history).reverse():[];
    document.getElementById('student-login').style.display = 'none';
    document.getElementById('student-info').innerHTML = `<div class="login-card" style="text-align:center;"><div style="font-size:30px; font-weight:bold; color:var(--gold-main);">${s.name} 同學</div><div style="font-size:90px; font-weight:900; margin:10px 0; color:var(--accent-red);">$${debt}</div><div style="display:flex; justify-content:center; gap:10px;"><div class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}" style="font-size:20px; padding:10px 25px;">基金：${s.fundPaid?'已繳清':'未繳'}</div></div><div style="margin-top:20px; font-size:24px; color:var(--gold-light);">折抵機會：${s.leaveQuota||0} 次</div></div><div style="margin:30px 0 15px; font-weight:bold; color:var(--gold-light); font-size:26px; text-align:center;">📜 公演帳目明細表</div>` + h.map(i => `<div style="padding:20px 0; border-bottom:1px solid #333; font-size:22px; display:flex; justify-content:space-between;"><span><b style="color:var(--gold-main)">${i.type}</b>${i.note?' <br><small style="color:#888; font-size:18px;">'+i.note+'</small>':''}</span><span style="text-align:right; color:var(--gold-light);">${i.amt?'$'+i.amt:''}</span></div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }
  function openModal(id) { _currentModalId = id; document.getElementById('modal-name').innerText = `${_all[id].no}. ${_all[id].name}`; updateModalContent(id); document.getElementById('detail-modal').style.display = 'block'; }
  function closeModal() { document.getElementById('detail-modal').style.display='none'; _currentModalId=null; }
  function manualAddFineFromModal() { const amt = prompt("金額："); const r = prompt("原因："); if(amt) { _db.ref(`students/${_currentModalId}`).update({ totalFine:(_all[_currentModalId].totalFine||0)+parseInt(amt) }); _db.ref(`students/${_currentModalId}/history`).push({ type: `${new Date().toLocaleDateString()} 雜費`, note: r, amt: parseInt(amt), time: new Date().toLocaleDateString() }); } }
  function setPropFromModal() { const amt = prompt("金額："); const note = prompt("說明："); if(amt) _db.ref(`students/${_currentModalId}`).update({ propFine:parseInt(amt), propNote:note }); }
  function adminPaidFromModal() { const amt = prompt("收錢："); if(amt) { _db.ref(`students/${_currentModalId}`).update({ paidAmt:(_all[_currentModalId].paidAmt||0)+parseInt(amt) }); _db.ref(`students/${_currentModalId}/history`).push({ type: `${new Date().toLocaleDateString()} 收訖現金`, amt: parseInt(amt), time: new Date().toLocaleDateString() }); } }
  function adminDeduct(id, target) { const s = _all[id]; const q = s.leaveQuota || 2; if (q <= target) { if(confirm("取消折抵？")) _db.ref(`students/${id}`).update({ leaveQuota: q + 1, totalFine: (s.totalFine || 0) + 100 }); } else { if(confirm("抵銷 $100？")) { _db.ref(`students/${id}`).update({ leaveQuota: q - 1, totalFine: Math.max(0, (s.totalFine || 0) - 100) }); _db.ref(`students/${id}/history`).push({ type: `${new Date().toLocaleDateString()} 機會折抵`, amt: -100, time: new Date().toLocaleDateString() }); } } }
  function toggleFund(id, cur) { _db.ref(`students/${id}`).update({ fundPaid: !cur }); }
  function go(p, el) { ['list', 'att', 'rep', 'set'].forEach(i => document.getElementById('pane-' + i).style.display = 'none'); document.getElementById('pane-' + p).style.display = 'block'; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); if (el) el.classList.add('active'); if (p === 'att') renderAttGrid(); }
  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; }
  function press(v) { if(v==='del') _pin=_pin.slice(0,-1); else if(_pin.length<4) _pin+=v; const ds=document.getElementById('pwd-dots').children; for(let i=0; i<4; i++) ds[i].style.background=i<_pin.length?'var(--gold-main)':'none'; if(_pin.length===4) { if(_pin===_mPin) { document.getElementById('lock-overlay').style.display='none'; document.getElementById('view-student').style.display='none'; document.getElementById('view-admin').style.display='block'; go('list'); } else { alert("錯誤"); _pin=""; } } }
  function renderFullReport() { const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99)); let total = 0; let html = ""; sorted.forEach(([id, s]) => { if(s.no === 42) html += `<div style="text-align:center; color:var(--gold-main); font-weight:900; margin:15px 0;">演三莊名單</div>`; const fundAmt = (s.fundPaid === true) ? 0 : 1300; const d = (s.totalFine||0) + (s.propFine||0) + fundAmt - (s.paidAmt||0); total += d; html += `<div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #222;"><span>${s.no}. ${s.name} ${s.fundPaid?'':'(欠1300)'}</span><span style="color:${d>0?'var(--accent-red)':'#666'}">$${d}</span></div>`; }); document.getElementById('full-report-list').innerHTML = html; document.getElementById('total-sum-badge').innerText = '$' + total; }
  function doExcel() { const d = [["座號", "姓名", "基金", "機會", "欠費"]]; Object.values(_all).sort((a,b)=>a.no-b.no).forEach(s => { const fund = (s.fundPaid===true)?0:1300; d.push([s.no, s.name, s.fundPaid?'已繳':'未繳', s.leaveQuota, (s.totalFine||0)+(s.propFine||0)+fund-(s.paidAmt||0)]); }); const ws = XLSX.utils.aoa_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表"); XLSX.writeFile(wb, "公演帳目.xlsx"); }
  function setNote(e, id) { e.stopPropagation(); const n = prompt("輸入註記內容：", _attData[id].note); if(n!==null) { _attData[id].note = n; renderAttGrid(); } }
</script>
</body>
