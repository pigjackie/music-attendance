<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>112年莊敬高職音樂畢業公演</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root {
    --bg-dark: #0a0a0a;
    --gold-main: #d4af37;
    --gold-light: #fbeea7;
    --glass: rgba(255, 255, 255, 0.08);
    --accent-red: #ff3b30;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }

  /* 黑金漸層背景 + 樂器浮水印 */
  body {
    background: radial-gradient(circle at top right, #2c240d 0%, #0a0a0a 100%);
    background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-family='serif' font-size='25' fill='%23d4af37' opacity='0.1'%3E𝄞%3C/text%3E%3Ctext x='70' y='85' font-family='serif' font-size='20' fill='%23d4af37' opacity='0.08'%3E♫%3C/text%3E%3C/svg%3E");
    background-attachment: fixed;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
  }

  .app-container { flex: 1; width: 100%; padding: 20px; display: flex; flex-direction: column; position: relative; }

  /* 漂浮音符 */
  .floating-note {
    position: absolute; color: var(--gold-main); opacity: 0.3;
    font-size: 24px; pointer-events: none; animation: float 5s ease-in-out infinite;
  }
  @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-25px) rotate(15deg); } }

  .header { text-align: center; margin: 40px 0 30px; }
  .main-title { font-size: 24px; font-weight: 900; color: var(--gold-light); text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
  .sub-title { font-size: 13px; color: var(--gold-main); letter-spacing: 4px; margin-top: 8px; font-weight: bold; }

  /* 滿版黑金卡片 */
  .main-card {
    background: var(--glass);
    border-radius: 24px;
    padding: 30px 20px;
    border: 1px solid rgba(212, 175, 55, 0.25);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    width: 100%; position: relative;
  }

  /* 鋼琴裝飾 */
  .piano-decoration { display: flex; justify-content: center; margin-bottom: 25px; opacity: 0.8; }
  .key { width: 10px; height: 35px; background: #fff; border: 1px solid #333; }
  .key.black { width: 6px; height: 22px; background: #000; margin-left: -3px; margin-right: -3px; z-index: 1; }

  input {
    width: 100%; padding: 18px; border-radius: 14px;
    border: 1px solid rgba(212, 175, 55, 0.3); background: rgba(0,0,0,0.4);
    color: #fff; font-size: 18px; margin-bottom: 20px;
  }
  input:focus { border-color: var(--gold-main); outline: none; box-shadow: 0 0 10px rgba(212,175,55,0.2); }

  .btn-gold {
    width: 100%; padding: 18px; border-radius: 14px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold-main));
    color: #000; font-weight: 900; font-size: 18px; border: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3); cursor: pointer;
  }

  /* 學生通知標記 */
  .note-alert { color: var(--accent-red); margin-left: 8px; font-size: 20px; animation: pulse 1s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  /* 管理員入口按鈕 */
  .admin-access-btn {
    margin: auto 0 20px 0; padding: 12px; border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 10px; text-align: center; color: var(--gold-main);
    font-size: 13px; font-weight: bold; background: rgba(212, 175, 55, 0.05);
  }

  /* 管理後台 UI */
  .admin-panel { display: none; padding-bottom: 100px; }
  .list-item {
    background: rgba(255,255,255,0.05); padding: 18px; border-radius: 18px;
    margin-bottom: 12px; border-left: 4px solid var(--gold-main);
  }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: rgba(10,10,10,0.98); border-top: 1px solid #222;
    display: flex; padding: 15px 0 env(safe-area-inset-bottom); z-index: 100;
  }
  .nav-item { flex: 1; text-align: center; font-size: 12px; color: #555; }
  .nav-item.active { color: var(--gold-main); font-weight: bold; }

  #lock-overlay {
    position: fixed; inset: 0; background: #000; z-index: 3000;
    display: none; flex-direction: column; align-items: center; justify-content: center;
  }
  .btn-n { width: 75px; height: 75px; border-radius: 50%; background: #1c1c1e; color: #fff; border: 1px solid #333; font-size: 24px; }
</style>
</head>
<body>

  <div class="floating-note" style="top:20%; left:10%;">♩</div>
  <div class="floating-note" style="top:50%; right:10%; animation-delay: 1s;">♫</div>
  <div class="floating-note" style="bottom:20%; left:15%; animation-delay: 2s;">♬</div>

  <div class="app-container" id="view-student">
    <div class="header">
      <div class="main-title">112年莊敬高職音樂畢業公演</div>
      <div class="sub-title">MUSIC GRADUATION SYSTEM</div>
    </div>

    <div id="student-login" class="main-card">
        <div class="piano-decoration">
            <div class="key"></div><div class="black"></div><div class="key"></div><div class="black"></div><div class="key"></div><div class="key"></div><div class="black"></div><div class="key"></div><div class="black"></div><div class="key"></div>
        </div>
        <div id="login-step1">
            <div style="text-align:center; font-size:40px; color:var(--gold-main); margin-bottom:15px;">𝄞</div>
            <input type="text" id="stu-name" placeholder="輸入同學姓名">
            <button class="btn-gold" onclick="searchStudent()">點擊查詢紀錄</button>
        </div>
        <div id="login-step2" style="display:none">
            <p id="stu-welcome" style="text-align:center; color:var(--gold-light); margin-bottom:20px; font-weight:bold;"></p>
            <input type="password" id="stu-pwd" placeholder="輸入 4 位密碼" inputmode="numeric" maxlength="4">
            <button class="btn-gold" onclick="authStudent()">驗證登入</button>
        </div>
    </div>

    <div id="student-info" style="display:none"></div>
    <div id="leader-section" style="display:none; margin-top:20px;">
        <button class="btn-gold" style="background:#1b5e20; color:#fff;" onclick="openLeaderAtt()">⭐ 進入組長點名系統</button>
    </div>

    <div class="admin-access-btn" onclick="showLock()">⚙️ 管理員後台登入</div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--gold-main); margin:0;">後台管理</h2>
        <button id="leader-exit" onclick="location.reload()" style="background:none; border:1px solid #444; color:#888; border-radius:8px; padding:5px 12px; display:none;">結束點名</button>
    </div>
    
    <div id="pane-list"></div> 
    
    <div id="pane-att" style="display:none">
        <h3>今日點名網格</h3>
        <div id="att-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;"></div>
        <button class="btn-gold" style="margin-top:30px" onclick="submitAtt()">💾 儲存並同步</button>
    </div>

    <div id="pane-rep" style="display:none">
        <h3>欠費報表</h3>
        <div class="main-card" style="text-align:center">
            <div id="total-sum" style="font-size:42px; color:var(--accent-red); font-weight:900">$0</div>
            <div id="debt-list" style="text-align:left; font-size:14px; margin-top:20px; color:#ccc;"></div>
        </div>
        <button class="btn-gold" style="margin-top:20px; background:#248a3d; color:#fff;" onclick="doExcel()">📊 匯出 Excel</button>
    </div>

    <div id="pane-set" style="display:none">
        <h3>設定中心</h3>
        <button class="btn-gold" onclick="setAdminPwd()">🔐 修改管理密碼</button>
        <button class="btn-gold" style="margin-top:15px; background:#222; color:var(--gold-main);" onclick="location.reload()">← 返回首頁入口</button>
        <button class="btn-gold" style="margin-top:40px; background:var(--accent-red); color:#fff;" onclick="fullReset()">🛑 重設所有資料</button>
    </div>

    <div class="nav-bar" id="admin-nav">
        <div class="nav-item active" onclick="go('list',this)">👥 名單</div>
        <div class="nav-item" onclick="go('att',this)">📅 點名</div>
        <div class="nav-item" onclick="go('rep',this)">📊 報表</div>
        <div class="nav-item" onclick="go('set',this)">⚙️ 設定</div>
    </div>
  </div>

  <div id="lock-overlay">
      <div style="font-size:40px; color:var(--gold-main); margin-bottom:10px">𝄞</div>
      <div style="color:#fff; margin-bottom:30px; letter-spacing:2px">請輸入 4 位管理密碼</div>
      <div id="pwd-dots" style="display:flex; gap:20px; margin-bottom:40px">
          <div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div>
          <div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div>
          <div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div>
          <div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div>
      </div>
      <div style="display:grid; grid-template-columns:repeat(3,80px); gap:20px">
          <script>for(let i=1; i<=9; i++) document.write(`<button class="btn-n" onclick="press(${i})">${i}</button>`);</script>
          <button onclick="document.getElementById('lock-overlay').style.display='none'" style="background:none; color:#555; border:none;">✕</button>
          <button class="btn-n" onclick="press(0)">0</button>
          <button onclick="press('del')" style="background:none; color:#555; border:none;">⌫</button>
      </div>
  </div>

<script>
  // Firebase 設定
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {}, _isLeader = false;

  _db.ref('adminConfig/password').on('value', s => { if(s.val()) _mPin = s.val(); });
  _db.ref('students').on('value', s => { _all = s.val() || {}; renderAdminList(); updateStats(); if(_user) renderUser(); });

  function searchStudent() {
    const n = document.getElementById('stu-name').value.trim();
    const f = Object.entries(_all).find(([id, s]) => s.name === n);
    if(!f) return alert("查無姓名");
    _user = f[0];
    document.getElementById('login-step1').style.display = 'none';
    document.getElementById('login-step2').style.display = 'block';
    document.getElementById('stu-welcome').innerHTML = `音樂科同學：<b>${n}</b>`;
  }

  function authStudent() {
    const p = document.getElementById('stu-pwd').value;
    const s = _all[_user];
    if(!s.password) { _db.ref(`students/${_user}`).update({password: p}); checkPermission(s); }
    else if(s.password === p) checkPermission(s);
    else alert("密碼錯誤");
  }

  function checkPermission(s) { _isLeader = s.isLeader || false; renderUser(); if(_isLeader) document.getElementById('leader-section').style.display = 'block'; }

  function renderUser() {
    document.getElementById('student-login').style.display = 'none';
    const s = _all[_user];
    const debt = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
    const h = s.history ? Object.values(s.history).reverse() : [];
    let html = `<div class="main-card">
        <div style="font-size:14px; color:var(--gold-main); font-weight:bold">${s.name}${_isLeader?' [組長權限]':''} ${s.notification ? '<span class="note-alert">𝅘𝅥𝅮</span>' : ''}</div>
        <div style="font-size:54px; font-weight:900; color:${debt>0?'var(--accent-red)':'var(--gold-main)'}; margin:15px 0;">$${debt}</div>
        ${s.notification ? `<div class="main-card" style="background:rgba(212,175,55,0.05); padding:15px; border:1px dashed var(--gold-main); font-size:14px; margin-top:10px;">📢 通知：${s.notification}</div>` : ''}
      </div>`;
    document.getElementById('student-info').innerHTML = html + `<div style="margin:25px 0 10px 5px; font-weight:bold; color:var(--gold-main)">紀錄回顧</div>` + h.map(i => `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #222; font-size:14px; color:#aaa;"><span>${i.type}${i.amount?' $'+i.amount:''}</span><span>${i.time}</span></div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }

  function openLeaderAtt() {
      document.getElementById('view-student').style.display = 'none';
      document.getElementById('view-admin').style.display = 'block';
      document.getElementById('leader-exit').style.display = 'block';
      document.getElementById('admin-nav').style.display = 'none';
      go('att');
  }

  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; updDots(); }
  function press(v) {
    if(v === 'del') _pin = _pin.slice(0,-1);
    else if(_pin.length < 4) _pin += v;
    updDots();
    if(_pin.length === 4) {
        if(_pin === _mPin) {
            document.getElementById('lock-overlay').style.display = 'none';
            document.getElementById('view-student').style.display = 'none';
            document.getElementById('view-admin').style.display = 'block';
            document.getElementById('admin-nav').style.display = 'flex';
            go('list');
        } else { alert("錯誤"); _pin=""; updDots(); }
    }
  }
  function updDots() { const ds = document.getElementById('pwd-dots').children; for(let i=0; i<4; i++) ds[i].style.background = i < _pin.length ? 'var(--gold-main)' : 'none'; }

  function renderAdminList() {
    const l = document.getElementById('pane-list'); if(!l) return;
    l.innerHTML = Object.entries(_all).map(([id, s]) => {
      const d = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
      return `<div class="list-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><b>${s.name}</b> <span style="color:${d>0?'var(--accent-red)':'#888'}">$${d}</span></div>
                <div style="display:flex; gap:10px;">
                    <button onclick="quickPay('${id}',${d})" style="flex:1.2; padding:12px; border:none; border-radius:10px; background:var(--gold-main); color:#000; font-weight:bold;">💰 收錢</button>
                    <button onclick="quickLate('${id}')" style="flex:1; padding:12px; border:none; border-radius:10px; background:#333; color:#fff">⏰ 遲到</button>
                    <button onclick="toggleLeader('${id}',${s.isLeader})" style="flex:0.5; background:${s.isLeader?'#d4af37':'#1c1c1e'}; color:${s.isLeader?'#000':'#555'}; border:1px solid #333; border-radius:10px;">${s.isLeader?'⭐':'☆'}</button>
                </div>
              </div>`;
    }).join('');
  }

  function toggleLeader(id, cur) { _db.ref(`students/${id}`).update({ isLeader: !cur }); alert("權限更新成功"); }
  function quickPay(id, debt) { const a = prompt(`收 ${_all[id].name} 多少錢？`, debt); if(a>0) { _db.ref(`students/${id}`).update({ paidCount: (_all[id].paidCount||0) + Math.floor(a/100) }); _db.ref(`students/${id}/history`).push({ type:'繳費', amount: a, time: new Date().toLocaleDateString() }); } }
  function quickLate(id) { _db.ref(`students/${id}`).update({ lateCount: (_all[id].lateCount||0) + 1 }); _db.ref(`students/${id}/history`).push({ type:'遲到', time: new Date().toLocaleDateString() }); }

  function go(p, el) {
      ['list','att','rep','set'].forEach(i => document.getElementById('pane-'+i).style.display = 'none');
      document.getElementById('pane-'+p).style.display = 'block';
      if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
      if(p === 'att') {
          document.getElementById('att-grid').innerHTML = Object.entries(_all).map(([id, s]) => {
              _attData[id] = 'present';
              return `<div id="at-${id}" onclick="tk('${id}')" style="background:rgba(255,255,255,0.05); padding:18px; border-radius:12px; text-align:center; font-size:12px; border:1px solid #222;">${s.name}<br>✅</div>`;
          }).join('');
      }
  }
  window.tk = (id) => {
      const s = { 'present':['late','⏰'], 'late':['absent','❌'], 'absent':['leave','🍃'], 'leave':['present','✅'] };
      const cur = _attData[id]; _attData[id] = s[cur][0];
      document.getElementById('at-'+id).innerHTML = `${_all[id].name}<br>${s[cur][1]}`;
  };
  function submitAtt() {
      const t = new Date().toLocaleDateString();
      Object.entries(_attData).forEach(([id, st]) => { if(st==='late') { _db.ref(`students/${id}`).update({ lateCount: (_all[id].lateCount||0) + 1 }); _db.ref(`students/${id}/history`).push({ type:'遲到', time: t }); } });
      alert("儲存成功！"); if(_isLeader && document.getElementById('admin-nav').style.display === 'none') { location.reload(); } else { go('list'); }
  }
  function updateStats() { let sum = 0; let html = ""; Object.values(_all).forEach(s => { const d = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100; sum += d; if(d > 0) html += `<div style="margin-bottom:12px; border-bottom:1px solid #222; padding-bottom:5px;"><b>${s.name}</b>: $${d}</div>`; }); if(document.getElementById('total-sum')) document.getElementById('total-sum').innerText = '$' + sum; if(document.getElementById('debt-list')) document.getElementById('debt-list').innerHTML = html; }
  function doExcel() { const d = [["姓名", "目前欠費"]]; Object.values(_all).forEach(s => d.push([s.name, Math.max(0, (s.lateCount||0)-(s.paidCount||0))*100])); const ws = XLSX.utils.aoa_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表"); XLSX.writeFile(wb, "畢業公演報表.xlsx"); }
  function setAdminPwd() { const p = prompt("新 4 位管理密碼"); if(p && p.length===4) _db.ref('adminConfig/password').set(p).then(()=>location.reload()); }
  function fullReset() { if(confirm("確定刪除所有紀錄？")) _db.ref('students').remove().then(()=>location.reload()); }
</script>
</body>
</html>
