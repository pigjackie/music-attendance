<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>112年莊敬音樂科畢業公演管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root { --bg-dark: #0a0a0a; --gold-main: #d4af37; --gold-light: #fbeea7; --glass: rgba(255, 255, 255, 0.08); --accent-red: #ff3b30; --success: #34c759; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
  body { background: radial-gradient(circle at top right, #2c240d 0%, #0a0a0a 100%); background-attachment: fixed; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
  .app-container { flex: 1; width: 100%; padding: 30px 20px; display: flex; flex-direction: column; }
  .header { text-align: center; margin: 40px 0 30px; }
  .main-title { font-size: 32px; font-weight: 900; background: linear-gradient(to bottom, var(--gold-light), var(--gold-main)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
  .countdown { font-size: 16px; color: var(--gold-light); margin-top: 15px; border: 1px solid rgba(212,175,55,0.4); display: inline-block; padding: 8px 20px; border-radius: 30px; background: rgba(0,0,0,0.5); font-weight: bold; }
  .main-card { background: var(--glass); border-radius: 25px; padding: 25px; border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); margin-bottom: 25px; }
  input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.4); background: rgba(0,0,0,0.5); color: #fff; font-size: 18px; margin-bottom: 15px; text-align: center; }
  .btn-gold { width: 100%; padding: 18px; border-radius: 15px; background: linear-gradient(135deg, var(--gold-light), var(--gold-main)); color: #000; font-weight: 900; font-size: 18px; border: none; cursor: pointer; }
  .admin-panel { display: none; padding-bottom: 160px; }
  .list-item { background: rgba(255,255,255,0.05); padding: 15px 18px; border-radius: 18px; margin-bottom: 12px; border-left: 5px solid var(--gold-main); }
  .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.95); border-top: 1px solid #333; display: flex; padding: 15px 0 calc(15px + env(safe-area-inset-bottom)); z-index: 100; }
  .nav-item { flex: 1; text-align: center; font-size: 13px; color: #777; cursor: pointer; }
  .nav-item.active { color: var(--gold-main); font-weight: 900; }
  .status-tag { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-right: 5px; }
  .tag-unpaid { background: #444; color: #bbb; }
  .tag-paid { background: var(--success); color: #fff; }
  .btn-n { width: 80px; height: 80px; border-radius: 50%; background: #1c1c1e; color: #fff; border: 1px solid #333; font-size: 26px; }
  #lock-overlay { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
</style>
</head>
<body>

  <div class="app-container" id="view-student">
    <div class="header">
      <div class="main-title">112年莊敬高職音樂科<br>畢業公演</div>
      <div id="countdown-label" class="countdown">載入中...</div>
    </div>
    <div id="student-login" class="main-card">
        <div id="login-step1">
            <input type="text" id="stu-name" placeholder="請輸入您的姓名">
            <button class="btn-gold" onclick="searchStudent()">查詢個人紀錄</button>
        </div>
        <div id="login-step2" style="display:none">
            <p id="stu-welcome" style="text-align:center; color:var(--gold-light); margin-bottom:20px; font-size:18px;"></p>
            <input type="password" id="stu-pwd" placeholder="輸入 4 位密碼" inputmode="numeric" maxlength="4">
            <button class="btn-gold" onclick="authStudent()">驗證登入</button>
        </div>
    </div>
    <div id="student-info" style="display:none"></div>
    <div style="margin-top:auto; text-align:center; padding:40px 0; color:#444;" onclick="showLock()">— 管理端入口 —</div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h2 style="font-size:24px; color:var(--gold-main); margin:0;">後台管理</h2>
        <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#888; border-radius:10px; padding:5px 12px;">登出</button>
    </div>
    <div id="pane-list"><div id="h-l"></div></div> 
    <div id="pane-att" style="display:none">
        <div id="att-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;"></div>
        <button class="btn-gold" style="margin-top:30px" onclick="submitAtt()">💾 儲存本日點名</button>
    </div>
    <div id="pane-rep" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; color:var(--gold-light);">欠費報表</h3>
            <div id="total-sum-badge" style="background:var(--accent-red); padding:8px 15px; border-radius:15px; font-weight:bold;">$0</div>
        </div>
        <div class="main-card" style="padding:15px; height: 45vh; overflow-y: auto;"><div id="full-report-list"></div></div>
        <button class="btn-gold" style="background:#248a3d; color:#fff;" onclick="doExcel()">📊 匯出全班 Excel</button>
    </div>
    <div id="pane-set" style="display:none">
        <div class="main-card">
            <h3>系統設定</h3>
            <button class="btn-gold" onclick="resetFeesOnly()" style="background:#444; color:#fff; margin-bottom:15px;">🧹 歸零罰款與請假額度</button>
            <button class="btn-gold" style="background:var(--accent-red); color:#fff;" onclick="fullReset()">🛑 移除所有學生數據</button>
        </div>
    </div>
    <div class="nav-bar">
        <div class="nav-item active" onclick="go('list',this)">👥 名單</div>
        <div class="nav-item" onclick="go('att',this)">📅 點名</div>
        <div class="nav-item" onclick="go('rep',this)">📊 報表</div>
        <div class="nav-item" onclick="go('set',this)">⚙️ 設定</div>
    </div>
  </div>

  <div id="lock-overlay">
      <div id="pwd-dots" style="display:flex; gap:20px; margin-bottom:40px"><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div></div>
      <div style="display:grid; grid-template-columns:repeat(3,80px); gap:20px"><script>for(let i=1; i<=9; i++) document.write(`<button class="btn-n" onclick="press(${i})">${i}</button>`);</script><button onclick="document.getElementById('lock-overlay').style.display='none'" style="background:none; color:#888; border:none;">✕</button><button class="btn-n" onclick="press(0)">0</button><button onclick="press('del')" style="background:none; color:#888; border:none;">⌫</button></div>
  </div>

<script>
  const APP_VERSION = "1.3";
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {};

  const MUSIC_STU = ["毛語程","林叡成","田宇紘","吳昆達","吳宥良","黃崇恩","林宏澤","金品澔","劉宸昀","蔡呈樂","蘇瑞吾","梁之凡","蔡宗佑","黃穩達","馮康維","倪秉澤","廖敏君","劉慶霈","蔡慧琳","鄭淳融","魏宜宸","徐婉瑜","安兪臻","江岑君","池宛昕","李曉萍","周玄禮","王以昕","林祐立","邱詩涵","胡云珊","蔡逸宣","高慧君","張路淇","陳芃瑾","陳雨彤","陳宥安","陳圓卿","傅克諳","曾妘湘"];

  window.onload = function() {
      const savedV = localStorage.getItem('app_v');
      if(savedV !== APP_VERSION) { localStorage.setItem('app_v', APP_VERSION); window.location.reload(true); }
      const diff = Math.ceil((new Date("2026-05-27") - new Date()) / (1000 * 60 * 60 * 24));
      document.getElementById('countdown-label').innerText = diff > 0 ? `距離 5/27 公演還有 ${diff} 天` : "公演正式開始！";
  };

  _db.ref('students').on('value', s => {
      _all = s.val() || {};
      if(Object.keys(_all).length === 0) {
          MUSIC_STU.forEach((n, index) => _db.ref('students').push({ no: index + 1, name: n, totalFine: 0, paidFine: 0, leaveQuota: 2, fundPaid: false }));
      }
      renderAdminList(); renderFullReport(); if(_user) renderUser();
  });

  function renderAdminList() {
    const l = document.getElementById('h-l'); if(!l) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    l.innerHTML = sorted.map(([id, s]) => {
      const d = Math.max(0, (s.totalFine||0) - (s.paidFine||0));
      return `
      <div class="list-item">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <b style="font-size:18px;">${s.no}. ${s.name}</b>
          <span class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}" onclick="toggleFund('${id}', ${s.fundPaid})">
            ${s.fundPaid?'基金已繳':'基金未繳'}
          </span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="color:${d>0?'var(--accent-red)':'#555'}; font-weight:bold;">欠費：$${d} | 假：${s.leaveQuota}次</span>
          <div style="display:flex; gap:10px;">
            <button onclick="quickPay('${id}',${d})" style="background:var(--gold-main); border:none; padding:8px 15px; border-radius:10px; font-weight:900;">收錢</button>
            <button onclick="addFine('${id}', 10, '遲到')" style="background:#333; color:#fff; border:1px solid #555; padding:8px 15px; border-radius:10px; font-size:13px;">⏰遲</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function renderUser() {
    document.getElementById('student-login').style.display = 'none';
    const s = _all[_user];
    const debt = Math.max(0, (s.totalFine||0) - (s.paidFine||0));
    const h = s.history ? Object.values(s.history).reverse() : [];
    document.getElementById('student-info').innerHTML = `
      <div class="main-card" style="text-align:center;">
        <div style="font-size:20px; color:var(--gold-main);">${s.name} 同學</div>
        <div style="font-size:64px; font-weight:900; margin:15px 0; color:${debt>0?'var(--accent-red)':'var(--gold-main)'};">$${debt}</div>
        <div style="display:flex; justify-content:center; gap:15px;">
           <div class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}">畢業基金：${s.fundPaid?'已繳清':'未繳'}</div>
           <div class="status-tag" style="background:#555">剩餘請假：${s.leaveQuota} 次</div>
        </div>
      </div>
      <div style="margin:20px 0 10px; font-size:16px; color:var(--gold-light); font-weight:bold;">歷史明細</div>
    ` + h.map(i => `<div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #222; font-size:14px;"><span>${i.type}${i.amt?' $'+i.amt:''}</span><span style="color:#666;">${i.time}</span></div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }

  // 點名邏輯優化
  function renderAttGrid() {
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    document.getElementById('att-grid').innerHTML = sorted.map(([id, s]) => {
      _attData[id] = 'present';
      return `<div id="at-${id}" onclick="tk('${id}')" style="background:rgba(255,255,255,0.05); padding:15px 5px; border-radius:15px; text-align:center; font-size:13px">${s.name}<br><span id="icon-${id}" style="font-size:22px;">✅</span><br><span id="txt-${id}" style="font-size:10px; opacity:0.6;">出席</span></div>`;
    }).join('');
  }

  window.tk = (id) => {
    const states = { 'present':['late10','⏰','遲到10'], 'late10':['late20','⌛','第一節20'], 'late20':['late30','🔥','全遲30'], 'late30':['leave','🍃','請假'], 'leave':['absent','❌','缺席'], 'absent':['present','✅','出席'] };
    const cur = _attData[id];
    _attData[id] = states[cur][0];
    document.getElementById('icon-'+id).innerText = states[cur][1];
    document.getElementById('txt-'+id).innerText = states[cur][2];
  }

  function submitAtt() {
    const t = new Date().toLocaleDateString();
    Object.entries(_attData).forEach(([id, st]) => {
      const s = _all[id];
      if(st.startsWith('late')) {
        const amt = parseInt(st.replace('late',''));
        _db.ref(`students/${id}`).update({ totalFine: (s.totalFine||0) + amt });
        _db.ref(`students/${id}/history`).push({ type:`點名遲到(${amt}元)`, amt: amt, time: t });
      } else if(st === 'leave') {
        if(s.leaveQuota > 0) {
            _db.ref(`students/${id}`).update({ leaveQuota: s.leaveQuota - 1 });
            _db.ref(`students/${id}/history`).push({ type:'使用請假額度', time: t });
        } else {
            alert(s.name + " 無請假額度，將註記缺席(不扣額度)");
        }
      }
    });
    alert("點名完成並已更新罰款！"); go('list');
  }

  // 設定與工具功能
  function toggleFund(id, cur) { if(confirm("切換該生畢業基金狀態？")) _db.ref(`students/${id}`).update({ fundPaid: !cur }); }
  function addFine(id, amt, type) { _db.ref(`students/${id}`).update({ totalFine: (_all[id].totalFine||0) + amt }); _db.ref(`students/${id}/history`).push({ type: type, amt: amt, time: new Date().toLocaleDateString() }); }
  function quickPay(id, debt) { const a = prompt(`收錢金額：`, debt); if(a > 0) { _db.ref(`students/${id}`).update({ paidFine: (_all[id].paidFine||0) + parseInt(a) }); _db.ref(`students/${id}/history`).push({ type:'繳費', amt: a, time: new Date().toLocaleDateString() }); } }
  function resetFeesOnly() { if(confirm("確定重設所有金額與請假額度？")) { Object.keys(_all).forEach(id => { _db.ref(`students/${id}`).update({ totalFine: 0, paidFine: 0, leaveQuota: 2, history: null }); }); alert("已歸零"); } }
  function fullReset() { if(confirm("這將刪除全班資料！")) _db.ref('students').remove().then(() => location.reload()); }
  
  function renderFullReport() {
    const listDiv = document.getElementById('full-report-list'); if(!listDiv) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    let total = 0;
    listDiv.innerHTML = sorted.map(([id, s]) => {
      const d = Math.max(0, (s.totalFine||0) - (s.paidFine||0)); total += d;
      return `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #222; font-size:15px;"><span>${s.no}. ${s.name} ${s.fundPaid?'(金✔)':'(金✘)'}</span><span style="color:${d>0?'var(--accent-red)':'#666'}">$${d}</span></div>`;
    }).join('');
    document.getElementById('total-sum-badge').innerText = '$' + total;
  }

  function searchStudent() { const n = document.getElementById('stu-name').value.trim(); const f = Object.entries(_all).find(([id, s]) => s.name === n); if(!f) return alert("查無姓名"); _user = f[0]; document.getElementById('login-step1').style.display = 'none'; document.getElementById('login-step2').style.display = 'block'; document.getElementById('stu-welcome').innerText = "同學：" + n; }
  function authStudent() { const p = document.getElementById('stu-pwd').value; if(_all[_user].password && _all[_user].password !== p) return alert("密碼錯誤"); if(!_all[_user].password) _db.ref(`students/${_user}`).update({password: p}); renderUser(); }
  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; updDots(); }
  function press(v) { if(v==='del') _pin=_pin.slice(0,-1); else if(_pin.length<4) _pin+=v; updDots(); if(_pin.length===4) { if(_pin===_mPin) { document.getElementById('lock-overlay').style.display='none'; document.getElementById('view-student').style.display='none'; document.getElementById('view-admin').style.display='block'; go('list'); } else { alert("錯誤"); _pin=""; updDots(); } } }
  function updDots() { const ds=document.getElementById('pwd-dots').children; for(let i=0; i<4; i++) ds[i].style.background=i<_pin.length?'var(--gold-main)':'none'; }
  function go(p, el) { ['list','att','rep','set'].forEach(i => document.getElementById('pane-'+i).style.display = 'none'); document.getElementById('pane-'+p).style.display = 'block'; if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); } if(p === 'att') renderAttGrid(); }
  function doExcel() { const d = [["座號", "姓名", "欠費金額", "基金狀態"]]; Object.values(_all).sort((a,b) => (a.no||99)-(b.no||99)).forEach(s => d.push([s.no, s.name, (s.totalFine||0)-(s.paidFine||0), s.fundPaid?'已繳':'未繳'])); const ws = XLSX.utils.aoa_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表"); XLSX.writeFile(wb, "畢業公演全班報表.xlsx"); }
</script>
</body>
</html>
