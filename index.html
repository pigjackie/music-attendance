<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>112年莊敬高職音樂畢業公演</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root {
    --gold-deep: #8a6d1a;
    --gold-main: #d4af37;
    --gold-light: #fbeea7;
    --accent-red: #d32f2f;
    --text-dark: #3a2e11;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--gold-main); font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }

  /* 滿版金黃背景 + 樂器浮水印 */
  body {
    background: radial-gradient(circle at center, #fff9d6 0%, #fbeea7 40%, #d4af37 100%);
    background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-family='serif' font-size='25' fill='%238a6d1a' opacity='0.08'%3E𝄞%3C/text%3E%3Ctext x='60' y='80' font-family='serif' font-size='20' fill='%238a6d1a' opacity='0.1'%3E♫%3C/text%3E%3C/svg%3E");
    background-attachment: fixed;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
  }

  .app-container { flex: 1; width: 100%; padding: 20px; display: flex; flex-direction: column; position: relative; }
  
  /* 漂浮音符動畫 */
  .floating-note {
    position: absolute; color: var(--gold-deep); opacity: 0.3;
    font-size: 30px; pointer-events: none; animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }

  .header { text-align: center; margin: 30px 0; position: relative; }
  .main-title { font-size: 26px; font-weight: 900; color: var(--gold-deep); text-shadow: 1px 1px 2px #fff; }
  .sub-title { font-size: 14px; color: var(--gold-deep); letter-spacing: 5px; font-weight: bold; }

  /* 登入卡片升級 - 增加音樂元素裝飾 */
  .main-card {
    background: rgba(255, 255, 255, 0.45);
    border-radius: 28px;
    padding: 30px 20px;
    border: 2px solid rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    box-shadow: 0 15px 35px rgba(138, 109, 26, 0.15);
    width: 100%; position: relative; overflow: hidden;
  }

  /* 登入卡片內的高音譜號大圖騰 */
  .card-bg-icon {
    position: absolute; right: -10px; bottom: -20px;
    font-size: 120px; color: var(--gold-main); opacity: 0.15;
    font-family: serif; transform: rotate(-15deg);
  }

  /* 鋼琴鍵裝飾條 */
  .piano-decoration {
    display: flex; justify-content: center; margin-bottom: 20px;
  }
  .key { width: 10px; height: 30px; background: #fff; border: 1px solid #ddd; border-bottom-left-radius: 2px; border-bottom-right-radius: 2px; }
  .key.black { width: 6px; height: 18px; background: #333; margin-left: -3px; margin-right: -3px; z-index: 1; }

  input {
    width: 100%; padding: 18px; border-radius: 16px;
    border: 1px solid var(--gold-main); background: rgba(255, 255, 255, 0.7);
    color: var(--text-dark); font-size: 18px; margin-bottom: 20px; position: relative; z-index: 2;
  }

  .btn-primary {
    width: 100%; padding: 18px; border-radius: 16px;
    background: linear-gradient(135deg, var(--gold-deep), #5c4810);
    color: #fff; font-weight: 900; font-size: 18px; border: none;
    box-shadow: 0 8px 20px rgba(92, 72, 16, 0.2); position: relative; z-index: 2;
  }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: rgba(251, 238, 167, 0.98); border-top: 1px solid rgba(138, 109, 26, 0.2);
    display: flex; padding: 15px 0 env(safe-area-inset-bottom); z-index: 100;
  }
  .nav-item { flex: 1; text-align: center; color: var(--gold-deep); opacity: 0.4; }
  .nav-item.active { opacity: 1; font-weight: bold; }

  #lock-overlay { position: fixed; inset: 0; background: rgba(251, 238, 167, 0.98); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .btn-n { width: 75px; height: 75px; border-radius: 50%; background: #fff; color: var(--gold-deep); border: 2px solid var(--gold-main); font-size: 26px; }
</style>
</head>
<body>

  <div class="floating-note" style="top:15%; left:10%;">♩</div>
  <div class="floating-note" style="top:45%; right:8%; animation-delay: 1s;">♫</div>
  <div class="floating-note" style="bottom:25%; left:5%; animation-delay: 2s;">♬</div>

  <div class="app-container" id="view-student">
    <div class="header">
      <div class="main-title">112年莊敬高職音樂畢業公演</div>
      <div class="sub-title">MUSIC GRADUATION</div>
    </div>

    <div id="student-login" class="main-card">
        <div class="piano-decoration">
            <div class="key"></div><div class="black"></div><div class="key"></div><div class="black"></div><div class="key"></div><div class="key"></div><div class="black"></div><div class="key"></div><div class="black"></div><div class="key"></div><div class="black"></div><div class="key"></div>
        </div>
        
        <div id="login-step1">
            <div style="text-align:center; font-size:40px; color:var(--gold-deep); margin-bottom:10px;">𝄞</div>
            <input type="text" id="stu-name" placeholder="請輸入姓名">
            <button class="btn-primary" onclick="searchStudent()">進入查詢系統</button>
        </div>

        <div id="login-step2" style="display:none">
            <p id="stu-welcome" style="text-align:center; color:var(--gold-deep); margin-bottom:15px; font-weight:bold;"></p>
            <input type="password" id="stu-pwd" placeholder="輸入 4 位密碼" inputmode="numeric" maxlength="4">
            <button class="btn-primary" onclick="authStudent()">驗證登入</button>
        </div>

        <div class="card-bg-icon">♪</div>
    </div>

    <div id="student-info" style="display:none"></div>
    <div id="leader-section" style="display:none; margin-top:20px;"><button class="btn-primary" style="background:#1b5e20;" onclick="openLeaderAtt()">⭐ 進入組長點名系統</button></div>
    <div class="admin-btn" onclick="showLock()">SYSTEM ADMIN ACCESS</div>
  </div>

  <div class="app-container admin-panel" id="view-admin" style="display:none; padding-bottom:100px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 id="admin-title" style="color:var(--gold-deep); margin:0">後台管理</h2>
        <button id="leader-exit" onclick="location.reload()" style="background:white; border:1px solid var(--gold-main); color:var(--gold-deep); border-radius:8px; padding:8px 15px; display:none; font-weight:bold;">退出點名</button>
    </div>
    <div id="pane-list"></div> 
    <div id="pane-att" style="display:none"><h3>今日點名</h3><div id="att-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;"></div><button class="btn-primary" style="margin-top:25px" onclick="submitAtt()">儲存點名</button></div>
    <div id="pane-rep" style="display:none"><h3>報表</h3><div class="main-card" style="text-align:center"><div id="total-sum" style="font-size:48px; color:var(--accent-red); font-weight:900">$0</div><div id="debt-list" style="text-align:left; font-size:14px; margin-top:20px; color:var(--gold-deep)"></div></div><button class="btn-primary" style="margin-top:15px; background:#34c759;" onclick="doExcel()">匯出 Excel</button></div>
    <div id="pane-set" style="display:none"><h3>設定</h3><button class="btn-primary" onclick="setAdminPwd()">修改密碼</button><button class="btn-primary" style="margin-top:15px; background:#fff; color:var(--gold-deep); border:1px solid var(--gold-deep)" onclick="location.reload()">返回首頁</button></div>
    <div class="nav-bar" id="admin-nav"><div class="nav-item active" onclick="go('list',this)">名單</div><div class="nav-item" onclick="go('att',this)">點名</div><div class="nav-item" onclick="go('rep',this)">報表</div><div class="nav-item" onclick="go('set',this)">設定</div></div>
  </div>

  <div id="lock-overlay">
      <div style="font-size:50px; color:var(--gold-deep); margin-bottom:10px">𝄞</div>
      <div id="pwd-dots" style="display:flex; gap:18px; margin-bottom:35px"><div style="width:18px; height:18px; border:2px solid var(--gold-deep); border-radius:50%"></div><div style="width:18px; height:18px; border:2px solid var(--gold-deep); border-radius:50%"></div><div style="width:18px; height:18px; border:2px solid var(--gold-deep); border-radius:50%"></div><div style="width:18px; height:18px; border:2px solid var(--gold-deep); border-radius:50%"></div></div>
      <div style="display:grid; grid-template-columns:repeat(3,80px); gap:18px">
          <script>for(let i=1; i<=9; i++) document.write(`<button class="btn-n" onclick="press(${i})">${i}</button>`);</script>
          <button onclick="document.getElementById('lock-overlay').style.display='none'" style="background:none; color:var(--gold-deep); border:none;">✕</button>
          <button class="btn-n" onclick="press(0)">0</button>
          <button onclick="press('del')" style="background:none; color:var(--gold-deep); border:none;">⌫</button>
      </div>
  </div>

<script>
  // Firebase 設定
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {}, _isLeader = false;

  _db.ref('adminConfig/password').on('value', s => { if(s.val()) _mPin = s.val(); });
  _db.ref('students').on('value', s => { _all = s.val() || {}; renderAdminList(); updateStats(); if(_user) renderUser(); });

  function searchStudent() {
    const n = document.getElementById('stu-name').value.trim();
    const f = Object.entries(_all).find(([id, s]) => s.name === n);
    if(!f) return alert("查無姓名");
    _user = f[0];
    document.getElementById('login-step1').style.display = 'none';
    document.getElementById('login-step2').style.display = 'block';
    document.getElementById('stu-welcome').innerHTML = `音樂科同學：<b>${n}</b>`;
  }

  function authStudent() {
    const p = document.getElementById('stu-pwd').value;
    const s = _all[_user];
    if(!s.password) { _db.ref(`students/${_user}`).update({password: p}); checkPermission(s); }
    else if(s.password === p) checkPermission(s);
    else alert("密碼錯誤");
  }

  function checkPermission(s) { _isLeader = s.isLeader || false; renderUser(); if(_isLeader) document.getElementById('leader-section').style.display = 'block'; }

  function renderUser() {
    document.getElementById('student-login').style.display = 'none';
    const s = _all[_user];
    const debt = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
    const h = s.history ? Object.values(s.history).reverse() : [];
    let html = `<div class="main-card">
        <div style="font-size:14px; color:var(--gold-deep); font-weight:bold">${s.name}${_isLeader?'[組長]':''}</div>
        <div style="font-size:54px; font-weight:900; color:${debt>0?'var(--accent-red)':'var(--gold-deep)'}; margin:15px 0;">$${debt}</div>
        ${s.notification ? `<div class="main-card" style="background:white; padding:15px; border:1px dashed var(--gold-main); font-size:14px;">📢：${s.notification}</div>` : ''}
      </div>`;
    document.getElementById('student-info').innerHTML = html + `<div style="margin-top:20px; font-weight:bold; color:var(--gold-deep)">紀錄明細</div>` + h.map(i => `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid rgba(138,109,26,0.1); font-size:14px;"><span>${i.type}${i.amount?' $'+i.amount:''}</span><span>${i.time}</span></div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }

  function openLeaderAtt() {
      document.getElementById('view-student').style.display = 'none';
      document.getElementById('view-admin').style.display = 'block';
      document.getElementById('admin-title').innerText = "組長點名系統";
      document.getElementById('leader-exit').style.display = 'block';
      document.getElementById('admin-nav').style.display = 'none';
      go('att');
  }

  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; updDots(); }
  function press(v) {
    if(v === 'del') _pin = _pin.slice(0,-1);
    else if(_pin.length < 4) _pin += v;
    updDots();
    if(_pin.length === 4) {
        if(_pin === _mPin) {
            document.getElementById('lock-overlay').style.display = 'none';
            document.getElementById('view-student').style.display = 'none';
            document.getElementById('view-admin').style.display = 'block';
            document.getElementById('admin-nav').style.display = 'flex';
            go('list');
        } else { alert("錯誤"); _pin=""; updDots(); }
    }
  }
  function updDots() { const ds = document.getElementById('pwd-dots').children; for(let i=0; i<4; i++) ds[i].style.background = i < _pin.length ? 'var(--gold-deep)' : 'none'; }

  function renderAdminList() {
    const l = document.getElementById('pane-list'); if(!l) return;
    l.innerHTML = Object.entries(_all).map(([id, s]) => {
      const d = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
      return `<div class="list-item" style="background:white; padding:15px; border-radius:15px; margin-bottom:10px; border-left:5px solid var(--gold-main)">
                <div style="display:flex; justify-content:space-between;"><b>${s.name}</b> <span>$${d}</span></div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <button onclick="quickPay('${id}',${d})" style="flex:1; background:var(--gold-deep); color:#fff; border:none; padding:10px; border-radius:8px;">💰收錢</button>
                    <button onclick="quickLate('${id}')" style="flex:1; background:#fff; color:var(--gold-deep); border:1px solid var(--gold-deep); padding:10px; border-radius:8px;">⏰遲到</button>
                    <button onclick="toggleLeader('${id}',${s.isLeader})" style="flex:0.5; background:${s.isLeader?'var(--gold-deep)':'#eee'}; color:${s.isLeader?'#fff':'#999'}; border:none; border-radius:8px;">${s.isLeader?'⭐':'☆'}</button>
                </div>
              </div>`;
    }).join('');
  }

  function toggleLeader(id, cur) { _db.ref(`students/${id}`).update({ isLeader: !cur }); alert("權限已更新"); }
  function quickPay(id, debt) { const a = prompt(`收錢：`, debt); if(a>0) { _db.ref(`students/${id}`).update({ paidCount: (_all[id].paidCount||0) + Math.floor(a/100) }); _db.ref(`students/${id}/history`).push({ type:'繳費', amount: a, time: new Date().toLocaleDateString() }); } }
  function quickLate(id) { _db.ref(`students/${id}`).update({ lateCount: (_all[id].lateCount||0) + 1 }); _db.ref(`students/${id}/history`).push({ type:'遲到', time: new Date().toLocaleDateString() }); }

  function go(p, el) {
      ['list','att','rep','set'].forEach(i => document.getElementById('pane-'+i).style.display = 'none');
      document.getElementById('pane-'+p).style.display = 'block';
      if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
      if(p === 'att') {
          document.getElementById('att-grid').innerHTML = Object.entries(_all).map(([id, s]) => {
              _attData[id] = 'present';
              return `<div id="at-${id}" onclick="tk('${id}')" style="background:white; border:1px solid var(--gold-main); padding:15px; border-radius:12px; text-align:center; font-size:12px">${s.name}<br>✅</div>`;
          }).join('');
      }
  }
  window.tk = (id) => {
      const s = { 'present':['late','⏰'], 'late':['absent','❌'], 'absent':['leave','🍃'], 'leave':['present','✅'] };
      const cur = _attData[id]; _attData[id] = s[cur][0];
      document.getElementById('at-'+id).innerHTML = `${_all[id].name}<br>${s[cur][1]}`;
  };
  function submitAtt() {
      const t = new Date().toLocaleDateString();
      Object.entries(_attData).forEach(([id, st]) => { if(st==='late') { _db.ref(`students/${id}`).update({ lateCount: (_all[id].lateCount||0) + 1 }); _db.ref(`students/${id}/history`).push({ type:'遲到', time: t }); } });
      alert("儲存成功"); if(_isLeader && document.getElementById('admin-nav').style.display === 'none') { location.reload(); } else { go('list'); }
  }
  function updateStats() { let sum = 0; let html = ""; Object.values(_all).forEach(s => { const d = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100; sum += d; if(d > 0) html += `<div style="margin-bottom:8px">${s.name}: $${d}</div>`; }); if(document.getElementById('total-sum')) document.getElementById('total-sum').innerText = '$' + sum; if(document.getElementById('debt-list')) document.getElementById('debt-list').innerHTML = html; }
  function doExcel() { const d = [["姓名", "欠費"]]; Object.values(_all).forEach(s => d.push([s.name, Math.max(0, (s.lateCount||0)-(s.paidCount||0))*100])); const ws = XLSX.utils.aoa_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表"); XLSX.writeFile(wb, "畢業公演財務報表.xlsx"); }
  function setAdminPwd() { const p = prompt("新密碼"); if(p) _db.ref('adminConfig/password').set(p).then(()=>location.reload()); }
</script>
</body>
</html>
