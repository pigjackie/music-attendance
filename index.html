<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>112年莊敬音演三莊畢業公演管理系統 V2.3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  :root { --bg-dark: #0a0a0a; --gold-main: #d4af37; --gold-light: #fbeea7; --glass: rgba(255, 255, 255, 0.1); --accent-red: #ff3b30; --success: #34c759; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
  body { background: radial-gradient(circle at top right, #2c240d 0%, #0a0a0a 100%); background-attachment: fixed; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
  
  .app-container { flex: 1; width: 100%; padding: 30px 20px; display: flex; flex-direction: column; }
  .header { text-align: center; margin: 40px 0 30px; }
  .main-title { font-size: 30px; font-weight: 900; background: linear-gradient(to bottom, var(--gold-light), var(--gold-main)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); line-height: 1.3; }

  .main-card { background: var(--glass); border-radius: 25px; padding: 25px; border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); margin-bottom: 25px; }
  .btn-gold { width: 100%; padding: 18px; border-radius: 15px; background: linear-gradient(135deg, var(--gold-light), var(--gold-main)); color: #000; font-weight: 900; font-size: 18px; border: none; cursor: pointer; }
  
  .admin-panel { display: none; padding-bottom: 160px; }
  .list-item { background: rgba(255,255,255,0.05); padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 5px solid var(--gold-main); }
  
  .list-divider { text-align: center; color: var(--gold-main); font-weight: bold; font-size: 14px; margin: 30px 0 15px; border-bottom: 1px dashed var(--gold-main); padding-bottom: 5px; }

  .quota-box-container { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
  .quota-box { width: 40px; height: 40px; border: 2px solid var(--gold-main); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
  .quota-box.used { background: var(--gold-main); color: #000; }

  .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.95); border-top: 1px solid #333; display: flex; padding: 15px 0 calc(15px + env(safe-area-inset-bottom)); z-index: 100; }
  .nav-item { flex: 1; text-align: center; font-size: 13px; color: #777; cursor: pointer; }
  .nav-item.active { color: var(--gold-main); font-weight: 900; }
  
  .status-tag { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
  .tag-unpaid { background: var(--accent-red); color: #fff; }
  .tag-paid { background: var(--success); color: #fff; }
  
  input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.4); background: rgba(0,0,0,0.5); color: #fff; font-size: 18px; margin-bottom: 15px; text-align: center; }
  .help-text { font-size: 12px; color: #888; margin-top: 5px; line-height: 1.4; text-align: center; }
  .section-label { font-size: 14px; color: var(--gold-main); font-weight: bold; margin-bottom: 10px; display: block; text-align: center; }
</style>
</head>
<body>

  <div class="app-container" id="view-student">
    <div class="header"><div class="main-title">音演三莊<br>畢業公演管理系統</div></div>
    
    <div id="student-login" class="main-card">
        <span class="section-label">個人帳目查詢</span>
        <div id="step-name">
            <input type="text" id="stu-name" placeholder="請輸入姓名">
            <button class="btn-gold" onclick="searchStudent()">登入系統</button>
            <p class="help-text">首次登入需要設定 4 位數密碼。</p>
        </div>
        <div id="step-first-set" style="display:none">
            <p style="color:var(--gold-light); text-align:center; margin-bottom:15px; font-weight:bold;">✨ 首次登入設定密碼</p>
            <input type="password" id="first-pwd" placeholder="設定 4 位純數字密碼" inputmode="numeric" maxlength="4">
            <button class="btn-gold" onclick="setPassword()">確認設定並進入</button>
        </div>
        <div id="step-auth" style="display:none">
            <p id="auth-welcome" style="color:var(--gold-light); text-align:center; margin-bottom:15px; font-weight:bold;"></p>
            <input type="password" id="auth-pwd" placeholder="請輸入密碼" inputmode="numeric" maxlength="4">
            <button class="btn-gold" onclick="authStudent()">驗證登入</button>
        </div>
    </div>

    <div id="student-info" style="display:none"></div>
    <div style="margin-top:auto; text-align:center; padding:40px 0; color:#333; font-size:12px;" onclick="showLock()">管理後台登入</div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h2 style="font-size:24px; color:var(--gold-main); margin:0;">後台管理控制台</h2>
        <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#888; border-radius:10px; padding:5px 12px;">登出</button>
    </div>
    
    <div id="pane-list">
        <div class="main-card" style="padding:15px; border-color:var(--success);">
            <span class="section-label" style="color:var(--success);">臨時新增同學/成員</span>
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-stu-name" placeholder="姓名" style="margin-bottom:0; flex:2;">
                <button onclick="addNewStudent()" style="flex:1; background:var(--success); color:#fff; border:none; border-radius:12px; font-weight:bold; font-size:14px;">新增</button>
            </div>
        </div>
        <div id="h-l"></div>
    </div> 

    <div id="pane-att" style="display:none">
        <div id="att-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;"></div>
        <button class="btn-gold" style="margin-top:30px" onclick="submitAtt()">儲存本日點名紀錄</button>
    </div>

    <div id="pane-rep" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><h3 style="margin:0; color:var(--gold-light);">全班總欠費</h3><div id="total-sum-badge" style="background:var(--accent-red); padding:8px 15px; border-radius:15px; font-weight:bold;">$0</div></div>
        <div class="main-card" style="padding:15px; height: 50vh; overflow-y: auto;"><div id="full-report-list"></div></div>
    </div>

    <div id="pane-set" style="display:none">
        <div class="main-card">
            <h3 style="color:var(--gold-main); text-align:center;">帳目全部重設</h3>
            <button class="btn-gold" onclick="resetAllAccounting()" style="background:var(--accent-red); color:#fff;">確定全部帳目歸零</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="go('list',this)">名單</div>
        <div class="nav-item" onclick="go('att',this)">點名</div>
        <div class="nav-item" onclick="go('rep',this)">報表</div>
        <div class="nav-item" onclick="go('set',this)">設定</div>
    </div>
  </div>

  <div id="lock-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:3000; flex-direction:column; align-items:center; justify-content:center;">
      <div id="pwd-dots" style="display:flex; gap:20px; margin-bottom:40px"><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div></div>
      <div style="display:grid; grid-template-columns:repeat(3,80px); gap:20px"><script>for(let i=1; i<=9; i++) document.write(`<button style="width:70px;height:70px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:24px;" onclick="press(${i})">${i}</button>`);</script><button style="color:#555" onclick="document.getElementById('lock-overlay').style.display='none'">✕</button><button style="width:70px;height:70px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:24px;" onclick="press(0)">0</button><button style="color:#555" onclick="press('del')">⌫</button></div>
  </div>

<script>
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {};

  const MUSIC_STU = ["毛語程","林叡成","田宇紘","吳昆達","吳宥良","黃崇恩","林宏澤","金品澔","劉宸昀","蔡呈樂","蘇瑞吾","梁之凡","蔡宗佑","黃穩達","馮康維","倪秉澤","廖敏君","劉慶霈","蔡慧琳","鄭淳融","魏宜宸","徐婉瑜","安兪臻","江岑君","池宛昕","李曉萍","周玄禮","王以昕","林祐立","邱詩涵","胡云珊","蔡逸宣","高慧君","張路淇","陳芃瑾","陳雨彤","陳宥安","陳圓卿","傅克諳","曾妘湘"];
  const ACTING_STU = ["王玟茜","王語舒","姚宥湘","陳思妤","楊镕慈","王偉家","何建伸","姜榮绅","郭庭傑","陳泊源","陳軍任","黃治容","盧宥辰","謝行知"];
  const INITIAL_LIST = [...MUSIC_STU, "蕭旭成", ...ACTING_STU];

  _db.ref('students').on('value', s => {
      _all = s.val() || {};
      if(Object.keys(_all).length === 0) {
          INITIAL_LIST.forEach((n, index) => _db.ref('students').push({ no: index + 1, name: n, totalFine: 0, propFine: 0, paidAmt: 0, leaveQuota: 2, fundPaid: false }));
      }
      renderAdminList(); renderFullReport(); if(_user) renderUser();
  });

  function renderAdminList() {
    const l = document.getElementById('h-l'); if(!l) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    let html = "";
    sorted.forEach(([id, s]) => {
      if(s.no === 42) html += `<div class="list-divider">演三莊同學名單</div>`;
      const debt = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0);
      html += `<div class="list-item">
        <div style="display:flex; justify-content:space-between;"><b>${s.no}. ${s.name}</b><span onclick="toggleFund('${id}', ${s.fundPaid})" class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}">基金：${s.fundPaid?'已繳':'未繳'}</span></div>
        <div class="quota-box-container">
          <div class="quota-box ${s.leaveQuota <= 1 ? 'used' : ''}" onclick="adminDeduct('${id}', 1)">${s.leaveQuota <= 1 ? '✔' : ''}</div>
          <div class="quota-box ${s.leaveQuota <= 0 ? 'used' : ''}" onclick="adminDeduct('${id}', 0)">${s.leaveQuota <= 0 ? '✔' : ''}</div>
          <span style="margin-left:auto; color:var(--accent-red); font-weight:bold;">$${debt}</span>
        </div>
        <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:8px; margin-top:12px;">
          <button onclick="setProp('${id}')" style="padding:8px; border-radius:8px; background:#222; color:#fff; font-size:11px; border:1px solid #444;">道具費/細項</button>
          <button onclick="manualAddFine('${id}')" style="padding:8px; border-radius:8px; background:#444; color:var(--gold-main); font-size:11px; border:1px solid var(--gold-main);">手動雜項費</button>
          <button onclick="addFine('${id}', 100, '遲到罰款')" style="padding:8px; border-radius:8px; background:var(--accent-red); color:#fff; font-size:11px; border:none;">遲到+100</button>
          <button onclick="adminPaid('${id}')" style="padding:8px; border-radius:8px; background:var(--gold-main); color:#000; font-weight:bold; font-size:11px; border:none;">收現</button>
        </div>
      </div>`;
    });
    l.innerHTML = html;
  }

  function manualAddFine(id) {
      const amt = prompt("請輸入手動金額（例如: 50）：");
      if(!amt || isNaN(amt)) return;
      const reason = prompt("請輸入費用原因（例如: 影印費）：");
      if(!reason) return;
      _db.ref(`students/${id}`).update({ totalFine: (_all[id].totalFine||0) + parseInt(amt) });
      _db.ref(`students/${id}/history`).push({ type: "手動雜項費", note: reason, amt: parseInt(amt), time: new Date().toLocaleDateString() });
      alert("已成功加入手動費用。");
  }

  function addNewStudent() {
      const name = document.getElementById('new-stu-name').value.trim();
      if(!name) return alert("請輸入姓名");
      const nextNo = Object.keys(_all).length + 1;
      _db.ref('students').push({ no: nextNo, name: name, totalFine: 0, propFine: 0, paidAmt: 0, leaveQuota: 2, fundPaid: false });
      document.getElementById('new-stu-name').value = "";
      alert(name + " 已加入名單。");
  }

  function renderUser() {
    const s = _all[_user];
    const debt = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0);
    const h = s.history ? Object.values(s.history).reverse() : [];
    document.getElementById('student-login').style.display = 'none';
    document.getElementById('student-info').innerHTML = `
      <div class="main-card" style="text-align:center;">
        <div style="font-size:22px; font-weight:bold; color:var(--gold-main);">${s.name} 同學</div>
        <div style="font-size:56px; font-weight:900; margin:15px 0; color:${debt>0?'var(--accent-red)':'var(--gold-main)'};">$${debt}</div>
        <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
           <div class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}">畢業基金：${s.fundPaid?'已繳清':'未繳'}</div>
           <div class="status-tag" style="background:#444">折抵機會：${s.leaveQuota||0} 次</div>
        </div>
        ${s.propNote ? `<div style="margin-top:15px; font-size:14px; color:#aaa; border-top:1px solid #444; padding-top:10px;">道具明細：<br>${s.propNote}</div>` : ''}
      </div>
      <div style="margin:20px 0 10px; font-weight:bold; color:var(--gold-light); text-align:center;">帳目歷史紀錄</div>
    ` + h.map(i => `<div style="padding:12px 0; border-bottom:1px solid #222; font-size:14px; display:flex; justify-content:space-between;">
        <span>${i.type}${i.note ? ' <br><small style="color:var(--gold-main)">原因：'+i.note+'</small>' : ''}</span>
        <span style="text-align:right;">${i.amt?'$'+i.amt:''}<br><small style="color:#444">${i.time}</small></span>
      </div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }

  // 以下為原有邏輯修正與保留
  function searchStudent() {
      const n = document.getElementById('stu-name').value.trim();
      const f = Object.entries(_all).find(([id, s]) => s.name === n);
      if(!f) return alert("查無姓名。");
      _user = f[0];
      document.getElementById('step-name').style.display = 'none';
      if(!_all[_user].password) document.getElementById('step-first-set').style.display = 'block';
      else { document.getElementById('step-auth').style.display = 'block'; document.getElementById('auth-welcome').innerText = n + " 同學，請驗證密碼"; }
  }
  function setPassword() { const p = document.getElementById('first-pwd').value; if(p.length !== 4 || isNaN(p)) return alert("請設 4 位數字。"); _db.ref(`students/${_user}`).update({ password: p }); renderUser(); }
  function authStudent() { if(_all[_user].password === document.getElementById('auth-pwd').value) renderUser(); else alert("密碼錯誤。"); }
  function adminDeduct(id, target) { const s = _all[id]; const q = s.leaveQuota !== undefined ? s.leaveQuota : 2; if (q <= target) { if(confirm("取消折抵恢復 $100？")) _db.ref(`students/${id}`).update({ leaveQuota: q + 1, totalFine: (s.totalFine || 0) + 100 }); } else { if(confirm("消耗機會折抵 $100？")) { _db.ref(`students/${id}`).update({ leaveQuota: q - 1, totalFine: Math.max(0, (s.totalFine || 0) - 100) }); _db.ref(`students/${id}/history`).push({ type: "機會折抵", amt: -100, time: new Date().toLocaleDateString() }); } } }
  function setProp(id) { const amt = prompt("道具費金額："); const note = prompt("道具費說明："); if(amt!==null) _db.ref(`students/${id}`).update({ propFine:parseInt(amt), propNote:note }); }
  function addFine(id, amt, type) { _db.ref(`students/${id}`).update({ totalFine:(_all[id].totalFine||0)+amt }); _db.ref(`students/${id}/history`).push({ type:type, amt:amt, time:new Date().toLocaleDateString() }); }
  function adminPaid(id) { const amt = prompt("收訖現金額："); if(amt>0) { _db.ref(`students/${id}`).update({ paidAmt: (_all[id].paidAmt||0)+parseInt(amt) }); _db.ref(`students/${id}/history`).push({ type:"現金收訖", amt:amt, time:new Date().toLocaleDateString() }); } }
  function toggleFund(id, cur) { _db.ref(`students/${id}`).update({ fundPaid: !cur }); }
  function go(p, el) { ['list','att','rep','set'].forEach(i => document.getElementById('pane-'+i).style.display = 'none'); document.getElementById('pane-'+p).style.display = 'block'; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); if(el) el.classList.add('active'); if(p === 'att') renderAttGrid(); }
  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; }
  function press(v) { if(v==='del') _pin=_pin.slice(0,-1); else if(_pin.length<4) _pin+=v; const ds=document.getElementById('pwd-dots').children; for(let i=0; i<4; i++) ds[i].style.background=i<_pin.length?'var(--gold-main)':'none'; if(_pin.length===4) { if(_pin===_mPin) { document.getElementById('lock-overlay').style.display='none'; document.getElementById('view-student').style.display='none'; document.getElementById('view-admin').style.display='block'; go('list'); } else { alert("錯誤"); _pin=""; } } }
  function resetAllAccounting() { if(confirm("警告：這將徹底重設所有帳目與密碼！")) { _db.ref('students').remove().then(() => location.reload()); } }
  function renderAttGrid() { const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99)); document.getElementById('att-grid').innerHTML = sorted.map(([id, s]) => { _attData[id] = { status: 'present', note: '' }; return `<div id="at-${id}" onclick="tk('${id}')" style="background:rgba(255,255,255,0.05); padding:10px 5px; border-radius:15px; text-align:center; font-size:12px;">${s.name}<br><span id="icon-${id}" style="font-size:24px;">✅</span><br><button onclick="setNote(event, '${id}')" style="font-size:9px; background:#444; color:#fff; border:none; border-radius:5px; margin-top:5px; padding:2px 8px;">註記</button></div>`; }).join(''); }
  window.setNote = (e, id) => { e.stopPropagation(); const n = prompt("輸入老師註記："); if(n!==null) _attData[id].note = n; }
  window.tk = (id) => { const sMap = { 'present':['late','⏰'], 'late':['leave','🍃'], 'leave':['absent','❌'], 'absent':['present','✅'] }; const cur = _attData[id].status; _attData[id].status = sMap[cur][0]; document.getElementById('icon-'+id).innerText = sMap[cur][1]; }
  function submitAtt() { const t = new Date().toLocaleDateString(); Object.entries(_attData).forEach(([id, data]) => { if(data.status === 'late') addFine(id, 100, "點名遲到"); if(data.note) _db.ref(`students/${id}/history`).push({ type: "老師註記", note: data.note, time: t }); }); alert("儲存完成！"); go('list'); }
  function renderFullReport() { const listDiv = document.getElementById('full-report-list'); if(!listDiv) return; const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99)); let total = 0; let html = ""; sorted.forEach(([id, s]) => { if(s.no === 42) html += `<div class="list-divider">演三莊同學名單</div>`; const d = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0); total += d; html += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #222; font-size:14px;"><span>${s.no}. ${s.name} ${s.fundPaid?'':'(未繳基金)'}</span><span style="color:${d>0?'var(--accent-red)':'#666'}">$${d}</span></div>`; }); listDiv.innerHTML = html; document.getElementById('total-sum-badge').innerText = '$' + total; }
</script>
</body>
</html>
