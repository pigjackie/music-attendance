<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>音演三莊公演管理系統 V3.1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root { 
    --bg-dark: #0a0a0a; --gold-main: #d4af37; --gold-light: #fbeea7; 
    --glass: rgba(255, 255, 255, 0.1); --accent-red: #ff3b30; --success: #34c759; 
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle at top right, #332b12 0%, #0a0a0a 100%); 
    background-attachment: fixed; color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; 
  }
  
  body { display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
  .app-container { flex: 1; width: 100%; padding: 30px 20px; display: flex; flex-direction: column; position: relative; z-index: 10; }
  
  .deco-symbol { position: fixed; color: var(--gold-main); opacity: 0.12; pointer-events: none; z-index: 0; font-weight: 900; }

  .header { text-align: center; margin: 40px 0 30px; }
  .main-title { 
    font-size: 42px; font-weight: 900; 
    background: linear-gradient(to bottom, var(--gold-light), var(--gold-main)); 
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
    text-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); line-height: 1.2; letter-spacing: 2px;
  }

  .login-card { 
    background: var(--glass); border-radius: 40px; padding: 50px 25px; 
    border: 2px solid var(--gold-main); backdrop-filter: blur(20px); 
    margin: 20px 0; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
  }

  input { 
    width: 100%; padding: 25px; border-radius: 20px; 
    border: 3px solid var(--gold-main); background: rgba(0,0,0,0.7); 
    color: #fff; font-size: 28px; font-weight: bold; margin-bottom: 25px; text-align: center; 
  }
  .btn-gold { 
    width: 100%; padding: 25px; border-radius: 20px; 
    background: linear-gradient(135deg, var(--gold-light), var(--gold-main)); 
    color: #000; font-weight: 900; font-size: 28px; border: none; cursor: pointer; 
  }

  .admin-panel { display: none; padding-bottom: 180px; }
  .list-item { 
    background: rgba(255,255,255,0.08); padding: 25px; border-radius: 30px; 
    margin-bottom: 15px; border-left: 10px solid var(--gold-main); 
  }
  .name-link { font-size: 34px; font-weight: 900; color: var(--gold-light); cursor: pointer; text-decoration: underline; }

  .quota-row { display: flex; gap: 10px; margin-top: 15px; }
  .quota-box-text { 
    flex: 1; height: 65px; border: 2px solid var(--gold-main); border-radius: 15px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold; color: var(--gold-main); transition: 0.3s; cursor: pointer;
  }
  .quota-box-text.used { background: var(--gold-main); color: #000; }

  .att-box { 
    background: rgba(255,255,255,0.05); padding: 25px 5px; border-radius: 25px; 
    text-align: center; border: 1px solid #444; transition: 0.2s;
  }
  .att-box.active-late { border-color: var(--accent-red); background: rgba(255, 59, 48, 0.1); }
  .att-status-text { font-size: 26px; font-weight: 900; display: block; margin-top: 10px; }
  .status-present { color: var(--success); }
  .status-late { color: var(--accent-red); }
  .status-leave { color: #5ac8fa; }
  .status-absent { color: #8e8e93; }

  .nav-bar { 
    position: fixed; bottom: 0; left: 0; width: 100%; height: 95px;
    background: rgba(10,10,10,0.98); border-top: 2px solid #333; 
    display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; 
  }
  .nav-item { flex: 1; text-align: center; font-size: 18px; color: #777; align-self: center; }
  .nav-item.active { color: var(--gold-main); font-weight: 900; }
  
  .list-divider { 
    text-align: center; color: var(--gold-main); font-weight: 900; 
    font-size: 24px; margin: 40px 0 20px; border-top: 3px solid var(--gold-main); 
    padding-top: 15px; letter-spacing: 5px;
  }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; }
  .modal-content { background: #111; border-radius: 40px; padding: 35px; border: 3px solid var(--gold-main); max-width: 600px; margin: 0 auto; }

  .status-tag { padding: 8px 15px; border-radius: 10px; font-size: 16px; font-weight: bold; }
  .tag-unpaid { background: var(--accent-red); color: #fff; }
  .tag-paid { background: var(--success); color: #fff; }
</style>
</head>
<body>

  <div class="deco-symbol" style="top:5%; left:5%; font-size:100px;">𝄞</div>
  <div class="deco-symbol" style="top:25%; right:8%; font-size:80px;">𝄢</div>
  <div class="deco-symbol" style="bottom:15%; left:10%; font-size:90px;">♫</div>
  <div class="deco-symbol" style="bottom:8%; right:5%; font-size:70px;">♬</div>

  <div class="app-container" id="view-student">
    <div class="header"><div class="main-title">音演三莊<br>公演管理系統</div></div>
    
    <div class="login-card" id="student-login">
        <div style="text-align:center; font-size:90px; margin-bottom:20px;">🎻</div>
        <div id="step-name">
            <span style="display:block; text-align:center; color:var(--gold-main); margin-bottom:20px; font-size:24px; font-weight:bold;">個人帳目查詢系統</span>
            <input type="text" id="stu-name" placeholder="請輸入姓名">
            <button class="btn-gold" onclick="searchStudent()">登入系統</button>
        </div>
        <div id="step-first-set" style="display:none">
            <p style="font-size:24px; text-align:center;">首次登入，請設定密碼：</p>
            <input type="password" id="first-pwd" placeholder="4 位數字" maxlength="4" inputmode="numeric">
            <button class="btn-gold" onclick="setPassword()">設定完成</button>
        </div>
        <div id="step-auth" style="display:none">
            <p id="auth-welcome" style="font-size:24px; text-align:center; color:var(--gold-light);"></p>
            <input type="password" id="auth-pwd" placeholder="密碼" maxlength="4" inputmode="numeric">
            <button class="btn-gold" onclick="authStudent()">驗證進入</button>
        </div>
    </div>
    <div id="student-info" style="display:none"></div>
    <div style="margin-top:auto; text-align:center; padding:40px 0; color:#444; font-size:18px; font-weight:bold;" onclick="showLock()">ADMIN</div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-size:32px; color:var(--gold-main);">後台管理端</h2>
        <button onclick="location.reload()" style="background:none; border:2px solid #555; color:#888; border-radius:15px; padding:10px 20px; font-size:18px;">登出</button>
    </div>
    
    <div id="pane-list"><div id="h-l"></div></div> 
    
    <div id="pane-att" style="display:none">
        <div style="background:rgba(212,175,55,0.1); padding:20px; border-radius:20px; color:var(--gold-main); font-size:20px; text-align:center; margin-bottom:20px; font-weight:bold;">
            ⚠️ 點擊人名切換後<br>務必點擊最下方【儲存】才會扣款
        </div>
        <div id="att-grid" style="display:grid; grid-template-columns:repeat(2,1fr); gap:15px;"></div>
        <div style="height:40px;"></div>
        <button class="btn-gold" style="background:var(--success); color:#fff; height:100px; font-size:32px;" onclick="submitAtt()">💾 點我儲存點名紀錄</button>
    </div>

    <div id="pane-rep" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;"><h3>總欠費金額</h3><div id="total-sum-badge" style="background:var(--accent-red); padding:10px 20px; border-radius:20px; font-weight:bold; font-size:24px;">$0</div></div>
        <div id="full-report-list" class="login-card" style="padding:20px; height: 50vh; overflow-y: auto; text-align: left; font-size:22px;"></div>
        <button class="btn-gold" style="background:#248a3d; color:#fff; margin-top:20px;" onclick="doExcel()">📊 下載 Excel 報表</button>
    </div>

    <div id="pane-set" style="display:none">
        <div class="login-card">
            <h3 style="color:var(--gold-main); text-align:center; font-size:28px;">帳目大歸零</h3>
            <p style="text-align:center; color:#888; margin-bottom:30px;">名單將保留，僅清空金額與機會。</p>
            <button class="btn-gold" onclick="resetAllAccounting()" style="background:var(--accent-red); color:#fff;">🛑 確定全部重設</button>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item active" onclick="go('list',this)">👥 名單</div>
        <div class="nav-item" onclick="go('att',this)">📅 點名</div>
        <div class="nav-item" onclick="go('rep',this)">📊 報表</div>
        <div class="nav-item" onclick="go('set',this)">⚙️ 設定</div>
    </div>
  </div>

  <div id="detail-modal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h3 id="modal-name" style="margin:0; color:var(--gold-main); font-size:36px;"></h3>
            <button onclick="closeModal()" style="background:none; border:none; color:#888; font-size:40px;">✕</button>
        </div>
        <div id="modal-body"></div>
        <div style="display:grid; grid-template-columns: 1fr; gap:15px; margin-top:30px;">
            <button class="btn-gold" style="background:var(--accent-red); color:#fff; font-size:22px;" onclick="addFineFromModal(100, '補收遲到')">補開遲到 $100</button>
            <button class="btn-gold" style="background:#444; color:#fff; font-size:22px;" onclick="manualAddFineFromModal()">手動雜項費</button>
            <button class="btn-gold" style="background:#222; color:#fff; font-size:22px;" onclick="setPropFromModal()">道具費設定</button>
            <button class="btn-gold" style="font-size:22px;" onclick="adminPaidFromModal()">現金收訖</button>
        </div>
        <div style="margin-top:30px; border-top:2px solid #333; padding-top:30px;">
            <b style="color:var(--gold-light); font-size:24px;">帳目細目紀錄：</b>
            <div id="modal-history" style="font-size:20px; margin-top:15px; max-height:300px; overflow-y:auto;"></div>
        </div>
    </div>
  </div>

  <div id="lock-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:3000; flex-direction:column; align-items:center; justify-content:center;">
      <div id="pwd-dots" style="display:flex; gap:25px; margin-bottom:50px"><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div><div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div></div>
      <div style="display:grid; grid-template-columns:repeat(3,90px); gap:25px"><script>for(let i=1; i<=9; i++) document.write(`<button style="width:80px;height:80px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:32px;font-weight:bold;border:1px solid #444;" onclick="press(${i})">${i}</button>`);</script><button onclick="document.getElementById('lock-overlay').style.display='none'">✕</button><button style="width:80px;height:80px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:32px;font-weight:bold;border:1px solid #444;" onclick="press(0)">0</button><button onclick="press('del')">⌫</button></div>
  </div>

<script>
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {}, _currentModalId = null;

  _db.ref('students').on('value', s => {
      _all = s.val() || {};
      renderAdminList(); renderFullReport(); 
      if(_user) renderUser();
      if(_currentModalId) updateModalContent(_currentModalId);
  });

  function renderAdminList() {
    const l = document.getElementById('h-l'); if(!l) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    let html = "";
    sorted.forEach(([id, s]) => {
      if(s.no === 42) html += `<div class="list-divider">—— 演三莊同學名單 ——</div>`;
      const debt = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0);
      html += `<div class="list-item">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="name-link" onclick="openModal('${id}')">${s.no}. ${s.name}</div>
            <span onclick="toggleFund('${id}', ${s.fundPaid})" class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}" style="font-size:18px; padding:12px 20px;">${s.fundPaid?'基金已繳':'欠 $1300'}</span>
        </div>
        <div class="quota-row">
            <div class="quota-box-text ${s.leaveQuota<=1?'used':''}" onclick="adminDeduct('${id}',1)">${s.leaveQuota<=1?'✔ 已抵':'1 次折抵'}</div>
            <div class="quota-box-text ${s.leaveQuota<=0?'used':''}" onclick="adminDeduct('${id}',0)">${s.leaveQuota<=0?'✔ 已抵':'2 次折抵'}</div>
        </div>
        <div style="text-align:right; margin-top:15px;"><b style="color:var(--accent-red); font-size:38px;">$${debt}</b></div>
      </div>`;
    });
    l.innerHTML = html;
  }

  // 關鍵修正：確保 render 完後不覆蓋 _attData 的已有值
  function renderAttGrid() {
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    document.getElementById('att-grid').innerHTML = sorted.map(([id, s]) => {
      // 只有當此 id 還沒被點過，才初始化它
      if (!_attData[id]) _attData[id] = { status: 'present', note: '' };
      
      const cur = _attData[id].status;
      const statusTextMap = { 'present': '出席', 'late': '遲到', 'leave': '請假', 'absent': '缺席' };
      const statusClassMap = { 'present': 'status-present', 'late': 'status-late', 'leave': 'status-leave', 'absent': 'status-absent' };
      
      return `<div id="at-${id}" onclick="tk('${id}')" class="att-box ${cur==='late'?'active-late':''}">
        <b style="font-size:22px;">${s.name}</b><br>
        <span id="txt-${id}" class="att-status-text ${statusClassMap[cur]}">${statusTextMap[cur]}</span>
        <button onclick="setNote(event,'${id}')" style="font-size:14px; background:#332b12; color:var(--gold-main); border:2px solid var(--gold-main); margin-top:15px; border-radius:12px; padding:8px 18px;">${_attData[id].note?'已註記':'寫註記'}</button>
      </div>`;
    }).join('');
  }

  window.tk = (id) => {
      const sMap = { 'present':['late','遲到','status-late'], 'late':['leave','請假','status-leave'], 'leave':['absent','缺席','status-absent'], 'absent':['present','出席','status-present'] };
      const cur = _attData[id].status;
      const next = sMap[cur];
      _attData[id].status = next[0];
      const el = document.getElementById('txt-'+id);
      el.innerText = next[1];
      el.className = 'att-status-text ' + next[2];
      document.getElementById('at-'+id).classList.toggle('active-late', next[0] === 'late');
  }

  function submitAtt() {
      const t = new Date().toLocaleDateString();
      Object.entries(_attData).forEach(([id, data]) => {
          if(data.status === 'late') {
              _db.ref(`students/${id}`).update({ totalFine: (_all[id].totalFine||0) + 100 });
              _db.ref(`students/${id}/history`).push({ type: "排練遲到罰款", amt: 100, time: t });
          }
          if(data.note) {
              _db.ref(`students/${id}/history`).push({ type: "點名註記", note: data.note, time: t });
          }
      });
      _attData = {}; // 儲存後清空暫存
      alert("💾 點名紀錄已儲存，金額已同步更新！");
      go('list');
  }

  // 搜尋、密碼、分頁等基礎邏輯
  function searchStudent() {
      const n = document.getElementById('stu-name').value.trim();
      const f = Object.entries(_all).find(([id, s]) => s.name === n);
      if(!f) return alert("查無姓名");
      _user = f[0]; document.getElementById('step-name').style.display = 'none';
      if(!_all[_user].password) document.getElementById('step-first-set').style.display = 'block';
      else { document.getElementById('step-auth').style.display = 'block'; document.getElementById('auth-welcome').innerText = n + " 同學，請驗證"; }
  }
  function setPassword() { const p = document.getElementById('first-pwd').value; if(p.length !== 4) return alert("請設4位數字"); _db.ref(`students/${_user}`).update({ password: p }); renderUser(); }
  function authStudent() { if(_all[_user].password === document.getElementById('auth-pwd').value) renderUser(); else alert("錯誤"); }
  function renderUser() {
    const s = _all[_user]; const debt = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0); const h = s.history ? Object.values(s.history).reverse() : [];
    document.getElementById('student-login').style.display = 'none';
    document.getElementById('student-info').innerHTML = `<div class="login-card" style="text-align:center;"><div style="font-size:30px; font-weight:bold; color:var(--gold-main);">${s.name} 同學</div><div style="font-size:90px; font-weight:900; margin:10px 0; color:var(--accent-red);">$${debt}</div><div style="display:flex; justify-content:center; gap:10px;"><div class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}" style="font-size:20px; padding:10px 25px;">基金：${s.fundPaid?'已繳清':'未繳'}</div></div><div style="margin-top:20px; font-size:24px; color:var(--gold-light);">折抵機會：${s.leaveQuota||0} 次</div></div><div style="margin:30px 0 15px; font-weight:bold; color:var(--gold-light); font-size:26px; text-align:center;">📜 帳目變動明細</div>` + h.map(i => `<div style="padding:20px 0; border-bottom:1px solid #333; font-size:22px; display:flex; justify-content:space-between;"><span><b>${i.type}</b>${i.note?' <br><small style="color:var(--gold-main); font-size:18px;">'+i.note+'</small>':''}</span><span style="text-align:right;">${i.amt?'$'+i.amt:''}<br><small style="color:#555; font-size:16px;">${i.time}</small></span></div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }
  function openModal(id) { _currentModalId = id; document.getElementById('modal-name').innerText = `${_all[id].no}. ${_all[id].name}`; updateModalContent(id); document.getElementById('detail-modal').style.display = 'block'; }
  function updateModalContent(id) { const s = _all[id]; const debt = (s.totalFine||0) + (s.propFine||0) + (s.fundPaid?0:1300) - (s.paidAmt||0); document.getElementById('modal-body').innerHTML = `<div style="text-align:center;"><div style="font-size:70px; font-weight:900; color:var(--accent-red);">$${debt}</div></div><div style="margin-top:20px; font-size:20px;">基金：${s.fundPaid?'已繳':'未繳'}<br>道具：${s.propNote||'無'}<br>機會：${s.leaveQuota||0}次</div>`; const h = s.history?Object.values(s.history).reverse():[]; document.getElementById('modal-history').innerHTML = h.map(i => `<div style="padding:10px 0; border-bottom:1px solid #333; display:flex; justify-content:space-between;"><span>${i.type}${i.note?'<br><small>'+i.note+'</small>':''}</span><span style="text-align:right;">${i.amt?'$'+i.amt:''}<br><small>${i.time}</small></span></div>`).join('')||'無紀錄'; }
  function closeModal() { document.getElementById('detail-modal').style.display='none'; _currentModalId=null; }
  function addFineFromModal(amt, type) { addFine(_currentModalId, amt, type); }
  function manualAddFineFromModal() { const amt = prompt("金額："); const r = prompt("原因："); if(amt) { _db.ref(`students/${_currentModalId}`).update({ totalFine:(_all[_currentModalId].totalFine||0)+parseInt(amt) }); _db.ref(`students/${_currentModalId}/history`).push({ type: "手動雜費", note: r, amt: parseInt(amt), time: new Date().toLocaleDateString() }); } }
  function setPropFromModal() { const amt = prompt("道具費金額："); const note = prompt("包含項目："); if(amt) _db.ref(`students/${_currentModalId}`).update({ propFine:parseInt(amt), propNote:note }); }
  function adminPaidFromModal() { const amt = prompt("收到現金額度："); if(amt) { _db.ref(`students/${_currentModalId}`).update({ paidAmt: (_all[_currentModalId].paidAmt||0)+parseInt(amt) }); _db.ref(`students/${_currentModalId}/history`).push({ type:"收訖現金", amt:amt, time:new Date().toLocaleDateString() }); } }
  function addFine(id, amt, type) { _db.ref(`students/${id}`).update({ totalFine:(_all[id].totalFine||0)+amt }); _db.ref(`students/${id}/history`).push({ type:type, amt:amt, time:new Date().toLocaleDateString() }); }
  function adminDeduct(id, target) { const s = _all[id]; const q = s.leaveQuota || 2; if (q <= target) { if(confirm("取消折抵？")) _db.ref(`students/${id}`).update({ leaveQuota: q + 1, totalFine: (s.totalFine || 0) + 100 }); } else { if(confirm("確定消耗一次機會幫 " + s.name + " 抵銷 $100？")) { _db.ref(`students/${id}`).update({ leaveQuota: q - 1, totalFine: Math.max(0, (s.totalFine || 0) - 100) }); _db.ref(`students/${id}/history`).push({ type: "機會折抵", amt: -100, time: new Date().toLocaleDateString() }); } } }
  function toggleFund(id, cur) { _db.ref(`students/${id}`).update({ fundPaid: !cur }); }
  function go(p, el) { ['list','att','rep','set'].forEach(i => document.getElementById('pane-'+i).style.display = 'none'); document.getElementById('pane-'+p).style.display = 'block'; document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); if(el) el.classList.add('active'); if(p === 'att') renderAttGrid(); }
  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; }
  function press(v) { if(v==='del') _pin=_pin.slice(0,-1); else if(_pin.length<4) _pin+=v; const ds=document.getElementById('pwd-dots').children; for(let i=0; i<4; i++) ds[i].style.background=i<_pin.length?'var(--gold-main)':'none'; if(_pin.length===4) { if(_pin===_mPin) { document.getElementById('lock-overlay').style.display='none'; document.getElementById('view-student').style.display='none'; document.getElementById('view-admin').style.display='block'; go('list'); } else { alert("錯誤"); _pin=""; } } }
  function resetAllAccounting() { if(confirm("確定帳目大歸零？（名單會保留）")) { Object.keys(_all).forEach(id => _db.ref(`students/${id}`).update({ totalFine:0, propFine:0, paidAmt:0, leaveQuota:2, fundPaid:false, propNote:"", history:null, password:null })); alert("數據已清空！"); } }
  function doExcel() { const d = [["座號", "姓名", "基金", "機會", "欠費"]]; Object.values(_all).forEach(s => d.push([s.no, s.name, s.fundPaid?'已繳':'未繳', s.leaveQuota, (s.totalFine||0)+(s.propFine||0)+(s.fundPaid?0:1300)-(s.paidAmt||0)])); const ws = XLSX.utils.aoa_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表"); XLSX.writeFile(wb, "音演三莊帳目報表.xlsx"); }
  function setNote(e, id) { e.stopPropagation(); const n = prompt("輸入註記內容：", _attData[id].note); if(n!==null) { _attData[id].note = n; renderAttGrid(); } }
</script>
</body>
