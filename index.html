<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>112年莊敬高職音樂科畢業公演</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root { 
    --bg-dark: #0a0a0a; 
    --gold-main: #d4af37; 
    --gold-light: #fbeea7; 
    --glass: rgba(255, 255, 255, 0.08); 
    --accent-red: #ff3b30; 
  }
  
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    background: var(--bg-dark); color: #fff; 
    font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; 
  }
  
  body { 
    background: radial-gradient(circle at top right, #2c240d 0%, #0a0a0a 100%); 
    background-attachment: fixed; 
    display: flex; flex-direction: column; 
    padding-top: env(safe-area-inset-top); 
  }

  /* 容器：確保至少填滿整個螢幕高度 */
  .app-container { 
    flex: 1; width: 100%; min-height: 100vh; 
    padding: 30px 20px; display: flex; flex-direction: column; 
    position: relative; 
  }

  /* 標題區塊大幅強化 */
  .header { text-align: center; margin: 40px 0 30px; }
  .main-title { 
    font-size: 32px; /* 標題放大 */
    font-weight: 900; 
    background: linear-gradient(to bottom, var(--gold-light), var(--gold-main));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
    letter-spacing: 2px;
    line-height: 1.4;
  }
  
  .countdown { 
    font-size: 16px; /* 倒數計時放大 */
    color: var(--gold-light); 
    margin-top: 15px; 
    letter-spacing: 2px; 
    border: 1px solid rgba(212,175,55,0.4); 
    display: inline-block; 
    padding: 8px 20px; 
    border-radius: 30px; 
    background: rgba(0,0,0,0.5);
    font-weight: bold;
  }

  /* 卡片區塊延伸 */
  .main-card { 
    background: var(--glass); 
    border-radius: 25px; 
    padding: 35px 25px; 
    border: 1px solid rgba(212, 175, 55, 0.2); 
    backdrop-filter: blur(20px); 
    -webkit-backdrop-filter: blur(20px); 
    box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
    width: 100%; 
    margin-bottom: 30px;
    /* 讓查詢卡片稍微長一點 */
    min-height: 250px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* 輸入框與按鈕加大 */
  input { 
    width: 100%; padding: 20px; 
    border-radius: 15px; 
    border: 1px solid rgba(212, 175, 55, 0.4); 
    background: rgba(0,0,0,0.5); 
    color: #fff; font-size: 18px; 
    margin-bottom: 20px; text-align: center; 
  }

  .btn-gold { 
    width: 100%; padding: 20px; 
    border-radius: 15px; 
    background: linear-gradient(135deg, var(--gold-light), var(--gold-main)); 
    color: #000; font-weight: 900; 
    font-size: 19px; border: none; cursor: pointer;
    box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
  }

  /* 管理介面列表延伸 */
  .admin-panel { display: none; padding-bottom: 120px; }
  .list-item { 
    background: rgba(255,255,255,0.05); 
    padding: 18px 20px; 
    border-radius: 18px; 
    margin-bottom: 15px; 
    border-left: 5px solid var(--gold-main); 
    display: flex; justify-content: space-between; align-items: center; 
  }
  
  /* 報表清單 */
  .report-row { 
    display: flex; justify-content: space-between; 
    padding: 18px 10px; 
    border-bottom: 1px solid rgba(255,255,255,0.05); 
    font-size: 17px; 
  }

  .nav-bar { 
    position: fixed; bottom: 0; left: 0; width: 100%; 
    background: rgba(10,10,10,0.95); 
    border-top: 1px solid #333; 
    display: flex; padding: 20px 0 calc(20px + env(safe-area-inset-bottom)); 
    z-index: 100; 
  }
  .nav-item { flex: 1; text-align: center; font-size: 14px; color: #777; cursor: pointer; }
  .nav-item.active { color: var(--gold-main); font-weight: 900; }

  /* 數字鍵盤加大 */
  .btn-n { width: 85px; height: 85px; border-radius: 50%; font-size: 28px; }
  
  /* 成績與金額顯示加大 */
  .debt-display { font-size: 64px; font-weight: 900; margin: 20px 0; }
</style>
</head>
<body>

  <div class="app-container" id="view-student">
    <div class="header">
      <div class="main-title">112年莊敬高職音樂科<br>畢業公演</div>
      <div id="countdown-label" class="countdown">載入中...</div>
    </div>

    <div id="student-login" class="main-card">
        <div id="login-step1">
            <div style="text-align:center; font-size:40px; color:var(--gold-main); margin-bottom:20px;">𝄞</div>
            <input type="text" id="stu-name" placeholder="請輸入您的姓名">
            <button class="btn-gold" onclick="searchStudent()">查詢出席紀錄</button>
        </div>
        <div id="login-step2" style="display:none">
            <p id="stu-welcome" style="text-align:center; color:var(--gold-light); margin-bottom:25px; font-weight:bold; font-size:18px;"></p>
            <input type="password" id="stu-pwd" placeholder="輸入 4 位密碼" inputmode="numeric" maxlength="4">
            <button class="btn-gold" onclick="authStudent()">驗證登入</button>
        </div>
    </div>
    
    <div id="student-info" style="display:none; padding-bottom: 50px;"></div>

    <div style="margin-top:auto; text-align:center; padding:40px 0; color:#444; font-size:14px; letter-spacing:1px;" onclick="showLock()">
      — 管理員登入入口 —
    </div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="font-size:28px; color:var(--gold-main); margin:0;">後台管理系統</h2>
        <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#888; border-radius:10px; padding:8px 15px;">登出</button>
    </div>
    
    <div id="pane-list"><div id="h-l"></div></div> 
    
    <div id="pane-att" style="display:none">
        <div id="att-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px;"></div>
        <button class="btn-gold" style="margin-top:40px" onclick="submitAtt()">💾 儲存本日點名結果</button>
    </div>

    <div id="pane-rep" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="margin:0; color:var(--gold-light); font-size:22px;">全班欠費總表</h3>
            <div id="total-sum-badge" style="background:var(--accent-red); padding:8px 15px; border-radius:15px; font-weight:bold; font-size:18px;">$0</div>
        </div>
        <div class="main-card" style="padding:15px; height: 55vh; overflow-y: auto;">
            <div id="full-report-list"></div>
        </div>
        <button class="btn-gold" style="margin-top:15px; background:#248a3d; color:#fff;" onclick="doExcel()">📊 匯出全班 Excel 報表</button>
    </div>

    <div id="pane-set" style="display:none">
        <h3 style="font-size:22px;">系統進階設定</h3>
        <div class="main-card">
          <button class="btn-gold" onclick="resetFeesOnly()" style="background:#444; color:#fff;">🧹 僅歸零罰款紀錄</button>
          <div style="height:20px;"></div>
          <button class="btn-gold" style="background:var(--accent-red); color:#fff;" onclick="fullReset()">🛑 徹底移除全部學生名單</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="go('list',this)">👥 名單</div>
        <div class="nav-item" onclick="go('att',this)">📅 點名</div>
        <div class="nav-item" onclick="go('rep',this)">📊 報表</div>
        <div class="nav-item" onclick="go('set',this)">⚙️ 設定</div>
    </div>
  </div>

  <div id="lock-overlay">
      <div id="pwd-dots" style="display:flex; gap:25px; margin-bottom:50px">
        <div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div>
        <div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div>
        <div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div>
        <div style="width:20px; height:20px; border:2px solid #555; border-radius:50%"></div>
      </div>
      <div style="display:grid; grid-template-columns:repeat(3,90px); gap:25px">
        <script>for(let i=1; i<=9; i++) document.write(`<button class="btn-n" onclick="press(${i})">${i}</button>`);</script>
        <button onclick="document.getElementById('lock-overlay').style.display='none'" style="background:none; color:#888; border:none; font-size:20px;">✕</button>
        <button class="btn-n" onclick="press(0)">0</button>
        <button onclick="press('del')" style="background:none; color:#888; border:none; font-size:20px;">⌫</button>
      </div>
  </div>

<script>
  // 保持原有邏輯不變，僅更新渲染相關內容
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {};

  const MUSIC_STU = ["毛語程","林叡成","田宇紘","吳昆達","吳宥良","黃崇恩","林宏澤","金品澔","劉宸昀","蔡呈樂","蘇瑞吾","梁之凡","蔡宗佑","黃穩達","馮康維","倪秉澤","廖敏君","劉慶霈","蔡慧琳","鄭淳融","魏宜宸","徐婉瑜","安兪臻","江岑君","池宛昕","李曉萍","周玄禮","王以昕","林祐立","邱詩涵","胡云珊","蔡逸宣","高慧君","張路淇","陳芃瑾","陳雨彤","陳宥安","陳圓卿","傅克諳","曾妘湘"];

  window.onload = function() {
      const target = new Date("2026-05-27");
      const diff = Math.ceil((target - new Date()) / (1000 * 60 * 60 * 24));
      document.getElementById('countdown-label').innerText = diff > 0 ? `距離 5/27 公演還有 ${diff} 天` : "公演正式開始！";
  };

  _db.ref('students').on('value', s => {
      _all = s.val() || {};
      if(Object.keys(_all).length === 0) {
          MUSIC_STU.forEach((n, index) => _db.ref('students').push({ no: index + 1, name: n, lateCount: 0, paidCount: 0 }));
      }
      renderAdminList(); renderFullReport(); if(_user) renderUser();
  });

  function renderFullReport() {
    const listDiv = document.getElementById('full-report-list');
    if(!listDiv) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    let totalSum = 0;
    listDiv.innerHTML = sorted.map(([id, s]) => {
      const d = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
      totalSum += d;
      return `<div class="report-row"><span class="report-no">${s.no || '-'}</span><span class="report-name">${s.name}</span><span class="report-amt ${d>0?'debt-red':'debt-none'}">$${d}</span></div>`;
    }).join('');
    document.getElementById('total-sum-badge').innerText = '$' + totalSum;
  }

  function searchStudent() {
    const n = document.getElementById('stu-name').value.trim();
    const f = Object.entries(_all).find(([id, s]) => s.name === n);
    if(!f) return alert("查無姓名");
    _user = f[0];
    document.getElementById('login-step1').style.display = 'none';
    document.getElementById('login-step2').style.display = 'block';
    document.getElementById('stu-welcome').innerHTML = `同學：<b>${n}</b>`;
  }

  function authStudent() {
    const p = document.getElementById('stu-pwd').value;
    if(_all[_user].password && _all[_user].password !== p) return alert("密碼錯誤");
    if(!_all[_user].password) _db.ref(`students/${_user}`).update({password: p});
    renderUser();
  }

  function renderUser() {
    document.getElementById('student-login').style.display = 'none';
    const s = _all[_user];
    const debt = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
    const h = s.history ? Object.values(s.history).reverse() : [];
    document.getElementById('student-info').innerHTML = `
      <div class="main-card" style="text-align:center;">
        <div style="font-size:20px; color:var(--gold-main); font-weight:bold;">${s.name} 同學</div>
        <div class="debt-display" style="color:${debt>0?'var(--accent-red)':'var(--gold-main)'};">$${debt}</div>
        <div style="font-size:16px; opacity:0.8;">目前未繳罰款</div>
      </div>
      <div style="margin:30px 0 15px; font-size:16px; color:var(--gold-light); font-weight:bold; border-left:4px solid var(--gold-main); padding-left:10px;">出缺勤與繳費紀錄</div>
    ` + h.map(i => `<div style="display:flex; justify-content:space-between; padding:18px 0; border-bottom:1px solid #222; font-size:15px;"><span>${i.type}${i.amount?' $'+i.amount:''}</span><span style="color:#666;">${i.time}</span></div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }

  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; updDots(); }
  function press(v) { if(v==='del') _pin=_pin.slice(0,-1); else if(_pin.length<4) _pin+=v; updDots(); if(_pin.length===4) { if(_pin===_mPin) { document.getElementById('lock-overlay').style.display='none'; document.getElementById('view-student').style.display='none'; document.getElementById('view-admin').style.display='block'; go('list'); } else { alert("錯誤"); _pin=""; updDots(); } } }
  function updDots() { const ds=document.getElementById('pwd-dots').children; for(let i=0; i<4; i++) ds[i].style.background=i<_pin.length?'var(--gold-main)':'none'; }

  function renderAdminList() {
    const l = document.getElementById('h-l'); if(!l) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    l.innerHTML = sorted.map(([id, s]) => {
      const d = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
      return `<div class="list-item"><div><b style="font-size:18px;">${s.no}. ${s.name}</b> <br> <span style="color:${d>0?'var(--accent-red)':'#555'}; font-size:14px; font-weight:bold;">欠費：$${d}</span></div><div style="display:flex; gap:12px;"><button onclick="quickPay('${id}',${d})" style="background:var(--gold-main); border:none; padding:12px 18px; border-radius:10px; font-weight:900; font-size:14px;">收錢</button><button onclick="quickLate('${id}')" style="background:#333; color:#fff; border:1px solid #555; padding:12px 18px; border-radius:10px; font-size:14px;">遲到</button></div></div>`;
    }).join('');
  }

  function quickPay(id, debt) { const a = prompt(`收錢紀錄（預設為全部欠費）：`, debt); if(a>0) { _db.ref(`students/${id}`).update({ paidCount: (_all[id].paidCount||0) + Math.floor(a/100) }); _db.ref(`students/${id}/history`).push({ type:'繳費', amount: a, time: new Date().toLocaleDateString() }); } }
  function quickLate(id) { _db.ref(`students/${id}`).update({ lateCount: (_all[id].lateCount||0) + 1 }); _db.ref(`students/${id}/history`).push({ type:'遲到', time: new Date().toLocaleDateString() }); }
  function go(p, el) { ['list','att','rep','set'].forEach(i => document.getElementById('pane-'+i).style.display = 'none'); document.getElementById('pane-'+p).style.display = 'block'; if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); } if(p === 'att') renderAttGrid(); }
  function renderAttGrid() { const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99)); document.getElementById('att-grid').innerHTML = sorted.map(([id, s]) => { _attData[id] = 'present'; return `<div id="at-${id}" onclick="tk('${id}')" style="background:rgba(255,255,255,0.05); padding:20px 10px; border-radius:15px; text-align:center; font-size:14px">${s.name}<br><span style="font-size:24px;">✅</span></div>`; }).join(''); }
  window.tk = (id) => { const s = { 'present':['late','⏰'], 'late':['absent','❌'], 'absent':['leave','🍃'], 'leave':['present','✅'] }; const cur = _attData[id]; _attData[id] = s[cur][0]; document.getElementById('at-'+id).innerHTML = `${_all[id].name}<br><span style="font-size:24px;">${s[cur][1]}</span>`; }
  function submitAtt() { const t = new Date().toLocaleDateString(); Object.entries(_attData).forEach(([id, st]) => { if(st==='late') { _db.ref(`students/${id}`).update({ lateCount: (_all[id].lateCount||0) + 1 }); _db.ref(`students/${id}/history`).push({ type:'遲到', time: t }); } }); alert("儲存成功"); go('list'); }
  function doExcel() { const d = [["座號", "姓名", "欠費金額"]]; const sorted = Object.values(_all).sort((a,b) => (a.no||99)-(b.no||99)); sorted.forEach(s => d.push([s.no, s.name, Math.max(0, (s.lateCount||0)-(s.paidCount||0))*100])); const ws = XLSX.utils.aoa_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表"); XLSX.writeFile(wb, "畢業公演全班報表.xlsx"); }
  function resetFeesOnly() { if(confirm("確定重設所有金額？")) { Object.keys(_all).forEach(id => { _db.ref(`students/${id}`).update({ lateCount: 0, paidCount: 0, history: null }); }); alert("已重設"); } }
  function fullReset() { if(confirm("將刪除全部名單！")) _db.ref('students').remove().then(() => location.reload()); }
</script>
</body>
</html>
