<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>畢業公演出席系統 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, update, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns",
    authDomain:        "jjvsmusic.firebaseapp.com",
    databaseURL:       "https://jjvsmusic-default-rtdb.firebaseio.com",
    projectId:         "jjvsmusic",
    storageBucket:     "jjvsmusic.appspot.com",
    messagingSenderId: "754846318347",
    appId:             "1:754846318347:web:865668e27c1529688432a5"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const DEFAULT_NAMES = [
    '毛語程','林叡成','田宇紘','吳昆達','吳宥良','黃崇恩','林宏澤','金品澔',
    '劉宸昀','蔡呈樂','蘇瑞吾','梁之凡','蔡宗佑','黃穩達','馮康維','倪秉澤',
    '廖敏君','劉慶霈','蔡慧琳','鄭淳融','魏宜宸','徐婉瑜','安兪臻','江岑君',
    '池宛昕','李曉萍','周玄禮','王以昕','林祐立','邱詩涵','胡云珊','蔡逸宣',
    '高慧君','張路淇','陳芃瑾','陳雨彤','陳宥安','陳圓卿','傅克諳','曾妘湘'
  ];

  const FEE = 100;
  let students = {};
  let isAdmin = false;
  let attendTemp = {};

  window.show = (id) => { const el = document.getElementById(id); if(el) el.style.display='block'; };
  window.hide = (id) => { const el = document.getElementById(id); if(el) el.style.display='none'; };
  window.showToast = (msg) => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); };

  async function initStudents() {
    const snap = await get(ref(db, 'students'));
    if (!snap.exists()) {
      const batch = {};
      DEFAULT_NAMES.forEach((name, i) => {
        const id = 'S' + String(i+1).padStart(3,'0');
        batch[id] = { name, lateCount:0, paidCount:0, absentCount:0, presentCount:0, leaveCount:0, history:{} };
      });
      await set(ref(db, 'students'), batch);
    }
    listenStudents();
  }

  function listenStudents() {
    onValue(ref(db, 'students'), snap => {
      students = snap.val() || {};
      Object.values(students).forEach(s => { s.history = s.history ? Object.values(s.history) : []; });
      if (isAdmin) { renderAdminList(); renderReport(); }
    });
  }

  window.goStudent = () => { hide('lock-screen'); show('student-screen'); };
  window.goLock = () => { hide('student-screen'); hide('admin-app'); show('lock-screen'); };
  
  window.studentLookup = function() {
    const query = document.getElementById('student-name-input').value.trim();
    if (!query) return;
    const found = Object.entries(students).find(([,s]) => s.name === query);
    const res = document.getElementById('student-result');
    if (!found) { res.innerHTML = `<div class="empty-state">查無此人</div>`; return; }
    const [id, s] = found;
    const owed = Math.max(0, s.lateCount - s.paidCount) * FEE;
    const hist = [...s.history].reverse();
    res.innerHTML = `
      <div class="student-card main-card">
        <div class="card-top"><div><div class="student-name">${s.name}</div><div class="student-num">${id}</div></div>
        ${owed === 0 ? '<div class="model-badge">準時模範生 ✅</div>' : `<div class="fee-badge owed">待繳 $${owed}</div>`}</div>
        <div class="card-pills"><div class="pill">遲到 <span>${s.lateCount}</span></div><div class="pill">出席 <span>${s.presentCount}</span></div><div class="pill">請假 <span>${s.leaveCount||0}</span></div></div>
      </div>
      <div class="section-label">最近記錄</div>
      ${hist.slice(0,5).map(h=>`<div class="history-item"><span>${h.type==='late'?'⏰ 遲到':h.type==='paid'?'💰 繳費':h.type==='leave'?'🍃 請假':h.type==='absent'?'❌ 缺席':'✅ 出席'}</span><span class="time">${h.time}</span></div>`).join('')}`;
  };

  let pinBuffer = '';
  window.pinInput = (n) => { if(pinBuffer.length<4) pinBuffer+=n; updateDots(); if(pinBuffer.length===4) setTimeout(checkPin,200); };
  window.pinDel = () => { pinBuffer=pinBuffer.slice(0,-1); updateDots(); };
  function updateDots() { for(let i=0;i<4;i++) document.getElementById('d'+i).className='pin-dot'+(i<pinBuffer.length?' filled':''); }
  
  function checkPin() {
    // 🔒 預設密碼已改為老師要求的 0902
    const stored = localStorage.getItem('gp_pin') || '0902';
    if(pinBuffer === stored) {
      isAdmin = true; hide('lock-screen'); show('admin-app'); showTab('list'); pinBuffer = ''; updateDots();
    } else {
      showToast('密碼錯誤'); pinBuffer = ''; updateDots();
    }
  }

  window.showTab = (name) => {
    ['list','attend', 'report'].forEach(t => hide('apage-'+t));
    show('apage-'+name);
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    const targetNav = document.getElementById('nav-'+name);
    if(targetNav) targetNav.classList.add('active');
    if(name==='report') renderReport();
    if(name==='attend') { resetAttendTemp(); renderAttendGrid(); }
    if(name==='list') renderAdminList();
  };

  window.renderAdminList = function() {
    const container = document.getElementById('admin-list');
    if(!container) return;
    container.innerHTML = Object.entries(students).map(([id,s])=>{
      const owed = Math.max(0, s.lateCount - s.paidCount) * FEE;
      return `<div class="student-card"><div class="card-top"><div><div class="student-name">${s.name}</div><div class="student-num">${id}</div></div>
      <div class="fee-badge ${owed>0?'':'model-badge'}">${owed>0?'$'+owed:'已繳清'}</div></div>
      <div style="display:flex;gap:10px"><button onclick="quickAction('${id}','paid')" style="flex:1;background:var(--green);border:none;padding:10px;border-radius:10px;font-weight:bold;color:#000">收錢</button>
      <button onclick="quickAction('${id}','late')" style="flex:1;background:var(--accent);border:none;padding:10px;border-radius:10px;color:#fff;font-weight:bold">+遲到</button></div></div>`;
    }).join('');
  };

  window.quickAction = async function(id, type) {
    const s = students[id]; const time = new Date().toLocaleString('zh-TW');
    if(type==='paid' && s.paidCount < s.lateCount) { await update(ref(db,`students/${id}`), {paidCount: s.paidCount+1}); await push(ref(db, `students/${id}/history`), {type:'paid', time}); showToast("收款成功"); }
    else if(type==='late') { await update(ref(db,`students/${id}`), {lateCount: s.lateCount+1}); await push(ref(db, `students/${id}/history`), {type:'late', time}); showToast("遲到+1"); }
  };

  // 🔄 預設全部出席
  function resetAttendTemp() {
    attendTemp = {};
    Object.keys(students).forEach(id => { attendTemp[id] = 'present'; });
  }

  window.renderAttendGrid = function() {
    const grid = document.getElementById('att-grid');
    if(!grid) return;
    grid.innerHTML = Object.entries(students).map(([id,s])=>{
      const st = attendTemp[id]||'present';
      const cls = st==='present'?'present-bg':st==='late'?'late-bg':st==='absent'?'absent-bg':st==='leave'?'leave-bg':'';
      const icon = st==='present'?'✅':st==='late'?'⏰':st==='absent'?'❌':st==='leave'?'🍃':'○';
      return `<div class="att-cell ${cls}" onclick="cycleAttend('${id}')"><div>${s.name}</div><div style="font-size:16px">${icon}</div></div>`;
    }).join('');
  };

  window.cycleAttend = (id) => { 
    const states=['present','late','absent','leave']; 
    attendTemp[id] = states[(states.indexOf(attendTemp[id]||'present')+1)%states.length]; 
    renderAttendGrid(); 
  };

  window.saveAttendance = async function() {
    const time = new Date().toLocaleString('zh-TW');
    const msg = confirm("確定要儲存本次點名紀錄嗎？(預設全勤)");
    if(!msg) return;
    for (const [id, status] of Object.entries(attendTemp)) {
      const s = students[id]; const up = {};
      if(status==='present') up.presentCount = (s.presentCount||0)+1;
      if(status==='late') { up.lateCount = (s.lateCount||0)+1; up.presentCount = (s.presentCount||0)+1; }
      if(status==='absent') up.absentCount = (s.absentCount||0)+1;
      if(status==='leave') up.leaveCount = (s.leaveCount||0)+1;
      await update(ref(db,`students/${id}`), up); await push(ref(db, `students/${id}/history`), {type: status, time});
    }
    showToast("紀錄已儲存"); showTab('list');
  };

  window.renderReport = () => { 
    const rTotal = document.getElementById('r-total');
    if(rTotal) {
      const total = Object.values(students).reduce((a,s)=> a + Math.max(0, s.lateCount - s.paidCount)*FEE, 0);
      rTotal.textContent = '$' + total;
    }
  };

  window.copyOwedList = function() {
    let text = "【畢業公演催繳單】\n";
    let found = false;
    Object.values(students).forEach(s => { const owed = Math.max(0, s.lateCount - s.paidCount)*FEE; if (owed > 0) { text += `📌 ${s.name}：$${owed}\n`; found=true; } });
    if(!found) text = "🎉 目前全員繳清！";
    navigator.clipboard.writeText(text).then(() => showToast("已複製名單"));
  };

  initStudents();
</script>

<style>
:root{--bg:#0a0a0c;--surface:#161618;--accent:#ff6b35;--green:#30d158;--red:#ff453a;--blue:#0a84ff;--text:#ffffff;--muted:#8e8e93;--border:#2c2c2e}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans TC',sans-serif}
body{background:var(--bg);color:var(--text);overflow-x:hidden}
.safe-area{padding:20px 16px;max-width:500px;margin:0 auto;padding-bottom:120px}
#lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
.pin-dots{display:flex;gap:20px;margin:30px 0}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--border)}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.num-btn{width:70px;height:70px;border-radius:50%;background:var(--surface);border:none;color:var(--text);font-size:24px;font-weight:bold}
.student-card{background:var(--surface);border-radius:18px;padding:20px;margin-bottom:15px;border:1px solid var(--border)}
.main-card{border-left:5px solid var(--accent)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:15px}
.student-name{font-size:20px;font-weight:900}
.student-num{font-size:12px;color:var(--muted);font-family:'Space Mono'}
.fee-badge{background:var(--accent);padding:6px 12px;border-radius:10px;font-weight:bold;font-size:14px}
.model-badge{background:var(--green);color:#000;padding:6px 12px;border-radius:10px;font-weight:bold;font-size:14px}
.card-pills{display:flex;gap:10px}
.pill{background:rgba(255,255,255,0.05);padding:5px 12px;border-radius:8px;font-size:12px;color:var(--muted)}
.pill span{color:var(--text);font-weight:bold}
.att-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.att-cell{background:var(--surface);padding:10px 5px;border-radius:12px;text-align:center;border:1px solid var(--border);font-size:12px;transition:0.2s}
.att-cell.present-bg{border-color:var(--green);background:rgba(48,209,88,0.15)}
.att-cell.late-bg{border-color:var(--accent);background:rgba(255,107,53,0.25)}
.att-cell.absent-bg{border-color:var(--red);background:rgba(255,69,58,0.25)}
.att-cell.leave-bg{border-color:var(--blue);background:rgba(10,132,255,0.25)}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:16px;border-radius:14px;width:100%;font-weight:bold;font-size:16px;margin-top:10px;box-shadow:0 4px 15px rgba(255,107,53,0.3)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);display:flex;padding:10px 0 25px;border-top:1px solid var(--border);z-index:900}
.nav-item{flex:1;text-align:center;font-size:10px;color:var(--muted);cursor:pointer;transition:0.2s}
.nav-item.active{color:var(--accent)}
.icon{font-size:24px;display:block;margin-bottom:4px}
.section-label{font-size:11px;color:var(--muted);letter-spacing:2px;margin:20px 0 10px;text-transform:uppercase}
.history-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
.history-item .time{color:var(--muted);font-size:12px}
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:var(--accent);padding:10px 25px;border-radius:30px;font-size:13px;font-weight:bold;opacity:0;transition:0.3s;z-index:2000;pointer-events:none;box-shadow:0 5px 15px rgba(0,0,0,0.5)}
.toast.show{opacity:1}
input{background:var(--surface);border:1px solid var(--border);color:#fff;padding:14px;border-radius:12px;width:100%;outline:none;font-size:16px}
input:focus{border-color:var(--accent)}
</style>
</head>
<body>
<div id="lock-screen"><div style="font-size:60px;margin-bottom:10px">🎭</div><h2 style="margin-bottom:5px">畢業公演出席系統</h2><p style="color:var(--muted);font-size:13px">請輸入管理密碼</p>
<div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
<div class="numpad">
<button class="num-btn" onclick="pinInput(1)">1</button><button class="num-btn" onclick="pinInput(2)">2</button><button class="num-btn" onclick="pinInput(3)">3</button>
<button class="num-btn" onclick="pinInput(4)">4</button><button class="num-btn" onclick="pinInput(5)">5</button><button class="num-btn" onclick="pinInput(6)">6</button>
<button class="num-btn" onclick="pinInput(7)">7</button><button class="num-btn" onclick="pinInput(8)">8</button><button class="num-btn" onclick="pinInput(9)">9</button>
<button class="num-btn" style="background:transparent"></button><button class="num-btn" onclick="pinInput(0)">0</button><button class="num-btn" onclick="pinDel()">⌫</button>
</div><button onclick="goStudent()" style="margin-top:40px;color:var(--blue);background:none;border:none;font-weight:bold;font-size:15px">👤 學生查詢個人紀錄</button></div>

<div id="student-screen" class="safe-area" style="display:none"><h1>出席查詢</h1><div style="display:flex;gap:10px;margin:25px 0"><input type="text" id="student-name-input" placeholder="請輸入姓名"><button onclick="studentLookup()" style="background:var(--accent);border:none;padding:0 25px;border-radius:12px;color:#fff;font-weight:bold">查詢</button></div><div id="student-result"></div><button onclick="goLock()" style="margin-top:50px;color:var(--muted);background:none;border:none;width:100%;font-size:14px">← 返回管理登入</button></div>

<div id="admin-app" style="display:none">
<div class="safe-area" id="apage-list"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px"><h2>學生名冊</h2><button onclick="goLock()" style="background:none;border:none;font-size:24px">🔒</button></div><div id="admin-list"></div></div>
<div class="safe-area" id="apage-attend" style="display:none"><h2>即時點名</h2><p style="color:var(--muted);font-size:13px;margin:15px 0">預設全部 ✅(出)。點擊切換：⏰(遲)→❌(缺)→🍃(假)</p><div class="att-grid" id="att-grid"></div><button class="btn-primary" onclick="saveAttendance()">💾 儲存點名紀錄</button></div>
<div class="safe-area" id="apage-report" style="display:none"><h2>數據報表</h2><div class="student-card" style="border-left:5px solid var(--blue);margin-top:20px;padding:25px"><div id="r-total" style="font-size:32px;font-weight:bold;color:var(--accent);font-family:'Space Mono'">$0</div><div style="font-size:13px;color:var(--muted);margin-top:5px">全班總待收罰款</div></div><button class="btn-primary" onclick="copyOwedList()" style="background:var(--blue);margin-top:20px">📋 複製催繳名單 (Line)</button></div>
<nav class="bottom-nav"><div id="nav-list" class="nav-item" onclick="showTab('list')"><span class="icon">👥</span>名單</div><div id="nav-attend" class="nav-item" onclick="showTab('attend')"><span class="icon">📅</span>點名</div><div id="nav-report" class="nav-item" onclick="showTab('report')"><span class="icon">📊</span>報表</div></nav>
</div>
<div class="toast" id="toast"></div>
</body>
</html>
