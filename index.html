<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>畢業公演出席系統 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  :root{--bg:#000;--card:#1c1c1e;--accent:#ff6b35;--green:#30d158;--blue:#0a84ff;--text:#fff}
  body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;overscroll-behavior:none}
  .container{padding:20px;max-width:500px;margin:0 auto;padding-bottom:120px}
  
  /* 鎖定畫面 */
  #lock-screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
  .dot-container{display:flex;margin:20px 0}
  .dot{width:15px;height:15px;border:2px solid #333;border-radius:50%;margin:0 10px}
  .dot.active{background:var(--accent);border-color:var(--accent)}
  .numpad{display:grid;grid-template-columns:repeat(3,80px);gap:15px}
  .btn-n{width:75px;height:75px;border-radius:50%;background:#1c1c1e;color:#fff;border:none;font-size:24px;cursor:pointer}
  .btn-n:active{background:#3a3a3c}

  /* 卡片與按鈕 */
  .card{background:var(--card);border-radius:15px;padding:15px;margin-bottom:12px;border:1px solid #2c2c2e}
  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .badge-debt{background:var(--accent);padding:4px 10px;border-radius:8px;font-size:12px;font-weight:bold}
  .badge-ok{background:var(--green);color:#000;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:bold}
  .btn-action{background:var(--green);border:none;padding:12px;border-radius:10px;font-weight:bold;flex:1;cursor:pointer}
  .btn-primary{background:var(--accent);border:none;padding:15px;border-radius:12px;color:#fff;width:100%;font-weight:bold;font-size:16px;cursor:pointer}
  
  /* 點名與導覽 */
  .att-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .att-cell{background:#1c1c1e;padding:15px 2px;border-radius:10px;text-align:center;font-size:12px;border:1px solid #2c2c2e}
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#1c1c1e;display:flex;padding:20px 0;border-top:1px solid #2c2c2e;z-index:100}
  .nav-item{flex:1;text-align:center;font-size:12px;color:#8e8e93}
  .nav-item.active{color:var(--accent)}

  input{width:100%;padding:15px;border-radius:12px;border:1px solid #333;background:#111;color:#fff;font-size:16px;box-sizing:border-box;margin-bottom:15px}
  #toast{position:fixed;top:40px;left:50%;transform:translateX(-50%);background:var(--accent);padding:10px 30px;border-radius:30px;font-weight:bold;opacity:0;transition:0.3s;z-index:2000}
  #toast.show{opacity:1}
  .hist-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2c2c2e;font-size:14px}
</style>
</head>
<body>

  <div id="toast">已同步雲端</div>

  <div id="lock-screen">
    <div style="font-size:50px;margin-bottom:10px">🎭</div>
    <div style="font-weight:bold;margin-bottom:10px">畢業公演出席系統</div>
    <div class="dot-container">
      <div id="dot0" class="dot"></div><div id="dot1" class="dot"></div><div id="dot2" class="dot"></div><div id="dot3" class="dot"></div>
    </div>
    <div class="numpad">
      <button class="btn-n" onclick="pressPin(1)">1</button><button class="btn-n" onclick="pressPin(2)">2</button><button class="btn-n" onclick="pressPin(3)">3</button>
      <button class="btn-n" onclick="pressPin(4)">4</button><button class="btn-n" onclick="pressPin(5)">5</button><button class="btn-n" onclick="pressPin(6)">6</button>
      <button class="btn-n" onclick="pressPin(7)">7</button><button class="btn-n" onclick="pressPin(8)">8</button><button class="btn-n" onclick="pressPin(9)">9</button>
      <button class="btn-n" style="background:none"></button><button class="btn-n" onclick="pressPin(0)">0</button><button class="btn-n" onclick="delPin()">⌫</button>
    </div>
    <button onclick="switchView('student')" style="margin-top:40px;color:var(--blue);background:none;border:none;font-weight:bold;font-size:16px">👤 學生查詢入口</button>
  </div>

  <div id="student-view" class="container" style="display:none">
    <h2>個人出席查詢</h2>
    <div id="search-area">
      <input type="text" id="stu-name" placeholder="請輸入姓名 (例如: 毛語程)">
      <button class="btn-primary" onclick="checkStudent()">下一步</button>
    </div>
    <div id="pwd-area" style="display:none;text-align:center">
      <p id="pwd-msg" style="margin-bottom:15px"></p>
      <input type="password" id="stu-pwd" placeholder="輸入 4 位密碼" inputmode="numeric" maxlength="4">
      <button class="btn-primary" onclick="verifyStudent()">驗證進入</button>
    </div>
    <div id="data-area" style="display:none"></div>
    <button onclick="location.reload()" style="margin-top:40px;width:100%;background:none;border:none;color:#8e8e93">← 返回首頁</button>
  </div>

  <div id="admin-view" class="container" style="display:none">
    <div id="tab-list"><h3>名冊管理</h3><div id="html-list"></div></div>
    <div id="tab-attend" style="display:none"><h3>快速點名</h3><div class="att-grid" id="html-grid"></div><button class="btn-primary" style="margin-top:25px" onclick="saveAttendance()">💾 儲存點名結果</button></div>
    <div id="tab-report" style="display:none"><h3>罰款報表</h3><div class="card" style="text-align:center;padding:30px"><div id="html-total" style="font-size:40px;color:var(--accent);font-weight:bold">$0</div><div>目前待收總額</div></div><button class="btn-primary" style="background:var(--blue)" onclick="copyList()">📋 複製催繳名單</button></div>
    <div id="tab-set" style="display:none"><h3>設定</h3><button class="btn-primary" style="background:#ff453a" onclick="resetDB()">🛑 重設資料庫 (全班清零)</button><button class="btn-primary" style="background:#2c2c2e;margin-top:15px" onclick="location.reload()">🔒 登出系統</button></div>
    
    <div class="bottom-nav">
      <div class="nav-item" onclick="showTab('list')">👥名單</div><div class="nav-item" onclick="showTab('attend')">📅點名</div><div class="nav-item" onclick="showTab('report')">📊報表</div><div class="nav-item" onclick="showTab('set')">⚙️設定</div>
    </div>
  </div>

<script>
  // ✅ 基礎連線設定
  const config = {
    apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns",
    authDomain: "jjvsmusic.firebaseapp.com",
    databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com",
    projectId: "jjvsmusic",
    storageBucket: "jjvsmusic.appspot.com",
    messagingSenderId: "754846318347",
    appId: "1:754846318347:web:865668e27c1529688432a5"
  };
  firebase.initializeApp(config);
  const db = firebase.database();

  let students = {};
  let currentSID = null;
  let adminPin = "";
  let tempAttend = {};
  const MASTER = "0902";

  // --- 啟動與監聽 ---
  db.ref('students').on('value', snap => {
    students = snap.val() || {};
    renderAll();
  });

  function renderAll() {
    // 渲染管理員名單
    const list = document.getElementById('html-list');
    if(list) list.innerHTML = Object.entries(students).map(([id, s]) => {
      const owed = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
      return `<div class="card"><div class="card-top"><div>${s.name}</div><div class="${owed>0?'badge-debt':'badge-ok'}">$${owed}</div></div>
      <div style="display:flex;gap:8px"><button class="btn-action" onclick="act('${id}','paid')">收錢</button><button class="btn-action" style="background:var(--accent)" onclick="act('${id}','late')">+遲</button>
      <button class="btn-action" style="background:#2c2c2e;color:#fff" onclick="adj('${id}')">📝</button></div></div>`;
    }).join('');
    // 渲染報表總額
    const total = Object.values(students).reduce((a, s) => a + Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100, 0);
    if(document.getElementById('html-total')) document.getElementById('html-total').textContent = '$' + total;
  }

  // --- 介面切換 ---
  function switchView(mode) {
    document.getElementById('lock-screen').style.display = 'none';
    if(mode==='student') document.getElementById('student-view').style.display = 'block';
  }

  function showTab(t) {
    ['list','attend','report','set'].forEach(id => document.getElementById('tab-'+id).style.display='none');
    document.getElementById('tab-'+t).style.display='block';
    if(t==='attend') { 
      tempAttend = {}; Object.keys(students).forEach(id => tempAttend[id] = 'present');
      renderGrid();
    }
  }

  // --- 管理員登入邏輯 (0-9 鍵盤) ---
  function pressPin(n) {
    if(adminPin.length < 4) {
      adminPin += n;
      updateDots();
      if(adminPin.length === 4) {
        setTimeout(() => {
          if(adminPin === MASTER) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            showTab('list');
          } else {
            alert("密碼錯誤！"); adminPin = ""; updateDots();
          }
        }, 200);
      }
    }
  }
  function delPin() { adminPin = adminPin.slice(0,-1); updateDots(); }
  function updateDots() {
    for(let i=0; i<4; i++) document.getElementById('dot'+i).className = 'dot' + (i < adminPin.length ? ' active' : '');
  }

  // --- 學生查詢邏輯 ---
  function checkStudent() {
    const name = document.getElementById('stu-name').value.trim();
    const found = Object.entries(students).find(([id, s]) => s.name === name);
    if(!found) return alert("查無此芭樂，請檢查姓名！");
    currentSID = found[0];
    document.getElementById('search-area').style.display = 'none';
    document.getElementById('pwd-area').style.display = 'block';
    document.getElementById('pwd-msg').innerHTML = found[1].password ? `歡迎回來，<b>${name}</b><br>請輸入查詢密碼：` : `<span style="color:var(--green)">首次登入</span><br>請設定您的 4 位數密碼：`;
  }

  function verifyStudent() {
    const p = document.getElementById('stu-pwd').value;
    if(p.length < 4) return alert("請輸入 4 位數密碼");
    const s = students[currentSID];
    if(!s.password) {
      db.ref(`students/${currentSID}`).update({password: p}).then(() => showData());
    } else if(s.password === p) {
      showData();
    } else {
      alert("密碼錯誤！");
    }
  }

  function showData() {
    document.getElementById('pwd-area').style.display = 'none';
    const s = students[currentSID];
    const owed = Math.max(0, (s.lateCount||0) - (s.paidCount||0)) * 100;
    const hist = s.history ? Object.values(s.history).reverse() : [];
    document.getElementById('data-area').style.display = 'block';
    document.getElementById('data-area').innerHTML = `
      <div class="card" style="border-left:5px solid var(--accent)">
        <div style="font-size:20px;font-weight:bold">${s.name}</div>
        <div style="font-size:24px;color:var(--accent);margin:10px 0">$${owed}</div>
        <div style="font-size:12px;color:#8e8e93">遲到 ${s.lateCount||0} 次 | 已繳 ${s.paidCount||0} 次</div>
      </div>
      <div style="color:#8e8e93;font-size:12px;margin:20px 0 10px">歷史明細</div>
      ${hist.map(h => `<div class="hist-item"><span>${h.type==='late'?'⏰ 遲到':h.type==='paid'?'💰 繳費':'📝 調整'}</span><span>${h.time}</span></div>`).join('')}`;
  }

  // --- 管理功能 ---
  function act(id, type) {
    const s = students[id]; const time = new Date().toLocaleDateString();
    if(type==='paid' && (s.paidCount||0) < (s.lateCount||0)) {
      db.ref(`students/${id}`).update({paidCount: (s.paidCount||0)+1});
      db.ref(`students/${id}/history`).push({type:'paid', time});
    } else if(type==='late') {
      db.ref(`students/${id}`).update({lateCount: (s.lateCount||0)+1});
      db.ref(`students/${id}/history`).push({type:'late', time});
    }
  }

  function adj(id) {
    const amt = prompt("調整該生當前「應繳金額」：");
    if(amt !== null && !isNaN(amt)) {
      db.ref(`students/${id}`).update({lateCount: Math.ceil(amt/100), paidCount: 0});
      db.ref(`students/${id}/history`).push({type:'adjust', time: new Date().toLocaleDateString()});
    }
  }

  function renderGrid() {
    document.getElementById('html-grid').innerHTML = Object.entries(students).map(([id, s]) => {
      const st = tempAttend[id];
      const icon = st==='present'?'✅':st==='late'?'⏰':st==='absent'?'❌':'🍃';
      return `<div class="att-cell" onclick="cycle('${id}')">${s.name}<br>${icon}</div>`;
    }).join('');
  }
  window.cycle = (id) => {
    const ss = ['present','late','absent','leave'];
    tempAttend[id] = ss[(ss.indexOf(tempAttend[id])+1)%4]; renderGrid();
  };

  function saveAttendance() {
    const time = new Date().toLocaleDateString();
    if(!confirm("儲存本次點名？預設未點選者皆出席。")) return;
    Object.entries(tempAttend).forEach(([id, status]) => {
      const s = students[id]; const up = {};
      if(status==='present') up.presentCount = (s.presentCount||0)+1;
      if(status==='late') { up.lateCount = (s.lateCount||0)+1; up.presentCount = (s.presentCount||0)+1; }
      if(status==='absent') up.absentCount = (s.absentCount||0)+1;
      if(status==='leave') up.leaveCount = (s.leaveCount||0)+1;
      db.ref(`students/${id}`).update(up);
      db.ref(`students/${id}/history`).push({type: status, time});
    });
    alert("點名完成並同步！"); showTab('list');
  }

  function copyList() {
    let t = "【排練罰款催繳】\n";
    Object.values(students).forEach(s => { 
      const owed = Math.max(0, (s.lateCount||0) - (s.paidCount||0))*100;
      if(owed>0) t += `📌 ${s.name}：$${owed}\n`;
    });
    const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
    const toast = document.getElementById('toast'); toast.className = 'show'; setTimeout(()=>toast.className='', 2000);
  }

  function resetDB() { if(prompt("管理密碼？")===MASTER) db.ref('students').remove().then(()=>location.reload()); }
</script>
</body>
</html>
