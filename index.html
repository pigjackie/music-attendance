<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>112年莊敬音樂科畢業公演管理系統 V1.9</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  :root { --bg-dark: #0a0a0a; --gold-main: #d4af37; --gold-light: #fbeea7; --glass: rgba(255, 255, 255, 0.1); --accent-red: #ff3b30; --success: #34c759; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
  body { background: radial-gradient(circle at top right, #2c240d 0%, #0a0a0a 100%); background-attachment: fixed; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
  
  .app-container { flex: 1; width: 100%; padding: 30px 20px; display: flex; flex-direction: column; }
  .header { text-align: center; margin: 40px 0 30px; }
  .main-title { font-size: 32px; font-weight: 900; background: linear-gradient(to bottom, var(--gold-light), var(--gold-main)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

  .main-card { background: var(--glass); border-radius: 25px; padding: 25px; border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); margin-bottom: 25px; }
  .btn-gold { width: 100%; padding: 18px; border-radius: 15px; background: linear-gradient(135deg, var(--gold-light), var(--gold-main)); color: #000; font-weight: 900; font-size: 18px; border: none; cursor: pointer; }
  
  .admin-panel { display: none; padding-bottom: 160px; }
  .list-item { background: rgba(255,255,255,0.05); padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 5px solid var(--gold-main); }

  .quota-box-container { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
  .quota-box { width: 40px; height: 40px; border: 2px solid var(--gold-main); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
  .quota-box.used { background: var(--gold-main); color: #000; }

  .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.95); border-top: 1px solid #333; display: flex; padding: 15px 0 calc(15px + env(safe-area-inset-bottom)); z-index: 100; }
  .nav-item { flex: 1; text-align: center; font-size: 13px; color: #777; cursor: pointer; }
  .nav-item.active { color: var(--gold-main); font-weight: 900; }
  
  .status-tag { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
  .tag-unpaid { background: var(--accent-red); color: #fff; }
  .tag-paid { background: var(--success); color: #fff; }
  
  input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.4); background: rgba(0,0,0,0.5); color: #fff; font-size: 18px; margin-bottom: 15px; text-align: center; }
  .help-text { font-size: 12px; color: #888; margin-top: 5px; line-height: 1.4; }
  .section-label { font-size: 14px; color: var(--gold-main); font-weight: bold; margin-bottom: 10px; display: block; }
</style>
</head>
<body>

  <div class="app-container" id="view-student">
    <div class="header"><div class="main-title">112年莊敬高職音樂科<br>畢業公演</div></div>
    <div id="student-login" class="main-card">
        <span class="section-label">同學端查詢系統</span>
        <input type="text" id="stu-name" placeholder="請輸入姓名">
        <button class="btn-gold" onclick="searchStudent()">登入並查看紀錄</button>
        <p class="help-text">登入後可查看剩餘折抵次數、畢業基金狀態、道具費明細及老師註記。</p>
    </div>
    <div id="student-info" style="display:none"></div>
    <div style="margin-top:auto; text-align:center; padding:40px 0; color:#333; font-size:12px;" onclick="showLock()">後台管理入口</div>
  </div>

  <div class="app-container admin-panel" id="view-admin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
        <h2 style="font-size:24px; color:var(--gold-main); margin:0;">管理系統</h2>
        <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#888; border-radius:10px; padding:5px 12px;">登出</button>
    </div>
    
    <div id="pane-list">
        <div class="main-card" style="padding:15px; border-color:var(--success);">
            <span class="section-label">快速新增同學</span>
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-stu-name" placeholder="輸入姓名" style="margin-bottom:0; flex:2;">
                <button onclick="addNewStudent()" style="flex:1; background:var(--success); color:#fff; border:none; border-radius:12px; font-weight:bold;">新增</button>
            </div>
            <p class="help-text">若名單中沒有您的名字，請在此手動新增一次。</p>
        </div>
        <div id="h-l"></div>
    </div> 

    <div id="pane-att" style="display:none">
        <span class="section-label">今日排練點名</span>
        <p class="help-text" style="margin-bottom:15px;">點擊姓名切換：✅出席 / ⏰遲到 / 🍃核假 / ❌缺席</p>
        <div id="att-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;"></div>
        <button class="btn-gold" style="margin-top:30px" onclick="submitAtt()">💾 確認並儲存點名</button>
    </div>

    <div id="pane-rep" style="display:none">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; color:var(--gold-light);">總欠費排行榜</h3>
            <div id="total-sum-badge" style="background:var(--accent-red); padding:8px 15px; border-radius:15px; font-weight:bold;">$0</div>
        </div>
        <div class="main-card" style="padding:15px; height: 50vh; overflow-y: auto;"><div id="full-report-list"></div></div>
    </div>

    <div id="pane-set" style="display:none">
        <div class="main-card">
            <h3 style="color:var(--gold-main);">帳目大清算</h3>
            <p style="font-size:14px; color:#888; margin-bottom:20px;">這會清除所有人目前所有的罰款與繳費紀錄，並將請假機會恢復為 2 次。名單會保留。</p>
            <button class="btn-gold" onclick="resetAllAccounting()" style="background:var(--accent-red); color:#fff;">🛑 確定全部重設</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="go('list',this)">👥 名單</div>
        <div class="nav-item" onclick="go('att',this)">📅 點名</div>
        <div class="nav-item" onclick="go('rep',this)">📊 報表</div>
        <div class="nav-item" onclick="go('set',this)">⚙️ 設定</div>
    </div>
  </div>

  <div id="lock-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:3000; flex-direction:column; align-items:center; justify-content:center;">
      <div id="pwd-dots" style="display:flex; gap:20px; margin-bottom:40px"><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div><div style="width:15px; height:15px; border:1px solid #555; border-radius:50%"></div></div>
      <div style="display:grid; grid-template-columns:repeat(3,80px); gap:20px">
          <script>for(let i=1; i<=9; i++) document.write(`<button style="width:70px;height:70px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:24px;" onclick="press(${i})">${i}</button>`);</script>
          <button style="color:#555" onclick="document.getElementById('lock-overlay').style.display='none'">✕</button>
          <button style="width:70px;height:70px;border-radius:50%;background:#1c1c1e;color:#fff;font-size:24px;" onclick="press(0)">0</button>
          <button style="color:#555" onclick="press('del')">⌫</button>
      </div>
  </div>

<script>
  const APP_VERSION = "1.9";
  const _c = { apiKey: "AIzaSyC_6aza1KH8GXxUbYBraK7wcqPrSUSF-Ns", authDomain: "jjvsmusic.firebaseapp.com", databaseURL: "https://jjvsmusic-default-rtdb.firebaseio.com", projectId: "jjvsmusic", storageBucket: "jjvsmusic.appspot.com", messagingSenderId: "754846318347", appId: "1:754846318347:web:865668e27c1529688432a5" };
  firebase.initializeApp(_c); const _db = firebase.database();
  let _all = {}, _user = null, _pin = "", _mPin = "0902", _attData = {};

  _db.ref('students').on('value', s => {
      _all = s.val() || {};
      renderAdminList(); renderFullReport(); if(_user) renderUser();
  });

  // 手動新增學生函式
  function addNewStudent() {
      const name = document.getElementById('new-stu-name').value.trim();
      if(!name) return alert("請輸入姓名");
      const nextNo = Object.keys(_all).length + 1;
      _db.ref('students').push({ 
          no: nextNo, 
          name: name, 
          totalFine: 0, 
          propFine: 0, 
          paidAmt: 0, 
          leaveQuota: 2, 
          fundPaid: false 
      });
      document.getElementById('new-stu-name').value = "";
      alert(name + " 已成功加入名單！");
  }

  function renderAdminList() {
    const l = document.getElementById('h-l'); if(!l) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    l.innerHTML = sorted.map(([id, s]) => {
      const fundD = s.fundPaid ? 0 : 1300;
      const debt = (s.totalFine||0) + (s.propFine||0) + fundD - (s.paidAmt||0);
      const q = s.leaveQuota !== undefined ? s.leaveQuota : 2;
      return `
      <div class="list-item">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <b style="font-size:18px;">${s.no}. ${s.name}</b>
          <span class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}" onclick="toggleFund('${id}', ${s.fundPaid})">
            基金：${s.fundPaid?'已繳':'未繳($1300)'}
          </span>
        </div>
        <div class="quota-box-container">
          <div class="quota-box ${q <= 1 ? 'used' : ''}" onclick="adminDeduct('${id}', 1)">${q <= 1 ? '✔' : ''}</div>
          <div class="quota-box ${q <= 0 ? 'used' : ''}" onclick="adminDeduct('${id}', 0)">${q <= 0 ? '✔' : ''}</div>
          <span style="margin-left:auto; color:var(--accent-red); font-weight:bold;">應繳: $${debt}</span>
        </div>
        <div style="display:flex; gap:8px; margin-top:12px;">
          <button onclick="setProp('${id}')" style="flex:1; padding:10px; border-radius:10px; background:#222; color:#fff; font-size:11px; border:1px solid #444;">道具明細</button>
          <button onclick="quickAddFine('${id}', 100, '遲到罰款')" style="flex:1; padding:10px; border-radius:10px; background:var(--accent-red); color:#fff; font-size:11px; border:none;">遲到+100</button>
          <button onclick="adminPaid('${id}')" style="flex:1; padding:10px; border-radius:10px; background:var(--gold-main); color:#000; font-weight:bold; font-size:11px; border:none;">收現</button>
        </div>
      </div>`;
    }).join('');
  }

  function renderUser() {
    const s = _all[_user];
    const fundDebt = s.fundPaid ? 0 : 1300;
    const debt = (s.totalFine||0) + (s.propFine||0) + fundDebt - (s.paidAmt||0);
    const q = s.leaveQuota !== undefined ? s.leaveQuota : 2;
    const h = s.history ? Object.values(s.history).reverse() : [];
    document.getElementById('student-info').innerHTML = `
      <div class="main-card" style="text-align:center;">
        <div style="font-size:22px; font-weight:bold; color:var(--gold-main);">${s.name} 同學</div>
        <div style="font-size:56px; font-weight:900; margin:15px 0; color:${debt>0?'var(--accent-red)':'var(--gold-main)'};">$${debt}</div>
        <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
           <div class="status-tag ${s.fundPaid?'tag-paid':'tag-unpaid'}">畢業基金：${s.fundPaid?'已繳清':'未繳($1300)'}</div>
           <div class="status-tag" style="background:#444">折抵機會剩餘：${q} 次</div>
        </div>
        ${s.propFine ? `<div style="margin-top:15px; font-size:14px; color:#aaa; border-top:1px solid #333; padding-top:10px;"><b>道具明細 ($${s.propFine})</b><br>${s.propNote || '無註記'}</div>` : ''}
      </div>
      <div style="margin:20px 0 10px; font-weight:bold; color:var(--gold-light);">個人帳目紀錄與老師叮嚀：</div>
    ` + h.map(i => `<div style="padding:12px 0; border-bottom:1px solid #222; font-size:14px; display:flex; justify-content:space-between;">
        <span>${i.type}${i.note ? ' <br><small style="color:var(--gold-main)">註：'+i.note+'</small>' : ''}</span>
        <span style="text-align:right;">${i.amt?'$'+i.amt:''}<br><small style="color:#444">${i.time}</small></span>
      </div>`).join('');
    document.getElementById('student-info').style.display = 'block';
  }

  function adminDeduct(id, target) {
      const s = _all[id];
      const q = s.leaveQuota !== undefined ? s.leaveQuota : 2;
      if (q <= target) {
          if(confirm("取消折抵並恢復 $100 罰款？")) {
              _db.ref(`students/${id}`).update({ leaveQuota: q + 1, totalFine: (s.totalFine || 0) + 100 });
              _db.ref(`students/${id}/history`).push({ type: "取消機會折抵", amt: 100, time: new Date().toLocaleDateString() });
          }
      } else {
          if(confirm(`消耗一次機會幫 ${s.name} 折抵 $100？`)) {
              _db.ref(`students/${id}`).update({ leaveQuota: q - 1, totalFine: Math.max(0, (s.totalFine || 0) - 100) });
              _db.ref(`students/${id}/history`).push({ type: "機會折抵遲到", amt: -100, time: new Date().toLocaleDateString() });
          }
      }
  }

  function setProp(id) { 
      const amt = prompt("輸入道具費金額：", _all[id].propFine || 0);
      if(amt === null) return;
      const note = prompt("輸入明細(戲服、道具、佈景)：", _all[id].propNote || "");
      _db.ref(`students/${id}`).update({ propFine: parseInt(amt), propNote: note });
  }

  function quickAddFine(id, amt, type) { 
      _db.ref(`students/${id}`).update({ totalFine: (_all[id].totalFine||0) + amt });
      _db.ref(`students/${id}/history`).push({ type: type, amt: amt, time: new Date().toLocaleDateString() });
  }

  function adminPaid(id) {
      const amt = prompt("收到現金額：");
      if(amt > 0) {
          _db.ref(`students/${id}`).update({ paidAmt: (_all[id].paidAmt||0) + parseInt(amt) });
          _db.ref(`students/${id}/history`).push({ type: "現金收訖", amt: amt, time: new Date().toLocaleDateString() });
      }
  }

  function toggleFund(id, cur) { _db.ref(`students/${id}`).update({ fundPaid: !cur }); }

  function renderAttGrid() {
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    document.getElementById('att-grid').innerHTML = sorted.map(([id, s]) => {
      _attData[id] = { status: 'present', note: '' };
      return `<div id="at-${id}" onclick="tk('${id}')" style="background:rgba(255,255,255,0.05); padding:12px 5px; border-radius:15px; text-align:center; font-size:12px;">
        ${s.name}<br><span id="icon-${id}" style="font-size:24px;">✅</span><br>
        <button onclick="setNote(event, '${id}')" style="font-size:10px; background:#444; color:#fff; border:none; border-radius:5px; margin-top:5px; padding:2px 8px;">備註</button>
      </div>`;
    }).join('');
  }
  window.setNote = (e, id) => { e.stopPropagation(); const n = prompt("輸入備註(例如:病假、公假)："); if(n!==null) _attData[id].note = n; }
  window.tk = (id) => {
      const sMap = { 'present':['late','⏰','遲100'], 'late':['leave','🍃','核假'], 'leave':['absent','❌','缺席'], 'absent':['present','✅','出席'] };
      const cur = _attData[id].status;
      _attData[id].status = sMap[cur][0];
      document.getElementById('icon-'+id).innerText = sMap[cur][1];
  }

  function submitAtt() {
      const t = new Date().toLocaleDateString();
      Object.entries(_attData).forEach(([id, data]) => {
          if(data.status === 'late') quickAddFine(id, 100, "排練遲到");
          if(data.note) _db.ref(`students/${id}/history`).push({ type: "點名備註", note: data.note, time: t });
      });
      alert("儲存完成！"); go('list');
  }

  function go(p, el) { 
      ['list','att','rep','set'].forEach(i => document.getElementById('pane-'+i).style.display = 'none'); 
      document.getElementById('pane-'+p).style.display = 'block'; 
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      if(el) el.classList.add('active');
      if(p === 'att') renderAttGrid();
  }

  function renderFullReport() {
    const listDiv = document.getElementById('full-report-list'); if(!listDiv) return;
    const sorted = Object.entries(_all).sort((a,b) => (a[1].no || 99) - (b[1].no || 99));
    let total = 0;
    listDiv.innerHTML = sorted.map(([id, s]) => {
      const fundD = s.fundPaid ? 0 : 1300;
      const d = (s.totalFine||0) + (s.propFine||0) + fundD - (s.paidAmt||0); total += d;
      return `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #222; font-size:14px;"><span>${s.no}. ${s.name} ${s.fundPaid?'':'(欠基金)'}</span><span style="color:${d>0?'var(--accent-red)':'#666'}">$${d}</span></div>`;
    }).join('');
    document.getElementById('total-sum-badge').innerText = '$' + total;
  }

  function searchStudent() {
      const n = document.getElementById('stu-name').value.trim();
      const f = Object.entries(_all).find(([id, s]) => s.name === n);
      if(!f) return alert("查無姓名");
      _user = f[0];
      document.getElementById('student-login').style.display = 'none';
      renderUser();
  }

  function resetAllAccounting() { 
      if(confirm("確定全部帳目歸零？名單將會保留。")) { 
          Object.keys(_all).forEach(id => {
              _db.ref(`students/${id}`).update({ totalFine:0, propFine:0, paidAmt:0, leaveQuota:2, fundPaid:false, propNote:"", history:null });
          });
          alert("數據已全數歸零！"); 
      } 
  }

  function showLock() { document.getElementById('lock-overlay').style.display='flex'; _pin=""; }
  function press(v) { 
      if(v==='del') _pin=_pin.slice(0,-1); else if(_pin.length<4) _pin+=v;
      const ds = document.getElementById('pwd-dots').children;
      for(let i=0; i<4; i++) ds[i].style.background = i<_pin.length ? 'var(--gold-main)' : 'none';
      if(_pin.length===4) { 
          if(_pin===_mPin) { 
              document.getElementById('lock-overlay').style.display='none'; 
              document.getElementById('view-student').style.display='none'; 
              document.getElementById('view-admin').style.display='block'; 
              go('list'); 
          } else { alert("密碼錯誤"); _pin=""; } 
      }
  }
</script>
</body>
</html>
